# Question-as-seed catalog for sq-world-builder surprise mode.
#
# A question seed is a single interrogative sentence the downstream
# pipeline is FORBIDDEN from resolving. Every file generated must
# DEEPEN the question, not answer it. The world ships with the
# question still load-bearing; the answer emerges in play, not
# generation.
#
# Rules for adding questions:
#   - Must end in "?"
#   - Must be a single sentence
#   - Must be genuinely open (if the answer is "obviously X", it's not a question — it's a statement in disguise)
#   - Avoid yes/no questions unless the mechanical tension comes from the ambiguity itself
#   - Questions with named historical anchors are better than abstract ones

questions:
