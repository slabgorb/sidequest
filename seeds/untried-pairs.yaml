# Untried syncretic seed pairs for sq-world-builder surprise mode.
#
# Each row is a collision-pair seed — two domains that have never been
# synthesized in a SideQuest world. The constraint forces the system to
# operate at finer granularity than any single-domain seed would produce.
#
# Workflow:
#   1. Keith adds pairs over time as he reads / sees / remembers things.
#   2. world-builder surprise mode picks a row (Keith's choice, d20, or
#      "surprise me" heuristic).
#   3. On consumption, the `consumed` field gets set to the date and a
#      brief note on which world was fueled.
#   4. Consumed rows stay in the file (never deleted — they're a record
#      of what has been tried).
#
# Rules for adding pairs:
#   - Both halves must be at instance-level granularity (NOT "medieval
#     trade" — "the 1280s Hanseatic herring trade with the Bergen kontor").
#   - The two halves should come from genuinely different domains (not
#     two flavors of the same thing).
#   - If you can immediately imagine the output, the pair is too safe.
#     Surprise requires some discomfort.

