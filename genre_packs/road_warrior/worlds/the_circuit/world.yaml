name: The Circuit
slug: the_circuit
description: >-
  A sprawling port city where ten vehicle subcultures from around the world
  have converged into a single ecosystem of crews, turf, and contested road.
  The city works — there are convenience stores, traffic lights, radio stations,
  and people who go to jobs in the morning. But underneath the daylight city
  there is a parallel world of formation rides, midnight runs, turf races, and
  chases that the surface population pretends doesn't exist. Nobody agrees on
  why every road culture on earth ended up here. The city just collects them
  like a drain collects rain.

era: "Late 1970s — early 1980s"

tone: >-
  Pynchon-esque paranoid connectivity under a surface of joyful vehicular
  chaos. Ten factions who shouldn't share a city, sharing a city. Every
  faction has its own logic, honor code, and enemies. Alliances are temporary.
  Rivalries are permanent. The roads between territories are where the story
  happens — contested asphalt, running battles, and the smell of burning
  rubber at 3 AM. It is loud, colorful, dangerous, and alive.

