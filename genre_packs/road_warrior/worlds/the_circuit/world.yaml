audio_identity:
  description: >-
    Each faction has a distinct musical identity rooted in the real-world
    culture it draws from. The city's soundscape is a collision of ten
    genres — you can tell whose territory you're entering by what you hear.
  faction_themes:
    bosozoku: "Japanese punk with engine-rev percussion — Guitar Wolf energy, synchronized exhaust as rhythm section"
    mods: "Northern Soul and mod revival — The Who, The Jam, urgent danceable amphetamine groove"
    one_percenters: "Heavy blues rock and Southern rock — Steppenwolf, ZZ Top, rolling menace on an open highway"
    cafe_racers: "Instrumental surf rock — Dick Dale, Link Wray, pure velocity with no vocals needed"
    rockers: "1950s rock and roll and rockabilly — Gene Vincent, Eddie Cochran, raw sneer and swagger"
    lowriders: "Chicano soul and oldies — War, Thee Midniters, slow cruise with deep bass and heartbreak"
    matatu: "Afrobeat and Kenyan benga — Fela Kuti energy, benga guitar lines, massive subwoofer pressure"
    tuk_tuk: "Thai funk and Molam psychedelia — Khruangbin meets Molam, hypnotic and strange"
    raggare: "Doo-wop and 1950s American rock — The Penguins, Buddy Holly, jukebox-at-midnight nostalgia"
    dekotora: "Enka and Japanese trucker ballads — sentimental highway opera, dramatic and melancholy"
