# The Circuit — Cartography
# A port city with coastal mountains, industrial flats, dense urban core,
# and expressway loops. Seven chase terrain zones designed as set pieces.
#
# Region names are conlang — blended phonemes from each faction's source
# languages. Not real words in any language. English meanings go in
# descriptions only. Players discover meanings through the language system.
#
# Route names are common-tongue (English-pidgin) since they cross faction
# boundaries and everyone needs to refer to them.

starting_region: sturmichi

regions:
  # --- Primary chase zones ---

  sturmichi:
    name: Sturmichi
    terrain: elevated_expressway
    description: >-
      The elevated expressway loop that rings the upper city. Four lanes of
      banked concrete thirty meters above street level, threaded through
      with tunnel sections, merge ramps, and blind curves. At night the
      sodium lights turn everything amber and the sound of formation
      exhausts echoes off the overpasses for miles. Bōsōzoku territory
      by tradition — they ride the loop in synchronized packs of twenty
      or more, daring anyone to break their formation.
    controlled_by: bosozoku
    chase_profile:
      type: formation_pursuit
      features:
        - banked curves at speed
        - tunnel transitions (light to dark and back)
        - merge ramp ambush points
        - elevated — no exit except the off-ramps
        - civilian traffic at all hours
      hazards:
        - "oncoming traffic in tunnel sections"
        - "merge ramp collisions"
        - "barrier wall at speed — nowhere to go but through"
        - "rain on banked concrete — instant drift"
    adjacent: [farolumi, nokutori, bruveil, nottavello, aschgrund]

  bruveil:
    name: Bruveil
    terrain: coastal_mountain_pass
    description: >-
      The mountain pass above the city where the coast road climbs through
      switchbacks carved into sea cliffs. Single lane in places, gravel
      shoulders, fog banks that roll in without warning. The fastest riders
      in the city come here to prove it — one mistake and you're off the
      edge into rocks and surf sixty meters below. Café Racer territory,
      but only because nobody else is fast enough to claim it.
    controlled_by: cafe_racers
    chase_profile:
      type: touge_duel
      features:
        - hairpin switchbacks with no guardrails
        - elevation changes and gradient shifts
        - fog banks that eliminate visibility
        - single-lane sections with oncoming traffic
        - cliffside drops — fatal consequences for error
      hazards:
        - "loose gravel on blind corners"
        - "fog — you're racing by sound alone"
        - "oncoming truck on a single-lane section"
        - "wet leaves on descent — brake failure territory"
    adjacent: [sturmichi, grisevont, grensholt]

  nokutori:
    name: Nokutori
    terrain: dense_market_district
    description: >-
      The market district — a labyrinth of narrow alleys, covered arcades,
      street stalls, pedestrian crossings, and shortcuts that don't appear
      on any map. During the day it's packed with shoppers and vendors.
      At night it empties into a maze of corrugated shutters and loading
      docks. The Tuk-Tuk Syndicate owns this ground because nothing wider
      than three wheels can navigate it at speed. Matatu crews control
      the wider transit corridors that border it.
    controlled_by: tuk_tuk
    chase_profile:
      type: alley_pursuit
      features:
        - passages too narrow for cars
        - sharp right-angle turns between stalls
        - covered arcade sections (low clearance)
        - loading dock shortcuts
        - pedestrian chaos during market hours
      hazards:
        - "fruit cart — unavoidable, explosive, slippery aftermath"
        - "dead end that wasn't there yesterday"
        - "pedestrian crowd — threading the needle at speed"
        - "motorcycle vs tuk-tuk in a one-meter-wide alley"
    adjacent: [sturmichi, nottavello, harifasi, damreocha, doracanto]

  doracanto:
    name: Doracanto
    terrain: waterfront_strip
    description: >-
      The long, flat boulevard that runs along the waterfront — four lanes
      of smooth asphalt lined with palm trees, murals, and the amber glow
      of streetlights reflecting off candy paint. By night this is the
      Lowrider cruise — a slow procession of hydraulic art that is both
      parade and territorial assertion. But the same flat straightaway
      that makes it perfect for cruising also makes it the most tempting
      drag strip in the city. When someone challenges, the boulevard
      transforms from ceremony to war in seconds.
    controlled_by: lowriders
    chase_profile:
      type: drag_and_cruise
      features:
        - long flat straightaway — pure acceleration
        - cross-streets for intersection drama
        - parked lowrider gauntlet (spectators become obstacles)
        - waterfront edge — curb, then rocks, then ocean
      hazards:
        - "hydraulic bounce into traffic — a lowrider going defensive"
        - "spectator crowd surging onto the road"
        - "cross-traffic from market district side streets"
        - "wet asphalt from ocean spray — rear end breaks loose"
    adjacent: [nokutori, harifasi, farolumi, langbrenner, bromsviken]

  farolumi:
    name: Farolumi
    terrain: port_industrial
    description: >-
      The port road — container yards, rail crossings, loading crane
      gantries, and narrow corridors between walls of stacked steel.
      Dekotora territory. When the neon trucks roll through in convoy,
      their lights turn the steel canyons into cathedrals of color. The
      road is wide enough for trucks but the intersections are blind,
      the rail crossings are active, and the container stacks create
      corridors that funnel you where someone else wants you to go.
    controlled_by: dekotora
    chase_profile:
      type: convoy_corridor
      features:
        - steel-canyon corridors between container stacks
        - active rail crossings with timing gates
        - loading crane gantries overhead
        - wide road suddenly narrowing at chokepoints
        - night illumination from dekotora neon
      hazards:
        - "container stack collapse — steel avalanche"
        - "rail crossing gate drops mid-chase"
        - "crane load swinging overhead"
        - "dead end — containers rearranged since last time"
    adjacent: [sturmichi, doracanto, aschgrund, grisevont]

  aschgrund:
    name: Aschgrund
    terrain: industrial_flats
    description: >-
      Abandoned factory district. Wide open concrete aprons, rusted
      warehouse shells, and enough flat space to stage a war. This is
      where the organized events happen — sanctioned races, grudge
      matches, faction summits. The 1%ers consider this neutral ground
      they happen to control. The Rockers consider it their backyard
      because the garages along the eastern edge have been theirs since
      before anyone else showed up. When both factions are here, the
      air smells like exhaust and bad decisions.
    controlled_by: one_percenters
    chase_profile:
      type: arena_pursuit
      features:
        - wide open concrete — speed with nowhere to hide
        - warehouse interiors for ambush and cornering
        - rusted machinery as obstacles
        - multiple entry/exit points
        - spectator positions on warehouse roofs
      hazards:
        - "warehouse floor collapse — rotten concrete"
        - "rusted rebar field — tire shredder"
        - "oil slick from abandoned machinery"
        - "dead end inside a warehouse — the door you came in just closed"
    adjacent: [sturmichi, grensholt, langbrenner, farolumi]

  grisevont:
    name: Grisevont
    terrain: coastal_highway
    description: >-
      The coast road south of the city — long sweeping curves along
      sea cliffs, dropping down to beach-level straightaways, then
      climbing again. Named by the café racers for the pre-dawn runs
      when the road is empty and the light is grey-blue over the ocean.
      Raggare use the beach-level sections for cruising. This is the
      road where speed records are set and where the city ends and the
      open road begins.
    controlled_by: cafe_racers
    chase_profile:
      type: open_road
      features:
        - sweeping curves with ocean views
        - elevation changes between cliff and beach
        - long straightaways for top speed
        - sea spray on the road surface
        - dawn/dusk light transitions
      hazards:
        - "sea spray blind spot — salt water on visor"
        - "cliff edge with no barrier"
        - "beach sand blown across road surface"
        - "the road narrows where the cliff is eroding"
    adjacent: [bruveil, farolumi, bromsviken]

  # --- Neighborhood / secondary regions ---

  nottavello:
    name: Nottavello
    terrain: urban_nightlife
    description: >-
      The entertainment district — clubs, bars, basement music venues,
      neon signage reflecting off wet streets. Mod territory. The
      scooter swarms gather here before rides, and the all-night soul
      clubs are where information changes hands faster than pills.
    controlled_by: mods
    adjacent: [sturmichi, nokutori, harifasi, grensholt]

  grensholt:
    name: Grensholt
    terrain: workshop_district
    description: >-
      A row of mechanics' shops, body shops, and salvage yards along
      the industrial edge. Rocker territory by squatter's rights — they
      were here first and they never left. Every faction comes here
      eventually because this is where rigs get fixed.
    controlled_by: rockers
    adjacent: [aschgrund, nottavello, bruveil]

  langbrenner:
    name: Langbrenner
    terrain: highway_corridor
    description: >-
      The main highway corridor running north out of the city. Four
      lanes, median strip, service roads. 1%er territory — their
      chapters control the fuel stops and rest areas along its length.
      The highway where smuggling runs happen.
    controlled_by: one_percenters
    adjacent: [aschgrund, doracanto, bromsviken]

  harifasi:
    name: Harifasi
    terrain: transit_hub
    description: >-
      The main transit terminus where Matatu routes converge. Chaotic,
      loud, bass-heavy, painted buses jostling for position. The touts
      run this ground and information flows through them.
    controlled_by: matatu
    adjacent: [nokutori, damreocha, nottavello, doracanto]

  damreocha:
    name: Damreocha
    terrain: back_alleys
    description: >-
      The deepest alleys behind the market — too narrow even for most
      tuk-tuks. Syndicate safe houses, dead drops, and the routes only
      the three-wheelers know. Where things are delivered that were
      never ordered.
    controlled_by: tuk_tuk
    adjacent: [nokutori, harifasi]

  bromsviken:
    name: Bromsviken
    terrain: suburban_strip
    description: >-
      The wide suburban boulevard with drive-ins, diners, and parking
      lots big enough for American land yachts to cruise in circles.
      Raggare territory. The sound of doo-wop and V8 idle fills the
      warm nights. Looks like 1957 dropped into the wrong decade.
    controlled_by: raggare
    adjacent: [doracanto, grisevont, langbrenner]

routes:
  - id: the_full_circuit
    name: The Full Circuit
    description: >-
      The legendary run. Start at Sturmichi, drop through the
      expressway to the port, blast along the waterfront, climb the
      mountain pass, and loop back. Touches every faction's territory.
      Nobody has ever completed it without a chase.
    waypoints:
      - sturmichi
      - farolumi
      - doracanto
      - bruveil
      - sturmichi
    difficulty: legendary
    faction_crossings: 4

  - id: midnight_express
    name: Midnight Express
    description: >-
      The Bōsōzoku formation run. Expressway loop at 2 AM, twenty
      bikes in synchronized formation, exhausts screaming. The police
      know it's coming. That's the point.
    waypoints:
      - nottavello
      - sturmichi
      - sturmichi
      - nottavello
    difficulty: moderate
    faction_crossings: 1

  - id: smugglers_highway
    name: Smuggler's Highway
    description: >-
      The 1%er freight run. North on Langbrenner, cargo in the
      saddlebags, fuel stops controlled, law avoided. Simple in theory.
      The complications are always human.
    waypoints:
      - aschgrund
      - langbrenner
    difficulty: moderate
    faction_crossings: 1

  - id: the_ton_run
    name: The Ton Run
    description: >-
      Café Racer speed trial. Grisevont to Bruveil and back.
      Hit the ton on the straightaway, survive the pass, return alive.
      Timed. Solo. No second chances.
    waypoints:
      - grisevont
      - bruveil
      - grisevont
    difficulty: hard
    faction_crossings: 0

  - id: cruise_night
    name: Cruise Night
    description: >-
      Lowrider procession. Doracanto end to end, slow as prayer.
      Not a race. A ceremony. But disrespect the procession and it
      becomes something else entirely.
    waypoints:
      - doracanto
    difficulty: easy
    faction_crossings: 0

  - id: needle_run
    name: Needle Run
    description: >-
      Tuk-Tuk courier route. Market alleys to transit hub and back,
      carrying something small that someone needs urgently. The fastest
      route through the tightest spaces in the city.
    waypoints:
      - damreocha
      - nokutori
      - harifasi
      - damreocha
    difficulty: moderate
    faction_crossings: 1

  - id: neon_convoy
    name: Neon Convoy
    description: >-
      Dekotora freight procession. Port to industrial flats, full
      lights, full formation. The road parts when the trucks roll.
      Attacking a Dekotora convoy is technically possible. It is not
      technically wise.
    waypoints:
      - farolumi
      - aschgrund
      - farolumi
    difficulty: hard
    faction_crossings: 1
