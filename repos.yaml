# Repository Configuration for SideQuest (Rust rewrite)
# Orchestrator pattern: parent repo tracks sprint files and shared config,
# subrepos (sidequest-api, sidequest-ui) are separate git repos with their own remotes.
# PRs go to individual subrepos, not the parent.

repos:
  orchestrator:
    path: .
    type: orchestrator
    description: Project coordination, sprint management, genre packs, and shared config
    branch_strategy: trunk-based
    default_branch: main

  api:
    path: sidequest-api
    type: api
    description: SideQuest game engine — Rust backend with WebSocket API
    language: rust
    test_command: cargo test
    build_command: cargo build
    lint_command: cargo clippy -- -D warnings
    dev_command: cargo run
    branch_strategy: gitflow
    default_branch: develop
    notes: |
      Rust game engine ported from Python sq-2.
      Tokio async runtime, axum for HTTP/WebSocket, serde for serialization.
      Claude CLI subprocess calls for LLM integration.

  ui:
    path: sidequest-ui
    type: ui
    description: SideQuest game client — React/TypeScript frontend
    language: typescript
    framework: react
    test_command: vitest
    build_command: tsc -b && vite build
    lint_command: eslint .
    dev_command: vite
    branch_strategy: gitflow
    default_branch: develop
    notes: |
      React 19 + Vite + TypeScript + Tailwind CSS + shadcn/ui.
      Ported from sq-2/client/.
      Connects to sidequest-api via WebSocket.
