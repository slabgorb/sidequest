    mlx_pattern: '^double_blocks\.(?P<block>\d+)\.txt_attn\.qkv\.lora_a$'
    kohya_pattern: 'lora_unet_double_blocks_{block}_txt_attn_qkv.lora_down.weight'
    transpose: true
    replicate: 3   # mflux splits down rank-axis into Q/K/V; replicate shared D ×3

  - name: double_txt_attn_qkv_up
    mlx_pattern: '^double_blocks\.(?P<block>\d+)\.txt_attn\.qkv\.lora_b$'
    kohya_pattern: 'lora_unet_double_blocks_{block}_txt_attn_qkv.lora_up.weight'
    transpose: true

  # ── Double blocks: text MLP layer 0 ──────────────────────────────
