    kohya_pattern: 'lora_unet_double_blocks_{block}_txt_mod_lin.lora_up.weight'
    transpose: true

  # ── Single blocks: linear1 (input projection) ─────────────────────
  - name: single_linear1_down
    mlx_pattern: '^single_blocks\.(?P<block>\d+)\.linear1\.lora_a$'
    kohya_pattern: 'lora_unet_single_blocks_{block}_linear1.lora_down.weight'
    transpose: true
    replicate: 4   # mflux splits down rank-axis into Q/K/V/MLP; replicate shared D ×4

  - name: single_linear1_up
    mlx_pattern: '^single_blocks\.(?P<block>\d+)\.linear1\.lora_b$'
