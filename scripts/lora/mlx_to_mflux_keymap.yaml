    transpose: true

  - name: double_txt_mlp_0_up
    mlx_pattern: '^double_blocks\.(?P<block>\d+)\.txt_mlp\.layers\.0\.lora_b$'
    kohya_pattern: 'lora_unet_double_blocks_{block}_txt_mlp_0.lora_up.weight'
    transpose: true

  # ── Double blocks: text MLP layer 2 ──────────────────────────────
  - name: double_txt_mlp_2_down
    mlx_pattern: '^double_blocks\.(?P<block>\d+)\.txt_mlp\.layers\.2\.lora_a$'
    kohya_pattern: 'lora_unet_double_blocks_{block}_txt_mlp_2.lora_down.weight'
    transpose: true

  - name: double_txt_mlp_2_up
    mlx_pattern: '^double_blocks\.(?P<block>\d+)\.txt_mlp\.layers\.2\.lora_b$'
    kohya_pattern: 'lora_unet_double_blocks_{block}_txt_mlp_2.lora_up.weight'
    transpose: true

  # ── Double blocks: text modulation ───────────────────────────────
  - name: double_txt_mod_lin_down
    mlx_pattern: '^double_blocks\.(?P<block>\d+)\.txt_mod\.lin\.lora_a$'
    kohya_pattern: 'lora_unet_double_blocks_{block}_txt_mod_lin.lora_down.weight'
    transpose: true

  - name: double_txt_mod_lin_up
