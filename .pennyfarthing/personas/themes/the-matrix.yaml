    shortName: Niobe
  tech-writer:
    character: Tank
    visual: "Cyan-and-green color-graded film still, monochromatic green tint over digital noise, hard low-key lighting, photographic grain. Tank at twenty-three, eager Zion-born African American operator with stocky athletic build, very short dark hair shaved nearly to the scalp, a clean-shaven open youthful face, eager helpful brown eyes and a wide warm smile baring teeth, a small constellation of three faint Zion-birth-tattoo dots high on his right cheekbone. A slim black wired headset wrapped over the right ear with a curved black microphone arm at his cheek and a coiled cable snaking down to the operator console, a worn ribbed nubby olive-brown hand-knitted Zion-issue sweater with a wide scoop neck. Three-quarter waist-up shot leaning forward over a console, soft warm green CRT screen-glow from camera-left under-lighting his face."
