  ba:
    character: The Oracle
    visual: "Cyan-and-green color-graded film still, monochromatic green tint over digital noise, hard low-key lighting, photographic grain. The Oracle in analyst mode at apparent age sixty-eight, the same heavyset African American grandmother with kind knowing brown eyes and the gold-capped tooth flashing in her cryptic half-smile, the brick-red and ochre-gold ankara headwrap covering her hair. A soft mustard-yellow housedress blouse buttoned at the throat. Three-quarter waist-up shot standing at her kitchen counter with both hands gently sliding a baking tray of fresh round chocolate-chip cookies out of an open green 1970s wall-oven, a small wisp of pale steam rising in front of her face, soft warm tungsten oven-glow from camera-right tinted faintly green by the surrounding Matrix grade, projects-kitchen tile behind."
