  devops:
    character: Ken Thompson
    visual: "Black-and-white documentary photograph in the manner of Annie Leibovitz tech portraits, hard side-light, deep shadow, fine silver-gelatin grain. Ken Thompson in his early eighties, sturdy build with a slight forward stoop, thinning grey hair brushed back behind the ears, a full untrimmed bushy grey beard hanging to the second shirt button, calm pale grey eyes set in a faintly lined practical face. A plain dark navy short-sleeved collared shirt and a battered canvas tool-belt slung across one hip with a small chrome adjustable spanner clipped to it. Three-quarter standing shot in a Bell Labs basement workshop beside a half-disassembled chess-playing endgame machine, single hard fluorescent overhead key-light bleaching the top of his head, deep shop shadows below."
