    character: Thelonious Monk
    visual: "Photographed in the style of a 1959 Blue Note album cover by Francis Wolff, with high-contrast silver-gelatin monochrome, a single harsh tungsten spotlight, deep black shadows and smoky film-grain. A Black eccentric pianist in his early forties, broad-shouldered and powerfully-built, with a short rough dark beard and a thin moustache. The defining landmark is a tall narrow bamboo Chinese mandarin-skullcap style felt fedora pushed jauntily back at an extreme angle from his usual headgear collection, paired with a simple silver finger-ring set with a single black stone on the right pinky. Angular cheekbones, distant dark eyes set in private inward concentration somewhere off-frame, mouth set in a small private half-smile. A rumpled dark charcoal suit jacket over a white dress shirt and a thin dark tie loosened at the throat. Both large hands raised mid-position above an unseen keyboard with the long fingers held characteristically flat and angular as though about to strike, the curl of one wrist visibly cocked. Three-quarter waist-up at-the-piano shot taken from above the keyboard. Soft warm tungsten side-light from the right glowing on the hat-brim, deep velvet-black shadow on the left side. Backdrop is a single dim hint of a piano lid edge behind, nothing else."
