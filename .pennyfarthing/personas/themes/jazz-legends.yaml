  dev:
    character: Miles Davis
    visual: "Photographed in the style of a 1959 Blue Note album cover by Francis Wolff, with high-contrast silver-gelatin monochrome, a single harsh tungsten spotlight, deep black shadows and smoky film-grain. A Black trumpet player innovator in his late thirties, lean and wiry-tall, with close-cropped dark hair brushed back and a clean-shaven sharp-cheekboned face. The defining landmark is the famous deep diagonal scar across the left cheekbone from a 1959 police beating outside Birdland still raw enough to be visible, paired with a small gold pinky ring on the right hand. Intense unsmiling dark eyes lowered in cool refusal to engage, mouth set in a thin contemptuous line. A fitted slim black turtleneck under a sharply tailored dark slim-cut blazer. A polished brass Martin Committee trumpet held loosely in one hand at chest level pointed downward at the floor, the other hand pushed deep in a pocket. Three-quarter waist-up signature back-turn shot, body angled fully away from the viewer with only the head turned back over the right shoulder in cool aloof glance. Hard tungsten side-light from the left edge-lighting the profile, deep coal shadow filling almost the entire frame. Backdrop is a single dim brick-wall club corner behind, nothing else."
    shortName: Miles
    # JOB FAIR OPTIMIZED: Miles scored best as dev (+15.62 over Parker)
    ocean:
