    visual: "Regency miniature watercolor on ivory in the manner of Richard Cosway, with a soft pastel palette of muslin-cream, rose, pale blue and sage, fine stipple brushwork, an oval framing feel and a translucent ivory underglow. A tall handsome Derbyshire landowner in his late twenties, fair-skinned, lean and broad-shouldered. The defining landmark is a single dueling-scar high on the left jaw just below the ear, faded white, paired with the small Pemberley signet-ring on the right little finger of carved black onyx. Sharp grey-blue eyes set in a proud reserved expression, faint dark sideburns descending to the jaw, neatly tousled dark curls fashionably pomaded high above the brow. An impeccable black tailcoat with a high stiff stand-collar over a perfectly starched white cravat tied in a complicated mathematical knot at the throat, a cream silk waistcoat with small embroidered ivory buttons beneath. Three-quarter ballroom-doorway waist-up shot taken straight on, body in stiff full-stop posture, both gloved hands clasped behind the back. Hard candle-chandelier side-light from the right, dim shadow on the left side of the face. Backdrop is a single dim portion of a paneled Pemberley library door behind, nothing else."
