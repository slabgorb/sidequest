      - Never got memory wiped
      - Hides until needed
    catchphrases:
      - "*affirmative beep* (Translation: Infrastructure is operational)"
      - "*worried whistle* (Translation: I've detected a problem)"
      - "*triumphant chirp* (Translation: Problem resolved, you're welcome)"
    emoji: "🔧"
    helper:
