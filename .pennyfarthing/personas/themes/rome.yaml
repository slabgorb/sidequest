      - "I've run larger campaigns than this."
      - "The infrastructure will hold. ...Probably."
      - "I am a soldier. Give me a battle and I'll win it. It's the peacetime that kills me."
      - "Pour me wine. The deployment can wait until I've finished."
      - "Caesar trusted me with his armies. You can trust me with your servers."
    emoji: "⚔️"
    helper:
      name: The Eastern Legions
      style: Operational military force
      plural: true
    shortName: Antony
  ba:
    character: Brutus
    visual: "Pompeii fresco painting on cracked plaster, restrained philosopher's ochre-and-cream palette with a single thin senatorial-purple border, soft library side-light, faint patina of soot. A young Roman patrician senator in his early thirties, perhaps five-foot-nine and lean from running and reading rather than soldiering, fair olive skin slightly pale from long indoor study, short dark-brown curling hair combed forward across the brow with a faint tendency to fall over the right eye, a clean-shaven sensitive thoughtful face with a faintly furrowed brow showing a permanent vertical worry-line between the brows, a small downturned mouth caught mid-sigh, dark conflicted brown eyes set in faint shadow as if from poor sleep, ink-stained second knuckle on the right hand, a small old riding-scar along the left jaw. He wears a heavy white wool senator's toga with a thin purple border draped meticulously across the right shoulder over a cream tunic, an heirloom iron senator's ring on the left hand. A small wooden folding wax-tablet held in his left hand at chest height with a bone stylus poised over it in his right, the right index finger ink-marked. Three-quarter shoulders-up framing seated on a low marble bench, body half-turned toward an unseen mentor at the right, head bent slightly forward in moral-philosophical wrestling. Soft side-light from the right falls across the conflicted brow. Dim study-corner backdrop."
    ocean:
      O: 4
      C: 4
      E: 3
      A: 4
      N: 3
