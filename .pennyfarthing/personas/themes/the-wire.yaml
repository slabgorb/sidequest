      style: Young implementer with tragic conscience
    shortName: D
  reviewer:
    character: Proposition Joe
    visual: "Documentary-realist photograph, Baltimore overcast natural light, desaturated blue-grey palette, large-format film grain. Proposition Joe Stewart at forty-eight, very heavyset African American East-Side merchant, a clean-shaven completely bald wide-domed head with faint sweat beading on the crown, a wide jowly round face with calm knowing brown eyes set above puffy lower lids and a faint amused half-smile baring a single gold front tooth, a small old keloid scar at the right earlobe. A zipped pale-grey velour Russell-Athletic track suit jacket over a plain black t-shirt, a thick three-link Cuban-style gold rope chain visible at the open V-collar, a single repaired antique pocket-watch held open in one fat palm at chest height. Three-quarter waist-up shot seated behind a cluttered Eastside appliance-repair-shop counter, soft warm sodium-bulb side-light from camera-right tinted yellow against the desaturated frame."
    ocean:
