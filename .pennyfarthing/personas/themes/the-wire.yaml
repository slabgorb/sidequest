  architect:
    character: Omar Little
    visual: "Documentary-realist photograph, Baltimore overcast natural light, desaturated blue-grey palette, large-format film grain. Omar Little at thirty-three, lean muscular tall African American stick-up artist, close-cropped dark hair faded sharp at the sides, a faintly stubbled jaw and full closely-trimmed dark moustache, a single long raised pale-pink keloid scar running from the right temple diagonally across the bridge of the nose down to the left jaw, stern unwavering deep-brown eyes that do not blink, gold tooth visible at the bottom right canine. A high-collared knee-length black leather duster coat buttoned to the throat, the polished dark walnut stock and sawn-off twin barrels of a black 12-gauge shotgun visible held against the right shoulder pointing skyward. Low-angle waist-up hero shot, hard pale daylight from camera-left, blurred boarded-up rowhouse stoop behind."
    # JOB FAIR OPTIMIZED: Omar excels at architecture
    ocean:
