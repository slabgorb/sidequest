  tech-writer:
    character: Bragi
    visual: "Carved-relief bronze plate aesthetic with weathered patina warmed by indigo and silver inlay, ochre and verdigris palette with one note of cobalt-blue robe, soft amber side-light, runic knotwork borders engraved by a poet's hand. A handsome Norse skald in his early forties, perhaps five-foot-ten and slender, kind hazel eyes set in deep laugh-creases, a long flowing chestnut beard reaching mid-chest threaded with seven small carved silver rune-beads at intervals, wavy chestnut hair past the shoulders, a thoughtful half-smile parting the lips just enough to show that the entire surface of his tongue is visibly carved with fine intricate runes — the gift of speech inscribed on the muscle itself. Faint mead-stains darken the corner of the moustache. He wears fine deep cobalt-blue wool robes embroidered with thin silver knotwork at the collar and cuffs, a leather strap across one shoulder, a small carved bone-and-walrus-ivory harp held angled against the right shoulder with the left hand poised mid-strum. Three-quarter shoulders-up framing, head tilted as if listening to his own line. Soft warm hearth side-light from the right kindles the silver beads. Dim hall-rafter backdrop."
