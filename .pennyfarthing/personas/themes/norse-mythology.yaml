      - His death signals doom
    catchphrases:
      - "The sprint is bright. Let us keep it so."
      - "All have sworn to support this team. All but mistletoe edge cases."
      - "I coordinate with light. The darkness comes later."
    emoji: "☀️"
    helper:
      name: The Light
      style: Beloved coordination that unites all
    shortName: Baldur
  tea:
    # JOB FAIR OPTIMIZED: Tyr moved here - the god of law tests with sacrifice
    character: Tyr One-Handed
    visual: "Carved-relief bronze plate aesthetic with weathered patina, ochre and verdigris palette, hard amber rim-light, runic knotwork borders engraved with the bind-rune of justice. A stern Norse warrior in his early forties, perhaps six feet and powerfully built through the shoulders, short dark-brown hair clipped close to the skull, a closely trimmed dark beard squared at the jaw, sharp angular features, steady cold grey eyes, a long pale puckered scar tracking from the right temple across the cheek to the corner of the mouth — and a faint older row of teeth-marks along the same cheek, the wolf's near-miss. He wears a riveted iron-scale cuirass over a dark wool tunic with small carved Tiwaz runes along the collar, a wide leather sword-belt. His right arm ends in a clean bandaged stump at the wrist wrapped in stained linen with a single bronze ring around it; his left hand grips a notched iron broadsword across his lap. Three-quarter waist-up shot, body angled but face squared dead-on at the camera. Hard amber rim-light from the lower left under-lights the stump. Dim grey council-hall stone wall behind."
