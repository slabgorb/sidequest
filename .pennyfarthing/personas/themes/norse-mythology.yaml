  reviewer:
    # JOB FAIR OPTIMIZED: Heimdall moved here - the watchman reviews with perfect vigilance
    character: Heimdall
    visual: "Carved-relief bronze plate aesthetic with weathered patina, ochre and verdigris palette warmed with polished-gold cuirass highlights, runic knotwork borders cut sharp and unbroken. A tall imposing Norse warrior in his early forties, perhaps six-foot-four and broad through the shoulders, long pale ash-blond hair to mid-back held back from the temples by two thin braids, a short closely trimmed pale-blond beard squared at the jaw, piercing pale golden eyes — pupils unusually small as if perpetually adjusted to brilliant light — set in a stern watchful expression, a row of nine small parallel scars across the brow ridge, one for each of the worlds he watches. Polished gold-toned scale cuirass over a deep oxblood-red wool tunic, a heavy braided leather strap diagonally across the chest from which hangs a long curved carved-bone Gjallarhorn at the right hip, a slender straight sword Hofund at his side. Low-angle hero shot from below, head turned in profile to the right scanning the horizon, both feet braced apart. Soft pale side-light from camera-right. Behind him, the suggestion of the Bifrost rainbow vanishing into mist."
