  ba:
    character: The Völva (Seeress)
    visual: "Carved-relief bronze plate aesthetic with weathered patina, ochre and verdigris palette deepened with raven-black fur, soft amber side-light, runic knotwork borders inscribed with seidr glyphs. An ancient Norse seeress in her late seventies, perhaps five-foot-three and stooped to leaning on her staff, deeply lined pale Scandinavian skin almost translucent at the temples, gleaming pale grey eyes barely visible beneath the heavy hood that shadows the upper face — only the lower jaw catches light, mouth set in faint knowing curve. A few wisps of long white hair escape at the temples. A pattern of small dark hand-tattooed dots traces both cheeks down across the chin. She is wrapped in a heavy black bear-fur cloak over a long dark indigo wool ritual robe stitched with seven small bronze charms across the chest, a leather pouch of carved bone rune-stones at her hip. A tall ash-wood völva-staff fully head-height carved end-to-end with rows of small angular runes is gripped vertical at her right shoulder, the upper end crowned with a small bronze cap. Three-quarter waist-up framing, the head turned in profile so the hood-edge cuts a hard line across the brow. Soft amber side-light from the right. Dim hearth-corner backdrop."
