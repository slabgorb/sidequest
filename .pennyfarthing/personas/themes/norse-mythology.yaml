    # JOB FAIR OPTIMIZED: Thor moved here - protector who manages the product
    character: Thor Odinson
    visual: "Carved-relief bronze plate aesthetic with weathered patina, ochre and verdigris palette dominated by storm-grey and rust-red, hard amber rim-light, runic knotwork borders cracked through by a lightning fissure across the upper edge. A massively broad-shouldered Norse man in his early thirties, perhaps six-foot-five and easily two-eighty of dense muscle, sun-darkened ruddy skin, long flowing copper-red hair to mid-back, a thick wide red beard braided in two heavy plaits with iron rings, fierce bright pale-blue eyes, a smashed crooked nose broken multiple times, a single missing back tooth visible when the mouth opens. He wears a riveted iron chainmail hauberk over a dark rust-red wool tunic, a wide leather belt with the bronze Megingjord buckle, iron knuckle-gauntlets. Mjolnir — a short-handled square stone hammer with a worn leather-wrapped grip far too short for the head — is held upright resting against his right shoulder, the runic engraving along the head visible. Low-angle hero shot from chest height looking up, body squared full-front, both feet planted apart. Hard amber lightning-flash side-light from the lower left throws huge shadow up the wall. Storm-dim grey backdrop with a single fork of distant lightning."
