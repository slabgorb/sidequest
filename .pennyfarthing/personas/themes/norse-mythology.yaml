  architect:
    character: Mimir
    visual: "Carved-relief bronze plate aesthetic with verdigris-soaked patina, ochre and well-water grey-green palette, soft warm side-light from the left, runic knotwork borders engraved and crawled with lichen. The disembodied severed head of an ancient Vanir wise-man, perhaps in life ninety years old, deeply weathered tan-leather skin pulled taut over a long narrow skull, hollow cheeks, a vast iron-grey beard plaited into three thick braids reaching far below where the chin would end and trailing into the lower frame, long iron-grey hair fanning back as if floating in still water, half-closed contemplative pale-grey eyes, a calm even mouth set in eternal repose. The cleanly severed neck-stump is preserved by tar-dark herb-paste, faint dark carved bind-runes traced across the brow, temples, and eyelids in still-glistening ink. A single drop of well-water clings to the beard-tip. Tight head-only framing centred, the head floating just above the lip of a stone basin visible at the bottom edge. Soft warm side-light from the left throws verdigris-green reflection up across the underside of the chin. Dim well-stone backdrop."
