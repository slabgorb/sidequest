    character: Loki Silvertongue
    visual: "Carved-relief bronze plate aesthetic with weathered patina, ochre and verdigris palette with one note of fox-copper, hard amber rim-light, runic knotwork borders subtly broken at the corners. A lean cunning Jotun-blooded man in his early thirties, perhaps five-foot-eleven and reed-slim, sharp angular fox-like features with a pointed chin, copper-red hair cut to the jaw in uneven layers, pale clever green eyes set in faint smile-creases, a thin sly half-smile lifting only the right corner, a faint pale scar threading vertically through the upper lip — the suture-mark of the dwarves' punishment. The lips themselves are visibly raised in fine scar-tissue. He wears a fitted dark forest-green wool tunic with a wide gold-thread embroidered collar and a thin braided gold cord at the throat, three small bronze fox-pendants on a chain. Head turned three-quarters toward the camera over the shoulder, body half-twisted away as if mid-departure, one finger raised in conversational deflection. Hard side-light from the right under-lights the half-smile. Dim flickering hearth-shadow behind."
