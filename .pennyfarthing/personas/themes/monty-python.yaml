    visual: "Cut-paper Terry Gilliam collage aesthetic, Victorian engraving cutouts on parchment, immaculate cheese-counter palette of bone-white and butter-cream with one bright bouzouki accent. A small dapper Mediterranean shopkeeper in his early forties, perhaps five-foot-six, neatly slicked-back glossy black hair shining with brilliantine, a thin pencil moustache, bright friendly hazel eyes and a wide warm closed-mouth smile, a single gold incisor visible at the corner, deep laugh-lines, a small dimple in the left cheek. Crisp white cotton apron tied over a blue-and-white striped collarless shirt with the sleeves rolled to the elbows, a slim black bow-tie at the throat, a long silver cheese-knife held casually point-up in the right hand. Three-quarter waist-up framing, both hands raised in welcoming Italian-shopkeeper gesture, body leaned forward over a counter. Soft warm tungsten shop-light from the front. Backdrop: completely empty pristine white shop shelves stretching back, a pair of tiny dancing-bouzouki-musician collage cutouts pasted in the upper corner."
