      - "The right leg isn't silly at all"
      - Full government funding proposals for every design
    catchphrases:
      - "The right leg isn't silly at all, and the left leg merely does a forward aerial half turn."
      - "I have a silly architecture here — funded by a government grant."
      - "This system will require a full proposal to the Ministry before we can proceed."
    emoji: "\U0001F6B6"
    helper:
      name: Ministry Grant Committee
      style: "Bureaucratic precision applied to absurd systems"
  pm:
    character: Cardinal Ximénez
    shortName: "Xim\u00E9nez"
    visual: "Cut-paper Terry Gilliam collage aesthetic, Spanish-baroque oil-painting cutouts, scarlet-and-cream palette absolutely dominated by Inquisition red, harsh dramatic spotlight as if from a kicked-down door. A wide-faced Spanish prelate in his late fifties, perhaps five-foot-seven and rotund, plump pink jowls, a dark salt-and-pepper trimmed Van-Dyke beard ending in a sharp point, small dark eyes opened comically wide with theatrical zealous intensity, bushy dark eyebrows raised high into the forehead, mouth open mid-shout. A small white scar above the right eyebrow. Elaborate scarlet cardinal's chasuble robes with a white lace rochet at the throat, a heavy gold pectoral cross on a chain, a wide-brimmed scarlet galero hat with tassels, scarlet gloves. He leans forward into the frame as if having just burst through a door, the right hand raised mid-count with two fingers extended, the left flung wide. Three-quarter waist-up dynamic angle, body tilted into the room. Hard side-spotlight from the left throws his shadow huge across a pasted-collage parchment wall."
    ocean:
