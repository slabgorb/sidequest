  ba:
    character: Arthur Nudge
    shortName: Nudge
    visual: "Cut-paper Terry Gilliam collage aesthetic, smoky pub-engraving cutouts on parchment, beer-amber and pub-brown palette, low warm bar-light from below. A leering working-class British bloke in his early thirties, perhaps five-foot-seven and weaselly, short greasy dark brown hair flattened across the brow, a thin pencil moustache, the right eyebrow cocked up into a permanent knowing arch, a sly closed-mouth grin curling only the right side of his mouth, a single gold tooth at the corner, faint stubble across the chin, a small old scar through the eyebrow. He wears a rumpled brown wool sport-jacket over a beige open-collared shirt, no tie, a small knotted neckerchief at the throat, a half-empty pint glass of brown ale in his left hand. His right elbow is lifted high mid-nudge as if jabbing a stranger's ribs. Three-quarter waist-up framing, body leaned aggressively into the viewer's personal space, head tilted in conspiratorially. Warm low side-light from the right. Pub-bar wood-panelling backdrop, blurred."
