    visual: "Red-figure Attic vase aesthetic translated to a painted portrait, with a terracotta-and-black palette, a single warm oil-lamp glow, and the slightly burnished pottery-glazed texture of fired clay. A stern goddess of wisdom in her late twenties, Mediterranean complexion warmed to terracotta, tall and severe. The defining landmark is a single fine vertical bronze nose-guard descending from the helm splitting the face down the bridge of the nose, paired with luminous pale grey eyes that are unusually pale against the warm skin. Serene unsmiling mouth, dark hair gathered tight beneath a tall bronze Corinthian crested helm with a thick black horsehair plume falling behind. A polished bronze breastplate embossed with the Gorgon's face over a draped white chiton, a small grey owl perched alert on the right shoulder. Three-quarter standing waist-up shot, body in classical contrapposto with the spear-shaft of an unseen weapon rising in the lower foreground. Warm oil-lamp side-light from the left glowing on the bronze, deep terracotta shadow on the right. Backdrop is a single dim fluted column edge behind one shoulder, nothing else."
    ocean:
      O: 5 # Very high openness - goddess of wisdom and craft
      C: 5 # Very high conscientiousness - strategic, disciplined
      E: 3 # Medium extraversion - thoughtful, observes before acting
      A: 3 # Medium agreeableness - just but not soft
      N: 1 # Very low neuroticism - calm wisdom
