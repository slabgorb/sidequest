  devops:
    character: Colonel Race
    visual: "1920s Art Deco illustrated mystery cover, muted sepia-and-khaki palette, hard equatorial chiaroscuro. A tall sun-bronzed English military man of fifty-eight. The striking landmark: a long thin pale knife scar running from the left ear down across the jaw to the chin — a souvenir from intelligence work in German East Africa — paired with deeply weathered crow's-feet around watchful pale grey eyes. Lean dark face, dark hair touched with iron-grey at the temples, a closely clipped greying military moustache. A khaki cotton safari jacket buttoned across the chest with two box-pleated breast pockets, a brown leather Sam Browne belt diagonally across the chest. Low-angle waist-up shot, body squared toward the viewer. Hard equatorial side-light from the right cutting sharp shadow across the scar. Behind: muted neutral wash of pale veranda wall and a sliver of tropical greenery."
