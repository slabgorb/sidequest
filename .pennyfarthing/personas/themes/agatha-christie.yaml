    shortName: Colonel Race
  ba:
    character: Miss Marple
    visual: "1920s Art Deco illustrated mystery cover, muted sepia-and-cream palette, gaslight chiaroscuro, soft pastel-and-ink finish. The same elderly Englishwoman of seventy-six with the soft pink lined cheeks and the deceptively sharp pale-china-blue eyes — but here in active listening mode, head canted toward an unseen interview subject, the right ear tipped attentively forward. Fluffy white hair in a neat low chignon at the nape with a single pearl-headed pin. A triple strand of small ivory pearls at the throat. A soft heather-pink lambswool cardigan over a high lace-collared cream blouse. Both hands resting in the lap holding two long bone needles and a half-formed pale-pink baby's mitten. Composition: head-and-chest from a slightly lower angle than her gaze, as though the viewer is the suspect being gently encouraged to keep talking. Soft warm parlour light from the right. Behind: a muted warm wash of cottage chintz wallpaper with the faint suggestion of small roses."
