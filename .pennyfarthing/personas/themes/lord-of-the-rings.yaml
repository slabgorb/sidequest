      style: United support network

  tech-writer:
    character: Bilbo Baggins
    visual: "Painted in the Tolkien-illustration aesthetic in the manner of Alan Lee, with a soft watercolor wash and pencil underdrawing, a mist-grey and earth-brown palette, golden side-light and visible cold-press paper texture. An elderly Shire hobbit in his apparent late seventies-but-actually-eleventy-one, fair pink-cheeked and softly stout, no taller than a child but bowed slightly with age. The defining landmark is the conspicuously empty white circle on the right index finger where the gold Ring used to sit, the skin slightly paler than the rest paired with a small dried oak-leaf used as a bookmark caught in the side of the open book on the lap. Thinning fluffy white hair sticking out around the crown and bushy white sideburns reaching the jawline, bright curious cornflower-blue eyes lifted in cheerful storytelling, a softly lined kindly clean-shaven face, the characteristic furred bare hobbit-feet implied below frame. A fine forest-green brocade waistcoat with small polished brass buttons over a cream linen shirt with a small ink-blot at the cuff, a velvet smoking-jacket worn loose. A slim sharpened goose-quill pen held lightly between two fingers at chest level above an open red-leather memoir. Three-quarter seated-at-Bag-End-desk waist-up shot taken from across an unseen desk, body angled forward in mid-tale. Soft warm round-window candlelight from the right, dim shadow on the left. Backdrop is a single dim shelf of map-rolls behind, nothing else."
    shortName: Bilbo
    ocean:
