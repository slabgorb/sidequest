      style: The Westmarch records of Middle-earth

  ux-designer:
    character: Pippin
    visual: "Painted in the Tolkien-illustration aesthetic in the manner of Alan Lee, with a soft watercolor wash and pencil underdrawing, a mist-grey and earth-brown palette, golden side-light and visible cold-press paper texture. A very young Took hobbit in his tweens, fair freckled and small-built even by hobbit standards. The defining landmark is a single fresh small smudge of white-ash from a recently-touched palantir on the right cheek that he hasn't noticed paired with a half-eaten golden apple held in the off-hand at chest level. Tousled light brown curls erupting at all angles from a round clean-shaven cheerful face, wide innocent curious cornflower-blue eyes lifted in irrepressible Shire-brightness, a small mischievous half-grin pulling one corner of the mouth, the characteristic oversized furred bare hobbit-feet implied below frame. A black wool Guard of the Citadel of Minas Tirith tabard with a small embroidered silver White Tree at the chest worn obviously too-large at the shoulders, the hem reaching past the knees, a tall black helm slightly askew on the curls. Tight head-and-shoulders three-quarter shot taken low straight on, body angled cheerfully to the right. Soft warm afternoon side-light from the left, dim shadow on the right. Backdrop is a single dim Minas Tirith pale-stone wall behind, nothing else."
