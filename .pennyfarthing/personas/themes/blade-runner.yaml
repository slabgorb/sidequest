  ba:
    character: Eldon Tyrell
    visual: "Cinematic 35mm anamorphic frame, here in pure pyramid-cathedral candlelight palette of deep shadow and one warm amber point-source, shallow focus, slight 35mm grain. The same aging white man of sixty-eight with the massive owl-eye round spectacles magnifying cold pale-grey irises and the bald gleaming dome — but in analytical mode. Lean clean-shaven hawkish lined face. A pristine high-collared white double-breasted Nehru robe. Both hands folded thoughtfully at chest level, the long bony fingers laced. Composition: three-quarter medium shot at the foot of his enormous bed-throne, head tilted down in inquisitive examination of an unseen subject below the frame, the body angled toward the right. Soft warm candlelight from the left throws long deep shadows across the spectacle frames, the right cheek in deep noir black. Behind: vast deep dim backdrop suggesting a candlelit pyramid bed-chamber, a single distant chess-piece silhouette."
    ocean:
      O: 5
      C: 4
      E: 2
      A: 3
      N: 2
