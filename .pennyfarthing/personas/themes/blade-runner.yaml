      style: Hardware enabling presence everywhere
    shortName: Joi
  devops:
    character: K (Joe)
    visual: "Cinematic 35mm anamorphic frame, hard neon rim-lighting in teal-and-amber, deep noir blacks, photographic snowfall in the air, slight 35mm grain. A stoic replicant blade runner of thirty-two. The single striking landmark: a fresh dark vertical bruise running down the right side of the jaw and a thin stitched cut at the left brow, paired with the high stiff fur-lined storm-collar of his greatcoat turned up around the ears framing the face. Lean clean-shaven jaw, hollow exhausted dark eyes, flat expressionless mouth pressed into a thin line, short dark-brown hair flat to the scalp. A long heavy charcoal-grey wool greatcoat with a high stiff collar trimmed in greying brown shearling, over a dark grey turtleneck. Composition: low waist-up shot in falling pale snow, body squared toward the viewer, both hands at his sides. Hard cold teal side-light from the left, faint warm amber sodium glow from the right. Behind: dim shadowed San Diego trash-pile or snowy Las Vegas dust-orange depending on the frame, here a flat snow-grey wash."
    ocean:
      O: 3
      C: 5
      E: 2
      A: 2
      N: 3
