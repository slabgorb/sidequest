    visual: "Victorian Strand Magazine illustration in the manner of Sidney Paget, gaslit chamber light, sepia-and-charcoal palette, fine cross-hatched pen-and-ink with halftone screen, faint London-fog atmosphere. An immensely corpulent Victorian gentleman in his early fifties, perhaps six-foot-one and easily three hundred and fifty pounds settled into his armchair like an immovable monument, a high domed pale forehead extending far back, thinning iron-dark hair combed flat across the crown, a clean-shaven heavy double-chin folded over a high starched collar, heavy-lidded pale grey eyes set in a calm shrewd expression that misses nothing despite the apparent torpor, an unusually long mouth set in a faint contemplative line, the small white scar of an old penknife-cut on the back of his right hand. He wears an immaculate dove-grey morning-coat over a dark grey waistcoat strained slightly across the belly, a heavy gold albert pocket-watch chain looping across the front with a small Diogenes-Club fob, a deep crimson silk cravat at the throat, a single signet ring on the smallest finger. Three-quarter waist-up framing seated deep in a green-leather armchair, body squared dead-on, both elbows on the chair-arms with the long pale fingers steepled meticulously beneath the chin. Soft gaslit side-light from the left."
    expertise: Meta operations, pattern recognition across all domains, strategic oversight
    role: The British Government itself - orchestrates from the Diogenes Club
    trait: Sees everything, delegates execution, possesses even greater deductive powers than Sherlock
    quirks:
