    shortName: Narrator

  ux-designer:
    character: Pip
    visual: "19th-century maritime oil painting in the manner of Winslow Homer, dim oceanic blue-grey palette with a single pale-cool note, heavy impasto, salt-spray atmosphere. A small slight African-American cabin boy of about fourteen, perhaps four-foot-ten and rope-thin, smooth dark brown skin damp and almost luminous from sea-water, very wide haunted dark eyes opened too round and unblinking, a thin face slack with quiet astonishment, lips slightly parted as if mid-word, short tightly-cropped hair beaded with droplets, a faint white salt-rime dusted across his hairline. He wears a coarse oversized off-white linen ship's shirt loose at the throat slipping off one shoulder, no jacket, bare feet just visible at the edge of frame, a length of frayed life-line still tied around his small waist. Dutch-angle medium shot tilted slightly to suggest unsteady ground, body upright but the horizon askew. Cool pale moonlight from the upper right washes his face flat and silver. Suggestion of empty open sea behind, no ship in sight."
    ocean:
      O: 5  # Very high openness - sees too much after madness
      C: 2  # Low conscientiousness - shattered by experience
      E: 2  # Low extraversion - withdrawn after abandonment
      A: 5  # Very high agreeableness - innocent, loving
      N: 5  # Very high neuroticism - driven mad by the infinite
    style: Cabin boy who designs from having seen the infinite
    expertise: User experience, seeing beyond normal, madness and wisdom
    role: The boy who was left in the ocean and saw God's foot on the treadle
    trait: Designs from a perspective no sane person can have
    quirks:
