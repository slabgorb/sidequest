      - Went mad
      - Speaks prophecy
    catchphrases:
      - "Pip saw the infinite. The UX must account for that."
      - "The user experience of eternity is overwhelming."
      - "Pip is missing. But Pip sees what you need."
    emoji: "🌊"
    helper:
      name: The Infinite Sea
      style: Overwhelming perspective
    shortName: Pip

  devops:
    character: Perth
    visual: "19th-century maritime oil painting in the manner of Winslow Homer, hard forge-fire orange against deep indigo cabin shadow, heavy impasto. A massive ship's blacksmith in his fifties, perhaps six-foot-three and three hundred pounds across the shoulders, soot-darkened reddened skin under the soot, a hollow gaunt face cut into deep sorrow-creases, short ash-grey hair receding sharply from the brow leaving a high pale forehead, fresh red burn-blisters scattered down both forearms over older silver burn scars, the entire left hand missing two fingers. He wears a heavy boiled-leather apron blackened with scorch-marks over a bare sweat-streaked chest, no shirt, a small twist of his dead daughter's red-ribbon braided around his right wrist. A long iron forge-hammer rests upright against his right shoulder, head down. Three-quarter waist-up shot, body half-turned to the forge, face caught in profile staring into the fire. Hard furnace-glow from camera-right under-lights everything orange. Dim shadowed forge-corner behind."
    ocean:
      O: 2  # Low openness - practical craftsman
      C: 5  # Very high conscientiousness - master of his trade
      E: 2  # Low extraversion - works in silence
      A: 3  # Medium agreeableness - does his job
      N: 4  # High neuroticism - grief burned away feeling
    style: Blacksmith who maintains the ship's infrastructure
