      - "Think not! Just deliver!"
      - "We're all going to die anyway. Might as well hit the deadline."
    emoji: "🚬"
    helper:
      name: The Pipe
      style: Philosophy through smoke
    shortName: Stubb

  tech-writer:
    character: Ishmael (Narrator)
    visual: "19th-century maritime oil painting in the manner of Winslow Homer, dim cabin-lantern light, brine-and-tar palette, heavy impasto. A young white American man in his mid-twenties, regular even features with a long melancholy mouth, dark brown hair to the collar in restless curls, mild hazel eyes set under a slightly furrowed brow, a faint shadow of stubble, a small white scar on his lower lip. A plain dark navy wool sailor's jacket over a coarse off-white linen shirt, fingers and the heel of his right hand stained black with iron-gall ink, a goose-feather quill held in the right hand mid-dip, a small leather-bound journal open across his lap showing dense crabbed handwriting. Three-quarter waist-up shot, seated at a small bolted-down chart-table, head bent forward over the page, eyes cast down. Soft single-candle side-light from the upper left throws long shadows across the journal pages. Plank wall and a single brass-cased compass behind."
