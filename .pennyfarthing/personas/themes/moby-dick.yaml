    visual: "19th-century maritime oil painting in the manner of Winslow Homer, dim oil-lamp light, brine-and-tar palette, heavy impasto. A young white American man in his mid-twenties, regular even features with a long melancholy mouth and a small white scar on the lower lip, dark brown hair worn loose to the collar, mild hazel eyes narrowed in concentration to faint creases, a faint shadow of week-old stubble, ink-stained fingertips. He wears a plain dark navy wool sailor's jacket over a coarse off-white linen shirt open at the throat, a stub of carpenter's pencil tucked behind one ear. A small leather notebook held open in his left hand at chest height, the right hand mid-gesture as if asking a question. Three-quarter medium shot, body angled toward camera, face turned in profile to address someone offscreen. Soft side-light from the right falls across the open page. Plank wall and a corner of a coiled hawser behind."
