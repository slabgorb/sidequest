# Repository Configuration for SideQuest (Python backend)
# Orchestrator pattern: parent repo tracks sprint files and shared config,
# subrepos (sidequest-server, sidequest-ui, sidequest-content, sidequest-daemon)
# are separate git repos with their own remotes.
# PRs go to individual subrepos, not the parent.
#
# History: sidequest-api (Rust) was the backend from ~2026-03-30 to 2026-04-19.
# ADR-082 ported it back to Python as sidequest-server; the Rust tree was
# removed from the working tree at cutover (2026-04-23) and archived at
# https://github.com/slabgorb/sidequest-api.

pr_title_format: "{type}({scope}): {title}"

gates:
  extensions:
    tests-fail:
      - wiring-check
    approval:
      - wiring-check

repos:
  orchestrator:
    path: .
    type: orchestrator
    description: Project coordination, sprint management, genre packs, and shared config
    branch_strategy: trunk-based
    default_branch: main

  ui:
    path: sidequest-ui
    type: ui
    description: SideQuest game client — React/TypeScript frontend
    language: typescript
    framework: react
    test_command: vitest
    build_command: tsc -b && vite build
    lint_command: eslint .
    dev_command: vite
    branch_strategy: trunk-based
    default_branch: develop
    notes: |
      React 19 + Vite + TypeScript + Tailwind CSS + shadcn/ui.
      Ported from sq-2/client/.
      Connects to sidequest-server via WebSocket.

  content:
    path: sidequest-content
    type: content
    description: Genre packs, world data, and shared game content (single source of truth)
    branch_strategy: trunk-based
    default_branch: develop
    notes: |
      Genre packs and game content extracted from the orchestrator.
      All repos reference content via sidequest-content/genre_packs/.
      Do not duplicate genre pack files in other repos.

  daemon:
    path: sidequest-daemon
    type: service
    description: SideQuest media daemon — image generation and audio mixing
    language: python
    test_command: pytest
    build_command: "true"
    lint_command: ruff check .
    dev_command: python -m sidequest_daemon
    branch_strategy: trunk-based
    default_branch: develop
    notes: |
      Python media services extracted from sq-2.
      Renderer daemon (Flux / Z-Image Turbo, MLX), audio mixer,
      scene interpreter, subject extractor, beat filter.
      TTS pipeline (Kokoro/Piper) was removed in 2026-04 — see ADR-076.
      Communicates with sidequest-server via Unix socket / HTTP.
      Shares genre_packs/ with the server for asset access.
      Out of scope for ADR-082 — serves uses beyond SideQuest.

  server:
    path: sidequest-server
    type: api
    description: SideQuest game engine — Python FastAPI backend with WebSocket API
    language: python
    framework: fastapi
    test_command: pytest
    build_command: "true"
    lint_command: ruff check .
    dev_command: uvicorn sidequest.server.app:app --reload
    branch_strategy: trunk-based
    default_branch: develop
    notes: |
      FastAPI + uvicorn + pydantic v2. Port target of the former
      sidequest-api (Rust) per ADR-082; cutover completed 2026-04-23.
      Gitignored inline subrepo — not tracked by the orchestrator.
      1:1 crate-to-package mapping preserved during the port to allow
      feature/span/test comparison against the archived Rust tree
      (https://github.com/slabgorb/sidequest-api) by path.
      See docs/adr/082-port-api-rust-to-python.md and
      docs/adr/085-rust-to-python-port-drift.md.
