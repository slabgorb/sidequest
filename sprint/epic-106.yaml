id: '106'
type: epic
title: WWN combat hardening for beneath_sunden — fair ramp, ruleset-bleed remediation, and narration truth
description: 'Source: 2026-06-13 single-player combat playtest of caverns_and_claudes/beneath_sunden (WWN ruleset, ADR-117), OTEL + save-forensics confirmed (sq-playtest-pingpong 2026-06-13). The #432 weapon-damage fix made dungeon combat winnable and the core loop is VERIFIED healthy (Strike ablates HP, reprisal ATTACK/DAMAGE telemetry split, beat-impact chip reads HP channel, lethality/death resolution correct). What remains is making L1 beneath_sunden a FAIR, WWN-faithful, TRUTHFUL ramp. Three threads: (1) Easy-ramp survivability levers — starting armor is never equipped so every Warrior fights at unarmored AC 10 (1-of-5 survived), and the per-beat opponent reprisal is unconditional and ignores defensive beats. (2) WWN ruleset-bleed — native mechanics running ungated inside a WWN-bound world: the confrontation edge/tag system in the chase, native per-tick + chargen-seed XP (135 XP at L1), and the reprisal model itself. Standing ruling: WWN-bound mechanical values come from the WWN SRD (.pennyfarthing/sidecars/gm-decisions.md, 2026-06-13). (3) Narration truth — convincing-narration-vs-mechanics lies (knockdown over-claim + hit-underclaim) and dead consumables (heal potion consumed + narrated but restores 0 HP). Keith priority within the epic: consumable-use-in-confrontation (heal-effect wiring + beat-menu inventory scan). Excludes UI polish (panel portraits, scrapbook captions, narration register) and the dungeon-scene/Monster-Manual cluster (Epic 107). Sibling: Epic 105 (beneath_sunden procedural-deep reachability). Refs: ADR-117 (RulesetModule), ADR-033 (beat engine), ADR-114 (ablative HP), ADR-123 (LethalityArbiter), ADR-059 (Monster Manual), beat_kinds.py, game/ruleset/, dice.py, wn_round.py, snapshot_slimming.py.'
priority: p1
status: ready
repos: server,content
