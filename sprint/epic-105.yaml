title: Beneath Sünden — make the procedural Deep reachable in live play (ADR-106 surface→deep crossing)
description: "Live-play dive 2026-06-12 (UI drive of caverns_and_claudes/beneath_sunden, OTEL + forensics confirmed). The ADR-106 megadungeon is FULLY BUILT but UNREACHABLE in real play. dungeon spans show materialize.commit seeded_entrance=true regions_committed=5 edges_committed=12 + setpiece_attach the_siphon at exp001.r3/r4 + dungeon_attach bootstrapped regions=6 — a complete Jaquaysed deep sits committed in the dungeon store. But the player never enters it: current_region walks ropefoot→the_dropmouth and STOPS (both static surface cartography regions); repeated region_projection 'current_region is a static cartography region (surface lane), not a node of the procedural dungeon graph — no projection' and dungeon.map_emitted discovered_regions=0/6 every turn. ROOT CAUSE: the surface→deep crossing (movement.py 59-12 handoff that binds PC to graph.entrance_id) is gated ENTIRELY behind the Haiku intent router classifying the action as movement{direction:deeper}, with NO deterministic backstop. Activity grid: movement fired turns 1-2 (ropefoot→the_dropmouth, surface-to-surface) but NOT on turn 3 — the most explicit descent ('down the rope into the dark tunnels until my boots find rock') was misclassified, no movement dispatch, and the narrator silently papered the gap with a location patch inventing 'The Dropmouth — The Deep' as a sub-location POI of the surface region (confabulated passages + a lurking threat). Violates No Silent Fallbacks + the OTEL principle: convincing narration, zero mechanical backing; the real megadungeon (the_siphon setpiece, 6 regions) unreachable behind the seam. NOT broken: chargen→game (works in UI; the headless WrongPhaseError is a driver-only pick_portrait gap), the authored Ropefoot opening (fires correctly), and the ADR-106 materializer (builds the deep faithfully). The defect is purely the binding/crossing. Sibling context: 90-6 fixed a related region-mode narration-drift confrontation-abandon in the same narration_apply neighborhood; 90-9 (backlog) also touches scripts/playtest.py chargen — coordinate the driver fix. Refs: ADR-106, ADR-055, ADR-113; movement.py:201-267 (59-12 handoff); narration_apply location_update; scenario scenarios/beneath_sunden_engagement.yaml (Story 59-15)."
