    type: epic
    title: Content Pipeline & Hero Shot Coverage
    description: "Content authoring pipeline ergonomics surfaced during the burning_peace promotion (2026-05-19). POI renders land at genre_packs/<g>/images/poi/ but the server's cover_poi resolver and lobby preview expect genre_packs/<g>/worlds/<w>/assets/poi/. Every promotion currently does the bridge step manually. Adjacent: audit all live worlds for missing hero shots (cover_poi files actually on disk / R2) and backfill where missing."
