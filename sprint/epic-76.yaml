  - id: 76-8
    title: Fix stale _StubSession in test_aside_channel_wiring (missing _retrieve_entities_for_turn)
    description: "PRE-EXISTING TEST FAILURE on develop, confirmed (unrelated) during 72-11 verify and flagged in PR #588's commit message. tests/handlers/test_aside_channel_wiring.py::test_aside_is_out_of_band_in_mp fails with: AttributeError: '_StubSession' object has no attribute '_retrieve_entities_for_turn' (raised from sidequest/handlers/player_action.py:496). Root cause: the test's _StubSession is STALE vs the universal-retrieval entity path (epic 75/76) — production _build_turn_context / session handling now calls session._retrieve_entities_for_turn(...), a method the stub never gained when entity retrieval landed. Fails in ISOLATION (not flaky/ordering), and is NOT touched by any 72-11 commit. This is a test-harness fix, not a production change. Repos: sidequest-server (test only)."
    points: 1
    priority: p3
    status: done
    repos: sidequest-server
    workflow: trivial
    acceptance_criteria:
      - _StubSession in tests/handlers/test_aside_channel_wiring.py gains a _retrieve_entities_for_turn method matching the production session contract (same signature; returns the stub-appropriate empty/no-entities result the real path would yield for a session with no entity index).
      - test_aside_is_out_of_band_in_mp passes BOTH in isolation and in the full server suite; the aside out-of-band behavioral assertion is unchanged (the fix is purely the missing stub method, not a change to what the test asserts).
      - No production code change; full server suite green (the 1 known failure is cleared); ruff clean.
    completed: '2026-06-03'
    type: bug
  - id: 76-9
    title: Consolidate duplicated test helpers — shared FakeSocket (16 copies, 2 shapes) + make_orchestrator (5 copies, cross-dir) into one shared support module
    description: 'Test-infrastructure hygiene surfaced during 75-8 (universal-retrieval e2e) verify/review. The server test suite re-defines two helpers many times: `_FakeSocket` (a recording WebSocket stub) has 16 copies across tests/agents, tests/server, tests/telemetry in TWO shapes — an instance-attribute form (`self.events` list) and a closure-over-`received` form (the dispatch tests) — and `_make_orchestrator` (`return Orchestrator()`) has 5 copies across tests/agents + tests/server. 75-8 deliberately did NOT consolidate these (a 2-of-16 partial fix creates inconsistency); the daemon-stub dedup landed separately in PR #596. This story does the COMPLETE sweep: pick one canonical home visible to all test dirs (root `tests/conftest.py` or a shared `tests/_support.py` importable module — NOT a per-dir conftest, since copies span tests/agents AND tests/server) and one canonical shape (the dominant `self.events` instance form), then migrate every site. Reconcile the closure-form consumers (dispatch tests assert on a `received` list) to the instance form without changing any behavioral assertion. Pure test refactor — no production code. While in the dispatch file, also clear the one pre-existing pyright `reportOptionalMemberAccess` on `span.attributes.get(...)` (narrow via the `_retrieval_span_attrs` pattern already used in test_universal_retrieval_e2e.py).'
    points: 3
    priority: p3
    status: backlog
    repos: sidequest-server
    workflow: tdd
    acceptance_criteria:
      - 'FakeSocket: a single canonical recording-socket helper lives in one shared location visible to tests/agents, tests/server, and tests/telemetry; all 16 prior _FakeSocket definitions are removed and reference it; the two shapes (self.events instance vs received-closure) are reconciled with no change to any behavioral assertion.'
      - 'make_orchestrator: a single shared factory (or fixture) replaces all 5 _make_orchestrator copies across tests/agents + tests/server; each call site imports/uses the shared one.'
      - While touching the dispatch file, the pre-existing pyright reportOptionalMemberAccess on span.attributes.get(...) in test_universal_retrieval_dispatch.py is cleared (narrowed attributes helper); pyright clean on touched files.
      - No production code change. Full server suite (uv run pytest tests/) green, plus tests/agents and tests/telemetry; ruff check + format clean. Verify no test lost coverage — the migration is behavior-preserving (existing assertions unchanged).
    type: refactor
