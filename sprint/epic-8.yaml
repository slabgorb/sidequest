id: '8'
type: epic
title: Multiplayer — Turn Barrier, Party Coordination, Perception Rewriter
description: >-
  Multi-player coordination. The Python version supports multiple WebSocket
  clients with barrier-sync turns, adaptive action batching, and per-character
  perception rewriting. Port the multiplayer session, turn manager, and
  perception rewriter to Rust, wiring into the existing session actor and
  orchestrator turn loop.
priority: p1
status: ready
repos: sidequest-api
