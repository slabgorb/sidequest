      - DROP the now-required-field gm_player_id kwarg from the remaining ~10 constructions (test_group_g_e2e, test_adr105_b3_private_segments, test_mid_session_join_lazy_fill, test_reconnect_from_cache, test_adr105_b1_secret_invariant_wiring, test_projection_filter, test_secret_routed_rides_turn_tx, test_predicates).
