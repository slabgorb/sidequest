  - id: 71-39
    title: "Wonderland POI slug↔region_id article normalization — align history.yaml POI slugs + R2 keys to the canonical region_id"
    description: |-
      FINDING (Architect / White Queen, 2026-06-04, verified against R2 + develop HEAD): wonderland's Location-tab POI landscape 404s NOT because the asset is missing — all 14 wonderland POI landscapes are ON R2 (r2_manifest.json + live cdn.slabgorb.com 200s; the FIXER's '404' hit a wrong slug, the_hall_of_doors.png, vs the real key hall_of_doors.png). The defect is a CONTENT slug mismatch unique to wonderland: cartography region_ids are mostly the_-prefixed (the_hall_of_doors, the_pool_of_tears, the_mad_tea_party, …) but the history.yaml points_of_interest[].slug values — and therefore the rendered R2 keys — DROP the article (hall_of_doors, pool_of_tears, mad_tea_party, …). oz and gulliver are internally consistent (region_id == POI slug == R2 key); wonderland is the ONLY offender (re-confirmed on develop: exactly 9 region-corresponding POIs mismatch).

      CONSEQUENCE: the Location-tab emit (#643, map_emit.py:585) builds the URL from room_id/region_id VERBATIM (genre_packs/.../poi/{region_id}.png) — its own comment assumes 'the authored region slug IS the R2 object key'. True for oz/gulliver, FALSE for wonderland → it requests the_hall_of_doors.png → 404 → silent text-only degrade. (Compounds with the lore-page gate, but that is the separate engine bug 71-38 — underscore-vs-hyphen slugify; THIS story is the wonderland content article mismatch.)

      DECISION (designer): the region_id is CANONICAL — it lives in save files (current_region/discovered_regions/pc_regions), cartography adjacency, and narrator location headers; renaming it would break saves. The POI slug + R2 asset key are leaves with NO save references. So align the POI side to the region_id (ADD the_ where the region carries it), do NOT rename region_ids and do NOT add an engine article-normalization shim (magic string munging = fragile, fails No-Silent-Fallbacks spirit). Same principle as 71-38: one canonical content identifier, used verbatim as the R2 key.

      THE 9 REGION-CORRESPONDING POIs TO RENAME (add the_; history.yaml slug + R2 object + r2_manifest.json key): chessboard_country→the_chessboard_country, coronation_feast→the_coronation_feast, garden_of_live_flowers→the_garden_of_live_flowers, hall_of_doors→the_hall_of_doors, hall_of_justice→the_hall_of_justice, mad_tea_party→the_mad_tea_party, pool_of_tears→the_pool_of_tears, queens_croquet_ground→the_queens_croquet_ground, tweedle_wood→the_tweedle_wood. LEAVE ALONE (already match, or POIs with no corresponding region): humpty_dumptys_wall (match), the_looking_glass (match), and the non-region POIs caterpillars_mushroom, duchess_pepper_kitchen, white_rabbits_house. Regions with no POI image (the_tulgey_wood, the_wood_of_no_names) untouched.

      REPOS: content (history.yaml POI slug renames) + R2 asset object renames (operator/daemon: S3 copy old→new key, drop old, update r2_manifest.json). No server/engine change. After this lands, wonderland's Location tab (#643) resolves with NO code change; the lore page additionally needs 71-38. Was filed as 65-18 before epic 65 archived; re-homed here.
