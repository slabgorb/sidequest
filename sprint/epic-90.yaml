  - id: 90-6
    title: Region-mode location-drift abandons live combat the turn it instantiates
    description: "Measured root cause (Perseus MP playtest 2026-06-06, server log). A combat/social confrontation DOES instantiate (initiative rolls; encounter_type=combat present) but is deactivated the SAME turn by a cosmetic scene re-title. In region-mode worlds the narrator drifts the scene title every turn (narrator.location_drift_repaired fires each turn); narration_apply.py's encounter-abandon block (~L3298 'if old_loc != result.location') keys off the raw location STRING, not the cartography region. Combat is category=combat -> not _encounter_is_mobile -> falls to the else at L3451 (emit encounter.deactivated_on_location_change L3455), outcome='abandoned_on_location_change'. Net: combat instantiates -> dies same turn -> next turn no active encounter -> no beat menu -> beat_selections=0 confrontation=None active=False forever; narrator free-hands hit/miss. The code at L3218-3244 ALREADY detects this is a same-region sub-location POI (region.entry_skipped_sub_location) and refuses to fork a new region, but the abandon block ignores that signal. NOT #707 (space_opera Firefight is resolution_mode beat_selection + win_condition hp_depletion, not opposed_check). NOT the ADR-113 confidence gate (per-dispatch gating is not operational; every dispatch fires). Distinct from 90-3 (which assumed instantiation works) and BLOCKS it for any region-mode ruleset world (perseus/swn, the_circuit/cwn). Repro: space_opera/perseus_cloud MP SWN, draw weapon (turn 3) then fire on Governance enforcers (turn 4). Fix lane: sidequest-server/sidequest/server/narration_apply.py only. Pingpong: ~/Projects/sq-playtest-pingpong.md (DRIVER UPDATE 2026-06-06)."
    points: 5
    priority: p1
    status: done
    started: '2026-06-06'
    repos: server
    workflow: tdd
    acceptance_criteria:
      - In a region-mode world, a narrator scene-title drift that stays within the same snapshot.current_region does NOT abandon an active confrontation — encounter.deactivated_on_location_change does NOT fire (OTEL span assertion on the Perseus repro path).
      - A confrontation continued across same-region drift emits a confrontation_continued_* watcher/OTEL span so the GM panel sees the engine CHOSE to continue (lie-detector; CLAUDE.md OTEL principle).
      - 'A REAL region change still abandons an anchored (non-mobile) confrontation — the 2026-04-30 negotiation-walk-out semantics are preserved (regression test: leave the region -> encounter.deactivated_on_location_change fires).'
      - Mobile (movement/chase) confrontations keep the existing _encounter_is_mobile continue behavior at L3418 (no regression).
      - 'Live proof on the Perseus repro: the combat encounter survives across turns; beat_selections>0 and an hp_depletion/strike damage patch lands on tracked enemy HP (re-run by DRIVER post-merge).'
    completed: '2026-06-08'
    branch: feat/90-6-region-mode-location-drift-abandons-combat
    type: bug
    review_findings: 'HIGH: same-region-continue elif not scoped to combat — continues all non-mobile categories incl. social, reintroducing the 2026-04-30 negotiation-walk-out abandon for region-mode worlds (oz). MEDIUM: tautological/non-wiring dispatch test; invalid-region heading abandons combat. Needs category-scoping + new social test.'
    review_verdict: approved
