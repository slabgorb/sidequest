    review_verdict: approved
  - id: 15-21
    title: "Wire level_to_defense — defense scaling ignored in combat resolution"
    description: >-
      level_to_damage() IS wired into CombatState::resolve_attack(). Its
      sister function level_to_defense() in progression.rs is never called.
      The defender's level has no effect on damage mitigation. Fix: call
      level_to_defense(defender.level()) in resolve_attack() and factor the
      result into damage calculation. OTEL event: combat.defense_applied
      (defender_name, level, defense_value, damage_before, damage_after).
    points: 2
    priority: p2
    status: done
