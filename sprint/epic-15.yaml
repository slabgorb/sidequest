  - id: 15-22
    title: "Wire tier_to_dimensions — image dimensions never sent to daemon, daemon guesses"
    description: >-
      tier_to_dimensions() in render_queue.rs maps SubjectTier to
      ImageDimensions (e.g., Portrait → 512×768). Never called from
      render_integration.rs or dispatch/render.rs — the daemon receives
      no dimension guidance and uses its own defaults. Fix: call
      tier_to_dimensions(subject.tier()) when building the daemon render
      request and include width/height in the request payload. OTEL event:
      render.dimensions_set (tier, width, height).
