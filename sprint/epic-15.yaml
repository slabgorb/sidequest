  - id: 15-15
    title: "Wire resolve_abilities — affinity tiers tick but unlocked abilities never computed"
    description: >-
      increment_affinity_progress() and check_affinity_thresholds() ARE called
      from dispatch/state_mutations.rs:174,211. But resolve_abilities() — which
      computes the cumulative set of abilities a character has unlocked across
      all affinity tiers — is never called. The narrator never knows what
      abilities the character has mechanically available. Fix: call
      resolve_abilities() in dispatch/prompt.rs after affinity context is
      assembled, inject the resolved ability list into the narrator prompt
      context. OTEL event: abilities.resolved (count, tiers_active,
      ability_names).
    points: 2
    priority: p1
    status: done
    repos: api
    workflow: tdd
    completed: '2026-04-02'
  - id: 15-16
    title: "Wire merchant system — execute_buy/sell/calculate_price/format_merchant_context all unwired"
    description: >-
      merchant.rs contains a complete merchant subsystem: calculate_price()
      applies markup/discount, execute_buy()/execute_sell() mutate inventory
      and gold returning MerchantTransaction or MerchantError,
      format_merchant_context() formats merchant inventory for narrator prompt
      injection. Zero callers in server or agents. Fix: when intent is
      Exploration or Dialogue and an NPC has merchant role in the registry,
      inject format_merchant_context() into the narrator prompt. When the
      narrator's WorldStatePatch contains a transaction (buy/sell), call
      execute_buy()/execute_sell() to mechanically resolve it instead of
      letting the narrator hallucinate inventory changes. OTEL events:
      merchant.context_injected (merchant_name, item_count),
      merchant.transaction (type, item, price, gold_before, gold_after).
    points: 5
    priority: p1
    status: done
    repos: api
    workflow: tdd
    completed: '2026-04-01'
  - id: 15-17
    title: "Wire chase cinematography — chase_depth context never injected into narrator prompt"
    description: >-
      chase_depth.rs has a full cinematography pipeline: phase_for_beat →
      danger_for_beat → terrain_modifiers → apply_terrain_to_rig →
      camera_for_phase → cinematography_for_phase → sentence_range_for_drama →
      format_chase_context. These are used internally by
      ChaseState::format_context() in chase.rs, but format_context() itself
      has no production caller. Fix: when a ChaseState is active in dispatch,
      call chase_state.format_context(decisions) and inject the result into
      the narrator prompt in dispatch/prompt.rs, same as format_lore_context
      and format_tone_context. OTEL event: chase.context_injected
      (phase, danger_level, camera, sentence_range).
    points: 3
    priority: p1
    status: done
    repos: api
    workflow: tdd
    completed: "2026-04-02"
  - id: 15-18
    title: "Wire materialize_world — world builder ignores progressive materialization"
    description: >-
      materialize_world() in world_materialization.rs takes CampaignMaturity
      and HistoryChapters and produces a narrative world description that
      expands as the campaign ages. WorldBuilderAgent in sidequest-agents uses
      CampaignMaturity to build prompts but never calls materialize_world().
      Fix: call materialize_world(maturity, &history_chapters) in the world
      builder agent and inject the materialized description into its prompt
      context. OTEL event: world.materialized (maturity_level, chapter_count,
      description_tokens).
    points: 2
    priority: p2
    status: backlog
    repos: api
    workflow: tdd
  - id: 15-19
    title: "Wire conlang knowledge — language learning, name bank, and prompt injection all unwired"
    description: >-
      Four unwired conlang functions: (1) record_language_knowledge() — should
      fire when a character learns a conlang word in narration, never called.
      (2) record_name_knowledge() — should fire when the NameBank generates a
      proper noun, never called. (3) query_language_knowledge() — should feed
      into prompt context so the narrator stays consistent with vocabulary the
      character already knows, never called. (4) format_name_bank_for_prompt()
      — formats NameBank for narrator prompt injection, never called. Fix: wire
      record_name_knowledge into the NameBank generation path. Wire
      record_language_knowledge into the narration post-processing when conlang
      morphemes are detected. Wire query_language_knowledge and
      format_name_bank_for_prompt into dispatch/prompt.rs. OTEL events:
      conlang.morpheme_learned (character_id, language_id, morpheme),
      conlang.name_recorded (name, language_id, gloss),
      conlang.context_injected (names_count, morphemes_count).
    points: 5
    priority: p2
    status: backlog
    repos: api
    workflow: tdd
  - id: 15-20
    title: "Wire StateDelta computation — broadcast_state_changes and delta.rs bypassed in server"
    description: >-
      delta.rs has StateSnapshot and StateDelta::compute() for diffing game
      state between turns. broadcast_state_changes() in state.rs converts a
      StateDelta into typed GameMessage protocol messages. Neither is called
      from sidequest-server — the server manually builds
      sidequest_protocol::StateDelta inline instead of using the game-crate
      computation pair. Fix: take a StateSnapshot before the turn in
      dispatch_player_action(), apply patches, then call
      StateDelta::compute() to produce the delta and
      broadcast_state_changes() to generate the broadcast messages. Remove the
      manual inline delta construction. OTEL event: delta.computed
      (changed_fields, snapshot_size_bytes).
    points: 3
    priority: p2
    status: done
    started: '2026-04-02'
    repos: api
    workflow: tdd
