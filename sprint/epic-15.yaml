  - id: 15-6
    title: "Combat engine wiring — intent router fires COMBAT_EVENT but combat system never engages"
    description: >-
      The intent router correctly classifies combat actions and COMBAT_EVENT messages fire over WebSocket. But the actual combat system never engages — enemies array is always empty, turn_order is empty, current_turn is empty. The combat is purely narrated, not structured. This is a half-wired feature: the classification works but the combat engine (creature spawning, encounter triggers, HP tracking, turn-based resolution) never activates.
    points: 5
    priority: p0
    status: done
    started: '2026-04-02T05:00:00Z'
    repos: sidequest-api
    workflow: tdd
    completed: '2026-04-01'
    branch: feat/15-6-fix-combat-engine-wiring
    assignee: keith
    review_verdict: approved
  - id: 15-7
    title: "Wire RAG pipeline end-to-end — accumulate_lore from turns, generate embeddings via daemon, switch to semantic retrieval"
    description: >-
      The RAG pipeline has three broken links. (1) accumulate_lore() in lore.rs is
      exported and tested but has ZERO non-test callers — lore_established on
      WorldStatePatch is populated by the orchestrator but never read back in
      dispatch to call accumulate_lore(), so the lore store never grows past its
      initial genre-pack seed. (2) LoreFragment supports optional embedding vectors
      and query_by_similarity() does cosine similarity search, but no embedding
      generation pipeline exists — the daemon has transformers installed but no
      /embed endpoint, and no Rust code calls one. (3) select_lore_for_prompt()
      in dispatch/prompt.rs:465 falls back to keyword substring matching because
      no fragments have embeddings — the semantic search path is dead code in
      production. Fix all three: wire accumulate_lore() into post-narration
      dispatch (read lore_established from WorldStatePatch, call accumulate_lore
      for each entry), add an /embed endpoint to sidequest-daemon that generates
      sentence embeddings via transformers, call it from the Rust daemon-client
      when creating new lore fragments, and upgrade select_lore_for_prompt() to
      prefer query_by_similarity() when embeddings are available. OTEL events
      required: lore.fragment_accumulated (category, turn, token_estimate),
      lore.embedding_generated (fragment_id, latency_ms, model),
      lore.semantic_retrieval (query_hint, top_k_scores, fallback_to_keyword).
    points: 8
    priority: p0
    status: done
    repos: api,daemon
    workflow: tdd
    assignee: dev
    review_verdict: approved
  - id: 15-8
    title: "Canonical GameSnapshot in dispatch — eliminate load-before-save round-trip on every turn"
    description: >-
      persist_game_state() in dispatch/mod.rs:1167 does a full SQLite load every
      turn just to merge 15 loose local variables back into a snapshot, then saves
      the merged result. Two actor-channel round-trips per player action. The root
      cause: the dispatch loop scatters game state across individual locals
      (ctx.hp, ctx.inventory, ctx.npc_registry, ctx.combat_state, etc.) instead
      of maintaining a canonical GameSnapshot. Fix: carry a mutable GameSnapshot
      in DispatchContext, patch it in-place as the turn progresses, and save it
      directly — one round-trip, no load. The load path stays for session restore
      on reconnect (dispatch_connect), but the hot path (every turn) becomes
      save-only. OTEL event: persistence.save_latency_ms (before/after
      comparison).
    points: 5
    priority: p1
    status: done
    assigned_to: keith.avery@1898andco.io
    started: '2026-04-01'
    repos: api
    workflow: tdd
    completed: '2026-04-01'
    review_verdict: approved
  - id: 15-9
    title: "Wire narrative_log SQLite table — append_narrative per turn, enable recap generation"
    description: >-
      PersistenceHandle::append_narrative() is fully implemented through the
      actor pattern (persistence.rs:447-457) but has ZERO non-test callers in
      sidequest-server. Instead, narration is pushed into snapshot.narrative_log
      (a Vec inside the JSON blob in game_state.snapshot_json) at
      dispatch/mod.rs:1242. This means the narrative_log SQLite table is always
      empty, recent_narrative() always returns [], and generate_recap() never
      produces a "Previously On..." summary. Fix: call
      state.persistence().append_narrative() from persist_game_state() for each
      new narrative entry. Stop appending to the snapshot blob's narrative_log
      vec (or keep it as a bounded rolling window for the current session only).
      On session restore, call recent_narrative() and populate the recap field
      in the CONNECTED response so returning players get a "Previously On..."
      summary. OTEL events: persistence.narrative_appended (round, author,
      content_len), session.recap_generated (entry_count, recap_len).
    points: 3
    priority: p1
    status: done
    repos: api
    workflow: tdd
    depends_on: 15-8
    completed: "2026-04-01"
  - id: 15-10
    title: "Wire seed_lore_from_char_creation — character backstory/hooks never enter lore store"
    description: >-
      seed_lore_from_genre_pack() IS called at session start (lib.rs:2182, 2388)
      but seed_lore_from_char_creation() is never called anywhere in
      sidequest-server. Character creation scenes chosen by the player contain
      rich backstory, hooks, and world context that should prime the lore store
      before the first turn. Fix: call seed_lore_from_char_creation() at the end
      of dispatch_character_creation() after the character is finalized. OTEL
      event: lore.char_creation_seeded (fragment_count, categories).
    points: 2
    priority: p0
    status: done
    repos: api
    workflow: tdd
    completed: '2026-04-01'
  - id: 15-11
    title: "Fix OCEAN shift pipeline — propose_ocean_shifts skipped between detect and apply"
    description: >-
      dispatch/mod.rs:912 calls detect_personality_events() then immediately
      calls apply_ocean_shifts() — skipping propose_ocean_shifts() entirely.
      The proposal step contains the logic table that maps event types to
      specific OCEAN dimension deltas. Without it, shifts are applied with
      hardcoded defaults instead of the calibrated per-event mappings. Fix:
      insert propose_ocean_shifts() between detect and apply at
      dispatch/mod.rs:912. OTEL event: ocean_shift.proposal (npc_name,
      dimension, proposed_delta, event_type).
    points: 2
    priority: p1
    status: done
    repos: api
    workflow: tdd
    completed: "2026-04-01"
  - id: 15-12
    title: "Wire SceneRelevanceValidator — art renders scenes that don't match current location"
    description: >-
      SceneRelevanceValidator::evaluate() (scene_relevance.rs) validates that
      an image prompt depicts the current scene rather than a stale or
      hallucinated setting. Fully implemented with 18 test cases. Never called
      in dispatch/render.rs or render_integration.rs. Fix: before calling
      queue.enqueue() in the render pipeline, call
      SceneRelevanceValidator::evaluate() with the prompt fragment and current
      snapshot. If verdict is Reject, skip the enqueue and emit OTEL gap event.
      OTEL events: render.scene_validated (verdict, score),
      render.scene_rejected (prompt_fragment, current_location, reason).
    points: 3
    priority: p1
    status: done
    repos: api
    workflow: tdd
    completed: "2026-03-30"
  - id: 15-13
    title: "Wire AchievementTracker — check_transition never called, achievements never fire"
    description: >-
      GameSnapshot holds an achievement_tracker field (state.rs:125).
      AchievementTracker::check_transition() evaluates trope status transitions
      against achievement definitions and returns newly earned achievements.
      Never called from dispatch_player_action(). Fix: in the trope tick loop,
      after calling trope.tick(), if the status changed, call
      achievement_tracker.check_transition(&trope, old_status). Broadcast any
      earned achievements as GameMessage events to all session players. OTEL
      event: achievement.earned (achievement_id, trope_id, trigger_type).
    points: 3
    priority: p1
    status: done
    repos: api
    workflow: tdd
    completed: "2026-03-30"
  - id: 15-14
    title: "Wire enrich_registry_from_npcs — NPC registry has regex-only data, ignores structured fields"
    description: >-
      update_npc_registry() in npc_context.rs builds NPC registry entries from
      narration text using regex. enrich_registry_from_npcs() in npc.rs
      backfills registry entries with structured NPC data (pronouns, faction,
      archetype) from the actual Npc objects on GameSnapshot. Never called.
      Fix: after update_npc_registry() runs in dispatch, call
      enrich_registry_from_npcs(&mut npc_registry, &snapshot.npcs) to merge
      in structured identity data. OTEL event: npc.registry_enriched
      (npc_name, fields_added).
    points: 2
    priority: p1
    status: done
    repos: api
    workflow: tdd
    completed: '2026-04-02'
