  - id: 15-27
    title: "Wire script tool invocation — encountergen, loadoutgen, namegen registered but never called by LLM"
    description: >-
      Server discovers and registers ADR-056 script tools (encountergen,
      loadoutgen, namegen) at startup. OTEL shows zero invocations across
      12+ turns. The LLM has these tools available but never calls them —
      encounters, loadouts, and NPC names are improvised instead of
      generated from genre pack data. Root cause: the narrator prompt
      doesn't instruct the LLM to use these tools, or the tool definitions
      aren't formatted for Claude's tool_use protocol. Fix: (1) verify
      script tools are registered as Claude tool_use definitions (not just
      logged). (2) Add narrator prompt instructions that explicitly direct
      tool usage for NPC introductions (namegen), combat encounters
      (encountergen), and starting loadouts (loadoutgen). (3) Verify
      tool_use calls appear in OTEL spans. OTEL events:
      script_tool.invoked (tool_name, genre, args),
      script_tool.result (tool_name, output_keys).
    points: 5
    priority: p1
    status: done
    started: '2026-04-02T08:06:39Z'
    repos: sidequest-api
    workflow: tdd
    completed: '2026-04-02'
    branch: feat/15-27-wire-script-tool-invocation
    assignee: keith
  - id: 15-28
    title: "Reinforce narrator structured output compliance — footnotes, quest_updates, scene_mood"
    description: >-
      The narrator prompt asks for structured fields (footnotes,
      quest_updates, scene_mood, npcs_present) but Claude inconsistently
      produces them. Footnotes fire on turn 1 (Backstory intent) then
      stop. quest_updates appear 2/12 turns. scene_mood is rarely
      included. Root cause: the JSON schema example shows these fields but
      doesn't strongly enough reinforce that they're required every turn.
      Fix: (1) Add a "REQUIRED EVERY TURN" checklist to the narrator
      prompt immediately before the JSON schema. (2) Move the JSON schema
      to the Anchoring zone (higher attention). (3) Add a post-extraction
      validation that logs warnings when expected fields are missing, so
      OTEL shows compliance rate. (4) For quest_updates specifically, add
      quest objective context to the narrator prompt so the LLM can track
      progress against known objectives. OTEL events:
      extraction.compliance (turn, fields_present, fields_missing).
    points: 3
    priority: p1
    status: canceled
    repos: sidequest-api
    workflow: tdd
  - id: 15-29
    title: "Wire append_narrative to SQLite — narrative_log table never written to"
    description: >-
      persist_game_state() appends narration to snapshot.narrative_log
      (in-memory) and saves the snapshot blob. But the dedicated
      narrative_log SQLite table (created by schema, queried by
      recent_narrative()) is never written to. append_narrative() in
      persistence.rs exists but has no caller. Fix: after appending to
      snapshot.narrative_log in persist_game_state(), also call
      persistence.append_narrative() to write to the SQLite table.
      This enables recent_narrative() for "Previously On..." reconnect
      recaps. OTEL event: persistence.narrative_appended (turn, length).
    points: 2
    priority: p2
    status: done
    repos: sidequest-api
