    title: "Sealed-letter world-state handshake between turns — after each player turn, emit a minimal shared-world delta (current location, active encounter id, party formation/adjacency) that seeds the next player's turn so narrator stops fabricating physical separations to explain party-mate absence. Playtest 3 2026-04-19: Orin's save invented a 'collapsed corridor' separating him from Blutka because Orin's game_state had no ground-truth that Blutka was in the same room fighting the same scavengers. Canonical: location, encounter presence, adjacency. Perceived (stays POV): mood, tactics, what the peer is feeling. OTEL span on handshake merge with conflict-resolution events."
