    title: "Scrapbook render trigger rate policy — image generation is arbitrary and sparse, no visible density contract (playtest 3 2026-04-19): Felix's 71-turn aureate_span session produced only 6-8 renders during the playtest window out of 71 scrapbook rows. Effective rate ~1 render per 11 turns across all 3 concurrent sessions. SOUL.md's 'Cost Scales with Drama' says renders should be selective — quiet walk cheap, dramatic beat expensive — but current behavior looks arbitrary, not policy-driven. There is no inspectable contract for 'when does a scrapbook entry get a render', no OTEL span showing the trigger decision, no density target per session. Fix scope: (a) define explicit trigger contract — e.g. always render on beat fire, on scene/location change, on named-NPC introduction, on resolved-encounter; skip render on banter/aside/quiet-check turns, (b) expose trigger reasoning in OTEL span (render.trigger reason=beat_fire|scene_change|npc_intro|resolved|none_policy) so GM panel shows density and cause, (c) session-level density target (e.g. 'at least one render per 3 turns on average' or 'every scene change') and backpressure-aware enforcement, (d) UI indicator in scrapbook tab when a row was eligible but skipped vs requested-but-failed. Relates 37-30 (session-to-job mapping — NULL image_url linkage), 37-33 (embed worker timeout). This is the trigger layer; 37-30 is the delivery layer."
