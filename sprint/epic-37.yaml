  - id: 37-38
    title: 'State write-back hygiene — bookkeeping counters and handshakes run but never persist (playtest 3 2026-04-19): (1) total_beats_fired frozen at 0 across all 3 saves despite real beat fires — Orin had 5 fired beats including a fully-Resolved extraction_panic trope (beats 0.3/0.6/1.0) yet counter stayed 0; any beat-gated unlock perpetually blocks (relates 37-14). (2) encounter.outcome=null on both resolved Mawdeep encounters (Blutka resolved=true beat=6, Orin resolved=true beat=1) — resolution handshake never writes outcome back so reload may re-enter stale encounter (relates 37-12). (3) Scrapbook entries not backfilled when prior save carried forward — Orin scrapbook covers 10 of 29 rounds, subsystem blind to rounds 11-29 for context injection. (4) turn_manager.round lags narrative_log max_round — Felix turn_manager.round=65 but narrative max=72, 7-round gap so round-keyed gating operates on stale round data. (5) NPC.last_seen_turn stale — Orin Scavenger last_seen_turn=3 but creature appeared and died rounds 19-28. Add OTEL spans on each write-back so GM panel shows which handshakes fire. Common root: write-back paths exist in individual handlers but trunk state fields are never updated by the resolution/tick pipeline.'
    points: 5
    priority: p1
    status: backlog
    repos: sidequest-api
    workflow: wire-first
    type: bug
  - id: 37-39
    title: "Inventory lifecycle — items persist through consume/discard and containers re-populate on revisit (playtest 3 2026-04-19): (1) Blutka starting kit double-initialised — 24 items including 6 torches, 2 waterskins, 4 rations, 2 chalk, 2 ten-foot poles; first 11 are stub-batch ('Starting equipment (x): Y') and next 13 are catalogue entries, both appended without dedup. Character init runs twice on first-turn path. (2) Consumables not removed on use — Orin drank vial round 12 but glass_vial remained in inventory; second vial appeared as distinct item glass_vial_dark_liquid after re-entering same room round 18. Two live vial items in final inventory. (3) Same container re-openable — Orin knocked the same tin box off the same wall in rounds 10 and 16, retrieving identical contents both times. Object-state not flagged as already-retrieved on room re-entry. (4) Weapon.state=Carried after explicit narrative discard — Blutka 'abandons the spear where it stands — shaft quivering in scavenger meat' (round 9) but spear still shows state=Carried in final inventory. (5) Consumed-state set but item not removed — Felix maintenance_kit.state=Consumed after patch-foam use rounds 14-16 and foil-strip tear round 48, but kit remains in inventory list with quantity=1. Extractor writes Consumed but removal pass never runs. All five symptoms converge on state_mutations.rs inventory write path — post-narration item lifecycle needs consume/discard/dedup enforcement with OTEL on every mutation. Relates 37-3, 37-10."
    points: 5
    priority: p1
    status: backlog
    repos: sidequest-api
    workflow: wire-first
    type: bug
  - id: 37-40
    title: "Chargen + template + slot-reuse — evropi session blockers (playtest 3 2026-04-19): (1) Stale-slot reuse kills sessions — prot_thokk and hant saves created 2026-04-19T16:31 UTC but narrative_log holds a single entry dated 2026-04-18; session never fired Turn 1 (last_played == created_at, turn_manager frozen at round=0/interaction=2). Prior-day narrative survived session reinit because DB row wasn't cleared. Session lifecycle must either clear old rows on reinit or refuse to write over a populated slot (relates 37-29, 37-1). (2) Chargen completes partially — pumblestone_sweedlewit has resolved_archetype=NULL, no hp/ac, and never advanced past opening. Chargen pipeline has a success path that skips archetype binding (relates 37-7). (3) Template placeholder leak — all 6 evropi saves carry world_history[0].character.name='{{generated at session start}}' unresolved, polluting narrator context on every turn (relates 37-21). (4) Hardcoded description template — 'A Human {class}' written regardless of race (prot_thokk Half-Orc, hant Antman, pumblestone Gnome, rux Kobold). Chargen sets description from a human-assumed template before race substitution. (5) Notorious-party mechanic fires in solo sessions — Rux leaked into pumblestone's solo narrative prose (narrator referenced him by name) because world config seeds a known-party context regardless of player count. Session count needs to gate notorious-party seeding. Common thread: chargen/session init writes templated defaults that never get overwritten with real values, and slot reuse doesn't clean prior state."
    points: 5
    priority: p1
    status: backlog
    repos: sidequest-api
    workflow: wire-first
    type: bug
  - id: 37-41
    title: "State completeness bundle — subsystems write partial or skipped state (playtest 3 2026-04-19): (1) current_region='' empty string across both Mawdeep saves — should be 'mouth' slug; region-conditional logic (atmosphere, trope region-filter, no-exit routing) silently misses on falsy check. (2) discovered_regions pollution — Felix save has '(aside — narrator brief)' registered as a traversable region alongside legitimate room names; aside rounds leak into region graph. (3) current_region freetext-vs-slug dedup — Felix discovered_regions contains both 'The crew quarters of a beat-up freighter docked at a station you can't afford to stay at' and 'The Crew Quarters — Freighter Unpaid Debt' as separate regions for the same room; needs slug normalization at write. (4) encounter.actors missing non-player combatants — Orin encounter.actors=[Orin only] through 6 rounds of combat with Crawling Scavenger; per-actor damage/momentum tracking impossible. (5) world_history arcs freeze at turn 30 — Felix has 4 arcs (fresh 1-5, early 6-12, mid 13-20, veteran 21-30) covering turns 1-30 only, session reached turn 72; turns 31-72 have no arc context, campaign_maturity injection operates on 30-turn-old snapshot. (6) Resolved tropes don't write quest_log or active_stakes — Orin extraction_panic Resolved and hireling_mutiny at 0.255, yet quest_log={} and active_stakes='' (empty string everywhere). Resolution pipeline doesn't seed durable record. (7) NPC registry HP=0/max_hp=0 — Orin Crawling Scavenger registered but combat stats never written, HP-check on registry entry sees always-dead creature. (8) Player turns not persisted to narrative_log — Felix 71 entries all author='narrator', zero player-turn entries; subsystem engagement not verifiable from log authorship. (9) world_history arc embedded narrative_log and lore all empty despite 71 turns of dense story — arc-embedding pipeline either not running or not writing back. (10) NPC auto-registration missing — Blutka hireling Pell introduced rounds 2-3 never added to npc_registry; future references would treat him as hallucination. Shared theme: state subsystems have write paths but the trunk dispatch doesn't invoke them, or invokes them with partial data. Each sub-item needs an OTEL span marking the write path fired so GM panel can surface drift."
    points: 8
    priority: p2
    status: backlog
    repos: sidequest-api
    workflow: wire-first
