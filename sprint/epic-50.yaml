      - 'AC-2 (narrator->ADR-074 seam, the missing wire): a player-actor uncertain outcome routes through opposed_check / a player-facing DICE_REQUEST (the dispatch/dice.py:321 emit machinery already works and game/opposed_check.py already resolves from client d20 faces); the narrator defers the outcome tier to the returned face and MUST NOT pre-write it; free-text tier-emission for player-actor uncertainty is forbidden the way section 4 forbids unstructured confrontation resolution. Verifiable: a player-actor check produces a DICE_REQUEST plus an encounter.opposed_roll_resolved span, not a prose number.'
      - 'AC-3 (roll_dice span attribution): agents/tools/roll_dice.py (around lines 62-65) adds a session/world OTEL attribute to the tool.gen.roll_dice span. Verifiable: a tool.gen.roll_dice span carries the session id, so a future audit can bind a private roll to its game without the temporal argument OQ-1/OQ-2 were forced into.'
