id: '50'
type: epic
title: Pingpong-archive triage and dropped-work cleanup
description: |-
  Surfaced by the 2026-05-13 pingpong-archive audit of 31 files spanning the
  five playtest closeout cycles. Headline finding: 131 entries reached
  `Status: open` and 116 reached `Status: fixed` against only 20 `verified` —
  the verification stage of the protocol is the leakiest, and the fast-loop
  treats "merged PR" as terminal even though the protocol does not.

  Two structural anti-patterns recurred across archives:

  1. **OTEL-detector-as-fix.** A bug surfaces → fix-team adds an OTEL span
     to detect it → status flips to `fixed` → root cause never addressed.
     Telemetry becomes a permanent monument to an unfixed thing. Cleanest
     case: PR #177 added `confrontation.skipped_with_trigger_keywords` but
     never wired the encounter instantiation that the prose-trigger
     keywords implied.

  2. **Server-half done, UI-half silent.** A subsystem ships on the server,
     marks `fixed`, and never reaches `verified` because the UI consumer
     was never built. Cleanest case: recruitment subsystem maintains a
     server-side companion roster; PartyPanel never rendered it. When
     playtests rotated genres (MP → solo → social-first), the gap went
     un-exercised for ~6 days.

  Epic 50 holds the cleanup follow-ups from that audit. Most archived
  `fixed`-without-`verified` items are paperwork-debt (PRs landed, tests
  passed, formal flip skipped). The stories in this epic are the
  not-paperwork-debt subset: items that almost certainly are still broken
  in the running stack and the audit could justify naming.

  Process change captured here separately from any one story: future
  pingpongs should rename `fixed` → `merged` and require the driver
  re-test step before declaring `verified`. The protocol step exists
  (sq-playtest §3e), the archive ratio shows it isn't being followed.
priority: p2
status: active
repos: orchestrator,sidequest-server,sidequest-ui
