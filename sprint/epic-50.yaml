  - id: 50-2
    title: Narrator confrontation-trigger detection — instantiate the encounter, not just an OTEL warning
    description: |-
      Found 2026-04-26 in archive `sq-playtest-pingpong.archive-20260506-074557.md`. Narrator describes prose that contains confrontation trigger keywords (`chase`, `intercept`, `scandal`, `negotiation`, etc.) but emits `confrontation=None` in the structured-output sidecar; the encounter is never instantiated. PR #177 added the warning span `confrontation.skipped_with_trigger_keywords` but the work that was implicit in "fixed" — actually instantiating the encounter on trigger detection — was never done. This is the cleanest example of the OTEL-detector-as-fix anti-pattern uncovered in the 2026-05-13 audit: telemetry lights up the gap while the gap persists.

      Scope is prompt-engineering work in the narrator structured-output schema, not keyword extension. The narrator must be reliably steered to either (a) emit a proper confrontation block when its prose introduces a stake-binding trigger, or (b) avoid the trigger language entirely when there's no encounter to bind. The OTEL warning becomes a regression detector, not a permanent monument.
    points: 5
    priority: p2
    status: done
    started: '2026-05-13'
    repos: sidequest-server
    workflow: tdd
    acceptance_criteria:
      - When narrator prose introduces a confrontation trigger keyword (chase/intercept/scandal/negotiation/social_duel/trial/auction), the structured-output sidecar emits a non-null confrontation block in the same turn
      - The encounter is instantiated server-side on receipt of that block (existing dispatch path)
      - "`confrontation.skipped_with_trigger_keywords` warning span only fires for residual edge cases, not as the steady-state behaviour"
      - Integration test covers each of the 7 trigger keywords with prose fixtures from prior playtests; each fixture results in a real confrontation, not just the warning
      - OTEL evidence on the next playtest shows `confrontation` populated on trigger-keyword turns; the dashboard can no longer use the warning span to find unfixed cases
    completed: '2026-05-13'
    branch: feat/50-2-narrator-confrontation-trigger-instantiate
    assignee: slabgorb
    type: bug
  - id: 50-3
    title: PartyPanel renders recruited companions section — server roster correct, UI was silent
    description: |-
      Found 2026-05-07 in archive `sq-playtest-pingpong.archive-20260507-085200.md`, repeated in `sq-playtest-pingpong.archive-20260508-pre472.md`. The recruitment subsystem maintains a server-side roster of companion NPCs; the UI `PartyPanel` component has no element to render them. The bug was marked `fixed` on the server-side at the time but never reached `verified` because the UI half wasn't wired. Playtests moved to tea_and_murder solo immediately afterwards, leaving the UI gap silently broken for ~6 days.

      Sebastien-axis loss: recruited companions are mechanical state players cannot see. Aspirational household-audience loss: companion-driven play (which is half the Heavy Metal / road_warrior pitch) is invisible.

      Resolution 2026-05-13: silently-fixed by 2026-05-06/07 commits (sidequest-ui 890dc4b/6d7fdd3/784147b). 50-1 pingpong triage carried a stale-read forward without re-testing. Workflow switched mid-flight tdd→trivial. Deliverable: companions-app-wire-integration.test.tsx (sidequest-ui PR #236, merged) — the genuine App-level wiring guard the pre-existing companions-party-status-wiring.test.tsx never actually was. AC2/AC4 split-party-location deferred as out-of-scope (new feature, not in original bug report).
    points: 3
