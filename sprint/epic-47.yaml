  - id: 47-9
    title: Magic — force first innate_v1 firing on Coyote Star with GM-panel observability
    description: 'Magic subsystem is wired end-to-end but never invoked: 1 working_log entry across 7 saves / 111 turns. Architect audit (2026-05-07) found the wiring is intact — the narrator prompt is reactive ("emit magic_working when prose depicts a working") with no proactive trigger to depict one. innate_v1 has fired zero times because nothing in the prose flow stresses a character into reflexive surfacing. Fix: make magic surfacing PROACTIVE on innate-active worlds via prompt strengthening + a worked example in the <magic-context> block + a scripted innate-firing opening on coyote_star. TDD via headless scenario assertion. Out of scope: caverns_and_claudes magic content gap (independent — story 47-7 owns); learned_v1 plugin (specced, not implemented); organic emission UX tuning (separate iteration). Architect approved: scripted-opening-induced firing is acceptable proof for 47-1 Phase 4 cut-point closure. UNBLOCKS: 47-2 (smoke verification) and 47-5 (multiplayer playtest).'
    points: 3
    priority: p2
    status: done
    started: '2026-05-07'
    repos: server,content
    workflow: tdd
    acceptance_criteria:
      - innate_v1 worked example block injected into <magic-context> prompt zone via context_builder.py when innate_v1 ∈ active_plugins (one paragraph showing stress → reflexive surfacing → sanity cost → magic_working JSON shape)
      - "Narrator's CRITICAL MAGIC RULE rewritten in narrator.py to be plugin-aware and proactive: on innate-active worlds, every PC action under stress MUST consider whether reflexive innate flavor surfaces, with a debit applied"
      - coyote_star opening line in openings.yaml scripted to stage an inevitable innate working on turn 1 (PC under immediate stress, innate surfaces, sanity bar debits)
      - 'Headless playtest scenario at scenarios/ asserts: at least one magic.working OTEL span emitted with plugin=innate_v1 in the first 5 turns'
      - Same scenario asserts working_log length ≥ 1 and character sanity bar value < 1.0 after the scripted opening turn (proves cost was debited, not just narrated)
      - GM dashboard (just otel) verified to display the magic.working span with plugin, actor, costs_debited, and ledger_after fields populated
      - Save/load roundtrip preserves magic_state.working_log and ledger bar values (regression check; AC3 from 47-1)
    completed: '2026-05-07'
  - id: 47-10
    title: C&C memorization wiring — prepared-list gate, null-stat auto-apply, init seeding, UI panel
    description: 'Final wiring pass for C&C memorized-spell casting. Spec at docs/superpowers/specs/2026-05-06-magic-system-caverns-and-claudes-implementation-design.md (amended 2026-05-09 — dual-plugin pivot: learned_v1 = data-layer infrastructure, innate_v1 = player-facing surface for cast_spell beat). Infrastructure already shipped in PRs #220/#193/#221/#194 (merged 2026-05-09): MagicWorking studied/granted, ClassDef.magic_config, MagicState.known_spells/prepared_spells, spell_catalog loader, learned_v1 plugin + ops, magic_init.seed_learned_v1_state helper, arcane_l1.yaml (12 spells), divine_l1.yaml (8 spells + 3 reverses), cast_spell beat with class_filter and resource_deltas. This story does the seven remaining tasks that turn that infrastructure into a playable Mage/Cleric — see acceptance_criteria. NOT included: cantrip mechanics (open question 2 — defer until playtest), L2+ spells (content scaling), per-level resource_deltas routing (one-line follow-up after L2). UNBLOCKS: full Sünden delve playtest with Mage and Cleric.'
    points: 8
    priority: p1
    status: done
    started: '2026-05-09'
    repos: sidequest-server,sidequest-content,sidequest-ui
    workflow: tdd
    acceptance_criteria:
      - 'Init wiring: server/magic_init.init_magic_state_for_session calls seed_learned_v1_state for actors whose ClassDef has magic_config; populates MagicState.known_spells[actor], MagicState.prepared_spells[actor]={}, and spell_slots_lN_<actor> ledger bars at session start. Wiring test: a fresh Sünden session with a Mage character has the bars and collections present without any test-only seeding.'
      - 'classes.yaml: caverns_and_claudes Mage and Cleric ship magic_config blocks (B/X canon slot tables, starting_known_spells 2, save_dc_stat INT for Mage / WIS for Cleric, turn_undead true on Cleric). magic_access stays innate_v1 (already shipped).'
      - 'World magic.yaml: worlds/caverns_sunden/magic.yaml authored with active_plugins [item_legacy_v1, innate_v1, learned_v1], divine_favor ledger bar (bidirectional, [-1.0, 1.0], thresholds plus/minus 0.7, applies_to_classes [cleric]), and the Sünden narrator_register block from spec section 4.'
      - 'Prepared-list gate: game/beat_filter.beats_available_for extended with prepared-spells parameter; cast_spell beat is unselectable when actor has zero spells prepared at any level (case distinct from "no slots remaining"). New OTEL decision value: rejected_unprepared. Fighter/Thief unaffected.'
      - 'Null-stat auto-apply: spell-cast resolution branches on save.stat is None — auto-applies effect_template, skips opposed-check, emits save_skipped true on innate_v1.cast span. Spell-catalog validator rejects save.stat null paired with save.effect != none (existing arcane_l1.yaml + divine_l1.yaml must pass; Magic Missile and Cure Light Wounds are the canonical null-stat rows).'
      - 'innate_v1.cast OTEL span: emitted on every successful cast_spell resolution carrying actor_id, spell_id, validator_outcome, slot_consumed, save_skipped (bool), and (when save_skipped false) save_stat / save_result / damage_applied. Existing learned_v1.cast span survives for direct-test paths.'
      - 'Context block: magic/context_builder renders learned-magic block (known / prepared per-level / slots remaining per-level) when MagicState.prepared_spells[actor] is populated; ADR-009 invariant test asserts narrator does not name an unprepared spell in narration output.'
      - 'UI panel: LedgerPanel inside CharacterPanel renders the magic block for casters — known spells (collapsible), prepared spells per level with slot indicator, spent spells shown struck-through-but-visible until rest, divine_favor bar with threshold markers (Cleric only), Turn Undead button (Cleric, enabled when undead in scene). Default tier is the flavor register; Sebastien-tier numeric overlay deferred.'
      - 'Pulse-not-popup rejection: when beat-filter rejects cast_spell for unprepared spell, the prepared list pulses (CSS animation, around 600ms), unprepared spell name appears struck-through in cast-attempt log, narrator nudge replaces input. No modal; game time does not roll back.'
      - 'Integration test (against real session, not mocks): Mage in Sünden runs chargen, walks to Grimvault, declares "I prepare Sleep and Magic Missile" at safe site, casts Magic Missile (auto-apply, no save), casts Sleep (WIS save), exhausts L1 slots, returns to Lampwick, declares "I rest", re-prepares. All five expected OTEL spans fire (learned_v1.prepare, innate_v1.cast x2, learned_v1.rest, learned_v1.prepare). Save/load roundtrip preserves prepared_spells and slot bars.'
      - 'Smoke playtest: full Sünden delve with Mage and Cleric playable end-to-end; OTEL dashboard observed by Keith; cast economics (slot drain, prepared list accuracy) confirmed at table.'
    completed: '2026-05-09'
    branch: feat/cc-magic-memorization
