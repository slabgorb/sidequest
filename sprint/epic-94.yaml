id: '94'
type: epic
title: Genre/World Boundary Correction — Genre is Rulebook, World Owns Cast/Catalog
description: "Corrects the genre/world boundary (supersedes ADR-120 'mechanics-in-genre'): the genre tier is the RULEBOOK ONLY (resolution rules, progression, tone/voice axes, narrator voice, lethality/visibility policy, theme/audio chrome). The CAST and CATALOG — archetypes, tropes, char_creation, inventory, classes, chassis_classes, seed_tropes, power_tiers, bestiary — are world-authoritative. Keith's hand-migration moved these files to worlds; the schema+loader contract was corrected (genre cast/catalog files optional + per-world resolution invariant) and content-validate-all is green for all 11 packs. Remaining: repoint runtime consumers that still read the moved files at the genre tier (ADR-120 Epic-74 74-2 consumer-repoint phase, now owed) + author a superseding ADR."
priority: p1
status: in_progress
repos: server,content
stories:
  - id: 94-1
    title: Repoint genre-flavor consumers to the world tier — fix 20 regressions from the cast/catalog migration
    description: |-
      Keith's hand-migration moved the cast/catalog files (archetypes, tropes, char_creation, inventory, classes, chassis_classes, seed_tropes, power_tiers, bestiary) from the genre tier down to worlds/<world>/, per the corrected boundary (genre = rulebook; world owns cast/catalog). The schema+loader contract was corrected and content-validate-all PASSES for all 11 packs (0 errors). BUT the server suite has 20 regressions because runtime consumers still read the moved files at the GENRE tier (GenrePack.chassis_classes is None, GenrePack.seed_tropes is [], etc.). This is the ADR-120 Epic-74 74-2 "consumer repoint" phase, now owed (it was meant to run BEFORE deleting genre files).

      ALREADY DONE (on branches, not merged):
      - sidequest-content feat/content-flavor-world-migration: per-world cast/catalog + bestiaries authored; pack_schema.yaml genre required_files trimmed to rulebook; genre pack.yaml extension cleanup; orphaned world tropes reconciled (coyote_star, dust_and_lead).
      - sidequest-server feat/genre-world-contract: loader genre char_creation/tropes -> optional + per-world loud chargen-resolution invariant.

      REMAINING (this story): repoint each runtime consumer genre->world (world-first, genre fallback where still sensible), expose world-tier fields on the World object where missing, and update the assertions to the world tier. Six surfaces / 20 failing tests:
      1. Chassis/rigs (GenrePack.chassis_classes None; space_opera->coyote_star): test_genre_pack_chassis_load, tests/interior/test_loader (voidborn_freighter), test_axis_pack_chargen[space_opera]
      2. Trope seeding (GenrePack.seed_tropes []; tea_and_murder->glenross): test_seed_tropes_loader x3
      3. Class kits / chargen (tea_and_murder classes->worlds): test_tea_and_murder_class_kits x2
      4. WWN spell catalog + elemental chargen (elemental_harmony char_creation/archetypes->worlds): test_wwn_spell_catalog_load x2, test_elemental_harmony_loads_wwn, test_pack_load[elemental_harmony], test_resolution_mode[elemental_harmony] x2, test_genre_flavor_world_tier ac6[elemental_harmony], test_axis_pack_chargen[heavy_metal]
      5. char_creation reputation pass-through (spaghetti_western char_creation->worlds): test_spaghetti_western_drift_wiring x2
      6. Load OTEL wiring (cascade): test_loader_cache_otel_wiring

      ALSO: author a superseding ADR (ADR-120 'mechanics-in-genre' is wrong: cast/catalog are world-tier). Per CLAUDE.md No-Source-Text-Wiring-Tests, prefer OTEL/behavior assertions over genre-tier presence checks when updating tests.
    points: 8
    priority: p1
    status: backlog
    repos: server,content
    workflow: tdd
    acceptance_criteria:
      - All 20 identified server tests pass with consumers reading world-tier cast/catalog (world-first, genre fallback where sensible)
      - World object exposes chassis_classes, seed_tropes, classes, and char_creation/archetype surfaces resolved from the world tier; loader loads them at world scope
      - just server-test is green (no new failures); content-validate-all stays green for all 11 packs
      - Test assertions target world-tier resolution via behavior/OTEL, not genre-tier file presence (per No-Source-Text-Wiring-Tests)
      - A superseding ADR is authored documenting genre=rulebook / world-owns-cast-catalog, marking ADR-120's mechanics-in-genre invalidated
    type: refactor
