  - id: 65-5
    title: Asset generators skip files already on R2 (live-listing existence check)
    description: "Asset generation scripts gate regeneration on LOCAL disk existence only (render_common.py:503 'if out_path.exists() and not force'). PNGs are gitignored, so on any clone without locally-generated images the gate reports every asset 'missing' and regenerates assets already on R2 — wasting GPU/time/cost. generate_poi_images.py:167 is worse: hardcodes force=True and always regenerates. Fix: at run start list the live R2 bucket under the target genre_packs/ prefix once (boto3 list_objects_v2, reusing r2_sync_packs._build_client) and skip any render item whose expected R2 key is already uploaded — even when the local file is absent. Replaces the descoped 65-2 AC6 ledger/retention audit framing; the runtime asset_ledger is a separate concern and is NOT touched. Repo: orchestrator scripts/ only."
    points: 2
    priority: p2
    status: done
    repos: orchestrator
    workflow: tdd
    acceptance_criteria:
      - render_common builds a set of existing R2 keys via a single paginated list_objects_v2 over the target genre_packs/ prefix at run start, reusing the boto3 client from scripts/r2_sync_packs._build_client().
      - The skip gate in render_common skips any render item whose expected R2 key is in the existing-set, even when the local file is absent (logs 'SKIP (on R2)'); unless --force/dry_run.
      - --force overrides the R2 skip and regenerates regardless, preserving existing --force semantics.
      - generate_poi_images.py no longer hardcodes force=True; POIs honor the same R2 skip and gain a --force flag matching generate_portrait_images.py.
      - Expected-key mapping uses the r2_sync 1:1 relative-path convention (genre_packs/...) so keys align with what r2_sync_packs actually uploads.
      - R2 listing failure (missing creds/endpoint or ClientError) aborts loudly with a clear error — no silent fallback to 'regenerate everything' (per CLAUDE.md no-silent-fallbacks).
    completed: '2026-05-28'
    branch: feat/65-5-runtime-artifact-r2-audit
    session_file: .session/65-5-session.md
  - id: 65-6
    title: Relocate NPC portraits to world level + wire a server portrait resolver
    description: |-
      Portraits are WORLD flavor (named NPCs defined in worlds/<world>/portrait_manifest.yaml) but are written genre-flat and are not wired to any runtime read path. Bring portraits to parity with POIs (which are correctly world-scoped and fully wired).

      Current state (verified 2026-05-28):
      - POIs: script writes genre_packs/<g>/worlds/<w>/assets/poi/<slug>.png (render_common.py:517-524); server reads same (reference_presenters.py:207, rest.py:213, app.py:323); R2 1:1. Correct, world-level.
      - Portraits: script writes genre_packs/<g>/images/portraits/<slug>.png (render_common.py:526, genre-flat). NO server/daemon code resolves an NPC portrait_url to that path (PortraitManifestEntry has no image field; views.py:515 emits portrait_url=None; only PCs get portrait_url via PARTY_STATUS). The pre-generated PNGs are synced to R2 but appear orphaned at runtime.
      - Dead scaffolding: empty dirs genre assets/images/{portraits,poi} and world worlds/<w>/assets/images/{portraits,poi} — nobody writes them.

      Scope:
      1. render_common.py render_batch: route portraits to genre_packs/<g>/worlds/<w>/assets/portraits/<slug>.png (mirror the POI branch). Requires real world per item (portraits already carry world from collect_characters).
      2. Server: add a portrait resolver mirroring _poi_image_html / reference_presenters POI path — resolve_asset_url(f'genre_packs/{g}/worlds/{w}/assets/portraits/{slug}.png'), keyed by slugified manifest name. FIRST confirm how/whether NPC portraits are meant to reach the UI today (confrontation overlay, NPC cards, reference page) and wire them — this is the load-bearing gap, not just the path. Add a wiring test.
      3. Remove the 5 empty scaffold dirs; pick ONE convention (assets/portraits to match assets/poi — note POI uses assets/poi, NOT assets/images/poi).
      4. Migrate existing portraits: move genre-flat PNGs to the world path locally + re-sync R2; delete stale genre-flat R2 keys.
      5. Audit other packs/worlds for the same genre-flat portrait layout and relocate (or file follow-ups).

      Open question to resolve in design: exact runtime surface(s) that should display NPC portraits. Coordinate with reference-page slug-anchor convention (slugify name).
