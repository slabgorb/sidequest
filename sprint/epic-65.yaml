  - id: 65-14
    title: wry_whimsy classical_pd audio set 404s — source/upload PD tracks to R2 + reconcile audio.yaml against manifest
    description: |-
      Playtest GAP (wry_whimsy/oz, 2026-06-02, SM/GM). Start any wry_whimsy/oz session → browser console logs 404 Not Found for the classical_pd audio set, each followed by "Unable to decode audio data". The ENTIRE wry_whimsy/audio/classical_pd/ set 404s — confirmed three tracks:
      - http://player1.local:5173/audio-cdn/genre_packs/wry_whimsy/audio/classical_pd/Satie%20-%20Gnossienne%20No.1.ogg
      - Satie - Gymnopedie No.1.ogg
      - Debussy - Clair de Lune.ogg

      wry_whimsy/audio.yaml references classical public-domain tracks that were never uploaded to R2 / the audio CDN. wry_whimsy is a brand-new pack (/sq-music likely never run for it). NOTE: these are PUBLIC-DOMAIN classical works (Satie/Debussy) — likely expected to be sourced EXTERNALLY rather than ACE-Step generated, so /sq-music may not apply. Either upload the classical_pd set to R2 under genre_packs/wry_whimsy/audio/classical_pd/, or the manifest points at paths that don't exist and audio.yaml needs correcting.

      Non-blocking: gameplay proceeds silently. Fits epic-65 (R2 asset tracking + YAML-derived gap audit + checked-in r2_manifest.json). repos: sidequest-content (audio.yaml + R2 upload). Render/publish scripts run under the orchestrator-root venv (uv run --project .) per project memory render-publish-scripts-use-root-venv.
    points: 2
    priority: p2
    status: canceled
    repos: content
    workflow: trivial
    acceptance_criteria:
      - 'Audit wry_whimsy/audio.yaml against r2_manifest.json: every referenced track is listed with its R2 presence/absence (the classical_pd gap is enumerated, not just the 3 observed)'
      - 'Decision recorded: classical_pd tracks are externally-sourced public-domain audio (Satie/Debussy) vs ACE-Step generated — and the sourcing path is documented'
      - The classical_pd set is uploaded to R2 at genre_packs/wry_whimsy/audio/classical_pd/ (Gnossienne No.1, Gymnopedie No.1, Clair de Lune + any other audio.yaml entries), OR audio.yaml is corrected to reference tracks that exist
      - Starting a wry_whimsy/oz session shows NO 404 / 'Unable to decode audio data' in the browser console and music plays
      - r2_manifest.json updated to track the classical_pd set
    type: chore
  - id: 65-15
    title: 'r2_audit: parse pack audio.yaml in expected_keys() — classical_pd tracks mis-flagged as orphans; real audio 404s go uncaught'
    description: "DEFECT (Architect audit 2026-06-03): scripts/r2_audit.py expected_keys() learns music ONLY from audio/music/*_input_params.json (ACE-Step params); it never parses pack audio.yaml. So every track referenced via audio.yaml 'path:' is absent from the expected set and gets mis-reported as Orphan (in R2, no YAML). Confirmed against wry_whimsy/pulp_noir classical_pd + ragtime_pd. Same blind spot means the audit can't CATCH a real audio 404. CANONICAL RESOLVER EXISTS — reuse it, do NOT reimplement path logic: sidequest-server/sidequest/genre/audio_paths.py::resolve_audio_relpath defines the rule (path starting 'assets/' -> shared genre_packs/assets/... WITHOUT pack slug; else pack-local genre_packs/<slug>/...). #338 migrated packs to the shared 'assets/' prefix, so naive genre_packs/<pack>/ prefixing is WRONG. Fix: have expected_keys() parse each pack audio.yaml and resolve each 'path:' via the same assets/-vs-pack-local rule audio_paths.py uses."
    points: 2
    priority: p3
    status: backlog
    repos: orchestrator
    workflow: tdd
    acceptance_criteria:
      - "expected_keys() parses each pack's audio.yaml and adds every resolved 'path:' to the expected set, applying the assets/-prefix shared-bucket rule (mirrors genre/audio_paths.resolve_audio_relpath: 'assets/...' -> genre_packs/assets/...; else genre_packs/<slug>/...)"
      - Path resolution reuses the canonical rule (import/share the audio_paths logic) rather than re-deriving prefixes, so audit and runtime cannot drift
      - r2_audit reports ZERO orphans for classical_pd/ragtime_pd tracks referenced by any pack audio.yaml and present in R2 (shared OR pack-local)
      - A pack audio.yaml path absent from R2/manifest is reported under 'authored but not rendered' (real 404 caught)
      - Existing portrait/POI/music-params behavior unchanged (regression test)
    type: bug
