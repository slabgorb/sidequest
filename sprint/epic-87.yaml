title: 'heavy_metal → Worlds Without Number: Faithful Ruleset Port'
description: 'Bind heavy_metal to the wwn ruleset as the SECOND WWN pack after elemental_harmony (design: docs/superpowers/specs/2026-06-04-heavy-metal-wwn-port-design.md; Story-1 plan: docs/superpowers/plans/2026-06-04-heavy-metal-wwn-story-1.md). Today heavy_metal runs native dials: combat and magic are PROSE WITH NO MECHANICAL BACKING (narrator improvises), the class/race/spell list is 5e leftover scaffolding, and the signature magic was modeled as bespoke pact/ledger confrontations. Per Keith (2026-06-04) that magic framing shades too hard into flavor and is RETIRED in favor of the port — the doom-cost feeling re-homes into spell descriptions. Unlike road_warrior→CWN (which needed a net-new crew-seat primitive), this needs ZERO engine changes: EH already proved every wwn seam (ruleset+wwn block, cast_spell, spells_wwn.yaml, hp_depletion, downed seam). This is a content port + standard calibration/OTEL wiring. Locked decisions: faithful WWN 3-chassis (Warrior/Expert/Mage + Foci, mage traditions as themed caster classes); magic_level high; lethality high; abilities already the standard six (CHA engine-mandatory for the Mental save); a complete canonical→abbreviation wwn.attribute_map IS required (verified _validate_wwn); remove edge_config (Edge→ablative HP). Touches ADR-117 (pluggable ruleset), ADR-114 (ablative HP), ADR-126 (pluggable magic). Both repos.'
priority: p2
