id: '66'
type: epic
title: Character Creation Depth
description: 'Mechanical depth and correctness of the character-creation pipeline (chargen): differentiated statlines, class/race/mutation mechanical surface, and the player-facing crunch Sebastien expects. Spun out of Playtest 2026-05-25 (mutant_wasteland/flickering_reach) findings. CANCELLED 2026-06-05: superseded by the Without-Number SRD adoption (SWN/WWN/CWN/AWN ruleset modules) — chargen depth needs a fresh re-scope on top of the SRD chargen seams, not these pre-SRD stories.'
priority: p2
status: canceled
repos: sidequest-server,sidequest-content
stories:
  - id: 66-1
    title: Differentiated statlines via thematic stat_bonuses on chargen choices
    description: "Every PC in mutant_wasteland rolls the identical statline [13,13,13,12,12,12] (Brawn/Reflexes/Toughness 13, Wits/Instinct/Presence 12). Root cause (confirmed in code during Playtest 2026-05-25): mutant_wasteland/rules.yaml selects stat_generation: point_buy (budget 27); _allocate_point_buy() in sidequest-server/sidequest/game/builder.py:2330-2363 is a deterministic round-robin → ALWAYS [13,13,13,12,12,12] for 6 stats. The race/mutation/calling differentiation block (builder.py:2417-2435) keys on hint PRESENCE (is not None), not hint VALUE, with hardcoded deltas — so two characters that both have race+class+mutation hints receive IDENTICAL deltas regardless of which choices they made. The genuinely-correct path is already fully wired and method-agnostic: stat_bonuses is a real field on MechanicalEffects (genre/models/character.py:78), accumulates into acc.stat_bonuses (builder.py:1185-1186), and is applied UNCONDITIONALLY for every method including point_buy (builder.py:2410-2412), correctly skipping the derivation block when present (not acc.stat_bonuses guard at :2418). So the fix is CONTENT, ZERO server change: author thematic stat_bonuses onto the class/race/mutation choices in mutant_wasteland/char_creation.yaml. Balance numbers are Sebastien-facing crunch — Keith authors the values (e.g. Scavenger→+Wits/+Instinct, Plant Person→+Toughness/−Reflexes). Supporting piece: a thin load-time VALIDATOR (per feedback_no_content_coupled_tests — a separate CLI/load check, NOT a content-coupled pytest) that warns LOUD when a point_buy genre ships chargen choices with no differentiating stat_bonuses, so this gap fails at load instead of surfacing in a playtest. DO NOT extend the builder.py:2419 guard — it keys on hint presence not value and would still produce identical deltas; standard_array's presence-based behavior is also locked by test_builder_stats.py:234-250 (Rust parity). Reference: ping-pong [BUG] All PCs roll identical flat statlines."
    points: 5
    priority: p2
    status: canceled
    repos: sidequest-content,sidequest-server
    workflow: tdd
    acceptance_criteria:
      - Author thematic stat_bonuses (Keith's balance values) onto class/race/mutation choices in mutant_wasteland/char_creation.yaml so different choices yield different, sensible stat deltas
      - Two distinct mutant_wasteland characters (e.g. Mutant Human/Scavenger vs Plant Person/Mutant) produce DIFFERENT statlines (verified via a world validator, not a content-coupled unit test)
      - Thin load-time validator warns LOUD when a point_buy genre ships chargen choices with no differentiating stat_bonuses
      - No change to _allocate_point_buy or the builder.py:2419 presence-keyed guard; standard_array parity tests stay green
      - 'OTEL: chargen emits a stat-assignment span (method + per-stat final + which modifiers applied) so the GM panel confirms differentiation fired'
  - id: 66-2
    title: Author ADR-095 signature abilities + class moves for mutant_wasteland classes
    description: "Playtest 2026-05-25: a Lv1 Scavenger's Abilities tab is completely empty. Root cause (confirmed by reading content): mutant_wasteland's 5 classes (Scavenger/Mutant/Beastkin/Pureblood/Wirewalker — defined as class_hint in char_creation.yaml) have NO signature abilities or class moves authored anywhere in the pack (archetypes.yaml has flavor archetypes with no ability/signature/class_move keys). ADR-095 ('one signature ability per non-magical class') + #274 (class-move pills) imply each non-magical class should surface at least a signature move. The server has nothing to materialize because the content doesn't define it. This is balance-laden, Sebastien-facing class mechanical surface — Keith authors the abilities (what each class's signature does, costs, beats). Per feedback_no_content_coupled_tests, the 'live pack has signature abilities' gap should be surfaced by a load-time VALIDATOR (warn when a non-magical class ships with no signature ability/class moves), NOT a content-coupled pytest. UI floor already shipped: sidequest-ui PR #280 adds a 'No special abilities yet.' empty-state so the tab is never blank — but that does NOT make the Scavenger mechanically complete; this story does."
    points: 5
    priority: p2
    status: canceled
    repos: sidequest-content,sidequest-server
    workflow: tdd
    acceptance_criteria:
      - Author an ADR-095 signature ability (Keith's mechanics) for each non-magical mutant_wasteland class; author class moves (confrontation beats) where appropriate
      - A Lv1 character of each class surfaces its signature ability / class moves in the Abilities tab (verified via a world validator, not a content-coupled unit test)
      - Load-time validator warns LOUD when a non-magical class ships with no signature ability / class moves
      - 'OTEL: chargen ability-materialization emits a span (class + abilities materialized) so the GM panel confirms surfacing fired'
  - id: 66-3
    title: Chargen names-step extraction — split rider road-name vs rig-name from prose (or use followup answer); stop storing whole sentence as char_name
    points: 3
    priority: p2
    status: canceled
    repos: server
    workflow: tdd
    type: bug
  - id: 66-4
    title: Author wry_whimsy classes.yaml — one signature ability per class (ADR-097), decision-gated
    description: |-
      Playtest GAP (wry_whimsy/oz, 2026-06-02, SM/GM). Create any wry_whimsy/oz PC → Character tab → Abilities → "No special abilities yet." Backend char abilities: []. wry_whimsy/rules.yaml defines 6 allowed_classes (Curious Child, Practical Servant, Earnest Scholar, Weary Soldier, Wayward Dreamer, Stubborn Skeptic) but the pack ships NO classes.yaml, and power_tiers.yaml only describes per-level VISUAL tiers ("SAVVY, not strength"), not abilities. Per ADR-097 (One Signature Ability Per Non-Magical Class) each class should grant one signature ability — even in a low-menace/whimsy genre, a signature ability gives mechanics-first players (Sebastien/Jade) something legible.

      DECISION-GATED — this is a CONTENT-AUTHOR DECISION, not a confirmed code bug. First confirm whether the empty ability set is INTENTIONAL for this genre (whimsy = SAVVY-not-strength; maybe abilities are deliberately absent). The "...yet" copy in "No special abilities yet" implies abilities are coming, which misleads if none ever do — so even a "no abilities" decision has a copy fix.

      IMPORTANT CONTEXT: the Dev classless-pack confrontation surfacing fix (PR slabgorb/sidequest-server#575) means authoring classes.yaml is NO LONGER a blocker for confrontation visibility — the crunch now surfaces for classless packs. So this is PURELY an optional content/legibility decision, not required for any engine path.

      If the decision is YES (author abilities): model on spaghetti_western/classes.yaml (which just landed) and epic-66 sibling 66-2 (mutant_wasteland signature abilities). Author one signature ability per allowed_class. Content (pack YAML) — delegate to a gm agent per project convention (delegate-content-tasks-to-gm-background-agent); any engine wiring stays on the main thread. Sibling pattern: 66-2 "Author ADR-095 signature abilities + class moves for mutant_wasteland". ADRs: 097.
    points: 3
    priority: p3
    status: canceled
    repos: content,server
    workflow: tdd
    acceptance_criteria:
      - "DECISION recorded: does wry_whimsy intend signature abilities at all (low-menace/SAVVY-not-strength genre)? If NO → close as wontfix AND fix the misleading 'No special abilities yet' copy so it doesn't imply abilities are coming"
      - 'If YES: author wry_whimsy/classes.yaml with one signature ability per the 6 allowed_classes (Curious Child, Practical Servant, Earnest Scholar, Weary Soldier, Wayward Dreamer, Stubborn Skeptic), per ADR-097, modeled on spaghetti_western/classes.yaml'
      - 'If authored: abilities surface in the Character tab Abilities list (backend char.abilities non-empty) for a fresh wry_whimsy/oz PC'
      - Content authoring delegated to a gm agent per project convention; any engine/loader wiring kept on the main thread and covered by a wiring test
  - id: 66-5
    title: Creation confirmation sheet shows raw funnel labels not resolved race/class (+ per-genre field-label override)
    description: |-
      Playtest UX (wry_whimsy/oz, 2026-06-02, SM/GM). New solo game in wry_whimsy/oz → complete creation funnel → the "Your Character" confirmation sheet shows Race: "The plain ordinary world" and Class: "A curious child" — i.e. it renders the funnel PROMPT LABELS (step-i origin "The plain ordinary world", step-ii "A curious child") under generic field names. The backend actually RESOLVES these to nicer values — snapshot shows race = "Ordinary-Born", char_class = "Curious Child".

      TWO PARTS:
      1. The pre-create confirmation sheet should display the RESOLVED race/class (Ordinary-Born / Curious Child), not the raw funnel prompt labels.
      2. For a portal-fantasy genre, "Race" reads oddly for a displaced human — consider a per-genre field-label override (e.g. "Race" → "Origin" for wry_whimsy).

      Cosmetic / display-only: in-game state is CORRECT (snapshot already has the resolved values). Screenshot: .sq-playtest-screenshots/005-character-sheet.png. repos: sidequest-ui (confirmation sheet binding); sidequest-server only if the resolved values aren't already exposed to the client pre-commit (verify the snapshot/funnel payload carries resolved race/char_class at confirmation time).
    points: 2
    priority: p3
    status: canceled
    repos: ui,server
    workflow: tdd
    acceptance_criteria:
      - The 'Your Character' confirmation sheet displays the RESOLVED race/class (e.g. Ordinary-Born / Curious Child) instead of the funnel prompt labels ('The plain ordinary world' / 'A curious child')
      - "Per-genre field-label override is implemented OR explicitly deferred with rationale: for wry_whimsy (portal fantasy) 'Race' renders as 'Origin'"
      - Verified the resolved race/char_class are available to the client at confirmation time (server payload carries them pre-commit); no server change needed if already present
      - 'Regression test: a wry_whimsy/oz creation funnel renders resolved values (not prompt labels) on the confirmation sheet'
    type: bug
