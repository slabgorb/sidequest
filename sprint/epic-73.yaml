  - id: 73-15
    title: Filter narrator tool_definitions by bound ruleset — WWN/CWN-only tools exposed on every pack (ADR-117 tightening)
    description: "Architect finding (2026-06-04, ADR-117 ruleset routing dig). orchestrator.py:3844/3992 hands the narrator default_registry.tool_definitions() — ALL registered tools, unfiltered by bound ruleset. The WWN/CWN-only tools (commit_effort/long_rest/veterans_luck=wwn; adjust_system_strain/stabilize_mortal_injury=cwn) are therefore visible to the narrator on EVERY pack, including native packs. They self-guard fail-loud: tool description says 'WWN-only…' and the handler raises ValueError if pack.rules.ruleset != the required slug (e.g. commit_effort.py:96). So this is NOT a correctness bug (no silent fallback) — it is a tightening: the narrator wastes tool-budget on, and can mis-attempt, tools irrelevant to the bound ruleset. Tighten by filtering tool_definitions to the bound ruleset at assembly time. NOTE: SM may re-home — no dedicated ruleset epic exists; parked in 73 because the gated tools are combat/lethality tools."
    points: 2
    priority: p3
    status: backlog
    repos: sidequest-server
    workflow: tdd
    acceptance_criteria:
      - Narrator tool list for a native-bound pack excludes the WWN/CWN-only tools (commit_effort, long_rest, veterans_luck, adjust_system_strain, stabilize_mortal_injury)
      - A WWN-bound pack exposes the WWN tools and not the CWN tools; CWN-bound pack the inverse
      - The existing fail-loud ValueError self-guard in each tool remains as a backstop (not removed)
      - Filtering is driven by the bound ruleset slug, not a hardcoded per-tool allowlist duplicated from the tool modules
    type: refactor
