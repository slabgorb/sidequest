  - id: 73-2
    title: 'trial: author withdraw/concede resolution beat + opposed_check — currently no mid-trial exit (soft-lock risk)'
    description: |-
      trial: author withdraw/concede resolution beat + opposed_check — currently no mid-trial exit (soft-lock risk).

      SCOPE WIDENED — the concede/withdraw resolution gap is NOT trial-only. REPRODUCED LIVE 2026-05-31 in social_duel (the confrontation the epic-73 description assumes 'was converted to opposed_check + made resolvable'). Glenross / Tea&Murder 'Duel of Wits', solo Inspector Pryce, during 67-10 playtest: committed the UI-labelled '✦ resolution beat' Concede Gracefully. The confrontation DID NOT RESOLVE — zero encounter.resolved span in the /ws/watcher capture across the whole run; the confrontation panel persisted (dials You 4/7, Them 3/7); the action input stayed locked ('plain Enter is locked during confrontation'). Only remaining exit is the 'Yield' button (untested in this run). So social_duel's concede resolution_beat does not flip encounter.resolved — the epic's 'social_duel made resolvable' claim appears to be VICTORY-PATH ONLY (resolves on dial→7 dial_threshold, not on concede/early-exit).

      COMPOUND WITH 73-4: the concede beat is push-kind, and push CritSuccess scores 0 (73-4). On this turn the concede crit produced no dial delta at all, so any terminal/threshold check tied to dial movement never fired — 73-4 and this soft-lock reinforce each other. Fix should make a committed resolution/concede beat deterministically flip encounter.resolved (emit encounter.resolved + tear down the panel + unlock input) regardless of roll outcome, for social_duel AND trial (and audit negotiation/scandal). Evidence: .sq-playtest-screenshots/67-10-watcher.jsonl + 67-10-003-after-resolution.png. repos: sidequest-server, sidequest-content.
    points: 3
