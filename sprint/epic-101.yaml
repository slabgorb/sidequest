      - EmbedWorker + RenderService live outside daemon.py; daemon.py under ~500 LOC, socket lifecycle + routing only
      - 'Wire protocol unchanged: server daemon_client + DaemonStateMirror integration tests green without modification'
      - Wiring test proves every RPC method (ping/status/shutdown/warm_up/render/embed) reaches the unified dispatcher
