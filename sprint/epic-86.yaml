title: 'road_warrior → Cities Without Number: Two-Tier Rig Combat'
description: 'Bind road_warrior to the cwn ruleset and give rig combat real mechanical backing via a faithful SRD port (design: docs/superpowers/specs/2026-06-04-road-warrior-cwn-rig-combat-design.md). Today road_warrior runs native dials and its rig/composure/chase identity is PROSE WITH NO MECHANICAL BACKING — the narrator improvises vehicular combat. A whole rig subsystem (RigComposurePool, rig_crash, vessel_tags, rig spans) already sits DORMANT in the engine; this is mostly wire-up + binding, not build-from-scratch. Two tiers (Keith, 2026-06-04): SOLO RIG (default) = CWN Vehicle Combat §2.4.8 (AC +Drive moving, Armor, ramming, crash dmg), reusing the existing single-char RigComposurePool; WAR RIG (special) = SWN Space Combat pp.114-119 (departments→driver/gunner/wrench/spotter/boss, Command Points, Crisis table) — the SOUL Guitar-Solo wider-action made mechanical, needing a net-new crew-seat primitive. Locked decisions: both tiers; driver = full ablative HP (Driver Edge/ADR-078 removed, per the SWN-crunch/HP mandate); adopt standard CWN six ability scores. Touches ADR-117 (pluggable ruleset), ADR-114 (ablative HP), ADR-125 (chassis/rig), ADR-077 (dogfight), ADR-116 (confrontation-requires-other). Both repos.'
priority: p2
