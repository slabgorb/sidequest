  - id: 16-11
    title: "Resource threshold → KnownFact pipeline — permanent narrator memory"
    description: >-
      When a ResourcePool crosses a threshold, mint a KnownFact in LoreStore with
      the threshold's event_id and narrator_hint. High relevance score ensures it
      surfaces in every future narrator prompt via existing budget-aware selection.
      The LLM cannot forget that Humanity hit 25 because the knowledge system tells
      it every turn. Test: cross threshold, verify KnownFact exists, verify it
      appears in narrator context.
    points: 3
    priority: p1
    status: backlog
