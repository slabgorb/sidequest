id: '16'
type: epic
title: "Genre Mechanics Engine — Confrontations & Resource Pools"
description: >-
  Build the two missing generic subsystems that let genre packs declare mechanical
  rules the engine enforces. Pillar 1: Confrontation — a universal structured
  encounter engine that subsumes combat, chase, standoff, negotiation, net combat,
  ship combat, and any future encounter type. Genre packs declare confrontation
  types in YAML with metrics, beats, secondary stats, and resolution conditions.
  Pillar 2: ResourcePool — persistent named resources (Luck, Humanity, Heat) with
  spend/gain/threshold/decay, validated by the engine, surfaced in UI, and fed into
  LoreStore as KnownFacts so the narrator can never forget them. Together these
  close every gap in the content-vs-engine gap map (docs/genre-pack-status.md).
  Key references: chase.rs, chase_depth.rs (the prototype), combat.rs, music_director.rs,
  docs/genre-pack-status.md (gap map), ADR-017 (chase types).
priority: p1
status: planning
repos: sidequest-api, sidequest-ui, sidequest-content
stories:
  - id: 16-1
    title: "Narrator resource injection — serialize all genre resource state into prompt context every turn"
    description: >-
      Before building the formal ResourcePool, get immediate value by parsing
      rules.yaml resource declarations and serializing current values into the
      narrator's prompt context. The LLM literally cannot forget resources it's
      told about every turn. Uses existing prompt_framework injection points.
      This is the 80% fix that ships in one story.
    points: 3
    priority: p0
    status: done
    repos: sidequest-api
    workflow: tdd
    completed: '2026-03-31'
    review_verdict: approved
  - id: 16-2
    title: "Confrontation trait + ConfrontationState — universal structured encounter engine"
    description: >-
      Replace the separate CombatState and ChaseState with a unified
      ConfrontationState. A confrontation has: type (string-keyed from genre YAML),
      metric (the thing that changes — HP, separation, tension, leverage), beats
      (discrete action moments), actors, secondary stats (optional RigStats-like
      block), terrain/context modifiers, and resolution conditions (threshold or
      explicit). CombatState and ChaseState become confrontation type presets.
      All existing combat and chase tests must continue to pass.
    points: 8
    priority: p1
    status: done
    repos: sidequest-api
    workflow: tdd
    completed: '2026-03-31'
  - id: 16-3
    title: "Confrontation YAML schema — genres declare encounter types in rules.yaml"
    description: >-
      Define the YAML schema for confrontation declarations in rules.yaml.
      Each confrontation type specifies: type id, label, category (combat/social/
      pre_combat/movement), metric (name, direction, starting, threshold), beats
      (id, label, metric_delta, stat_check, risk, reveals), secondary_stats,
      escalates_to, and mood. Genre loader parses these into ConfrontationType
      structs at pack load time. Validate schema on load.
    points: 5
    priority: p1
    status: done
    repos: sidequest-api, sidequest-content
    workflow: tdd
    completed: '2026-03-31'
