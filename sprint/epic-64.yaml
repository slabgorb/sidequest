  - id: 64-4
    title: Schema-validate pack file contents — model_validate pass in the validator
    description: 'The pack validator (sidequest/cli/validate/pack.py) is structural-only: it checks file/dir existence and extension backing files, but never parses file CONTENTS. Zero model_validate calls. A tropes.yaml with the wrong fields, or garbage YAML, passes as long as the file exists — proven during epic 64 review, where the 7 new world files had to be hand-loaded through pydantic separately to confirm they parse. Wire the real loaders/models into the validator: for each present file with a known schema, run it through its pydantic model (NpcArchetype, TropeDefinition, PortraitManifestEntry, ArchetypeConstraints, projection rules, DungeonTheme palette, etc.) and report parse failures as ERRORs with filename + pydantic message. Note: pack.py:203-204 silently swallows world.yaml YAMLError (pass) — a no-silent-fallback violation to fix in the same pass. Likely depends on 64-6 (circular import) since importing the loader graph is on the path.'
    points: 3
    priority: p2
    status: done
    repos: server
    workflow: tdd
    acceptance_criteria:
      - Validator runs each present, schema-known file through its pydantic model and reports parse failures as ERRORs (filename + message)
      - A deliberately malformed world tropes.yaml/archetypes.yaml produces a FAIL, not a PASS
      - world.yaml YAML parse errors are reported loudly, not swallowed (pack.py:203-204)
      - All 10 live packs still PASS after the content-validation pass is added
    completed: '2026-05-25'
    review_verdict: approved
  - id: 64-5
    title: Cross-reference content lint — ID membership + adjacency closure
    description: "Builds on 64-4. Once file contents parse, add a content-lint layer that validates CROSS-references the per-file pydantic models can't see on their own: (1) trope IDs referenced in history.yaml chapters / adjacency exist in the resolved trope set; (2) archetype typical_classes/typical_races resolve against the pack's rules.yaml allowed_classes/allowed_races; (3) archetype_constraints valid_pairings jungian/role IDs are from the canonical 12 jungian x 7 roles, and genre_flavor covers all of them with no extras (these were hand-audited in epic 64 review); (4) theme palette adjacency closure (prefers/avoids refs exist) — already enforced in load_theme_palette, surface it here too. Report each as an ERROR with the offending id + file."
    points: 2
    priority: p2
    status: done
    started: '2026-05-28'
    repos: server
    workflow: tdd
    acceptance_criteria:
      - Unresolvable trope ID in history/adjacency → ERROR with the id + file
      - archetype typical_classes/typical_races not in rules.yaml allowed sets → ERROR
      - archetype_constraints non-canonical jungian/role id, missing/extra genre_flavor entry → ERROR
      - theme adjacency closure surfaced as a validator ERROR
      - All 10 live packs still PASS
    completed: '2026-05-28'
  - id: 64-6
    title: Fix circular import — WebSocketSessionHandler back-compat re-export cycle
    description: "Pre-existing circular import surfaced during epic 64 review: tests/dungeon/test_region_projection_wiring.py::test_dungeon_map_frame_is_emitted_to_ui fails in isolation with 'cannot import name WebSocketSessionHandler from partially initialized module sidequest.server.websocket_session_handler'. The cycle: session_handler.py:640 re-exports WebSocketSessionHandler from websocket_session_handler.py (back-compat), while websocket_session_handler.py:144 imports _SessionData/_State/etc back from session_handler.py. Importing either module first in a fresh interpreter can hit the half-initialized partner. Break the cycle (move shared types to a leaf module, or drop the back-compat re-export if unused) so the dungeon suite passes in isolation. Blocks 64-4 if the validator imports the loader graph that transitively pulls these modules."
    points: 2
    priority: p2
    status: done
    started: '2026-05-25'
    repos: server
    workflow: tdd
    acceptance_criteria:
      - test_region_projection_wiring.py::test_dungeon_map_frame_is_emitted_to_ui passes when run in isolation
      - No import cycle between session_handler and websocket_session_handler (verified by importing each first in a fresh interpreter)
      - Full dungeon suite green; no regression in server suite
    completed: '2026-05-25'
    type: bug
    review_verdict: approved
  - id: 64-7
    title: Expand 61 missing namegen corpus files flagged by audit
    description: 'RE-SCOPED 2026-05-29 (SM triage; was ''Expand 61 missing namegen corpus files''). The original premise is FALSE: all 61 referenced corpus files DO exist in sidequest-content/corpus/shared/ with healthy word counts (none are 0-word/empty; find -empty returns 0). The real defect is an audit-path mismatch: scripts/audit_namegen_corpora.py:108 resolves corpus refs ONLY as pack_dir/corpus/<ref>, but packs elemental_harmony/mutant_wasteland/neon_dystopia/space_opera have no per-pack corpus/ dir. The runtime resolver sidequest/genre/names/generator.py:251 (_resolve_corpus_file) searches fallback_dirs incl. sidequest-content/corpus/shared/, so files that resolve fine at runtime are reported MISSING by the audit (rc=1, 4 failing tests in tests/scripts/test_audit_namegen_corpora.py). FIX: teach the audit script the shared-corpus fallback (or wire per-pack corpus dirs to match). DO NOT author duplicate corpus files. Absorbs canceled story 64-9.'
    points: 5
    priority: p2
    status: backlog
    repos: content
    workflow: tdd
    acceptance_criteria:
      - audit_namegen_corpora.py replicates the runtime shared-corpus fallback (sidequest-content/corpus/shared/) when resolving corpus refs, matching generator.py _resolve_corpus_file behavior
      - All 4 tests in tests/scripts/test_audit_namegen_corpora.py pass; audit exits rc=0 on the live tree
      - No duplicate corpus files are authored under per-pack corpus/ dirs (the shared/ files remain the single source)
      - 'Wiring/parity test: the audit script and the runtime generator resolve the same set of corpus files for the affected packs'
    type: bug
