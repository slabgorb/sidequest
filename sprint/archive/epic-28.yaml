  - id: 28-8
    title: "NPC turns through beat system — NPCs mechanically act every round"
    description: >-
      Story 15-6's original sin: NPCs never mechanically act. The narrator says "the goblin attacks" but resolve_attack() is never called for the NPC. In the unified system: each NPC actor in the encounter gets a beat selection per round. For combat encounters, NPC beats default to "attack" targeting a player. For other encounters, creature_smith selects NPC beats based on the NPC's disposition and role. dispatch loops through all actors in the encounter, calls apply_beat() for each, resolves the stat_check. Every NPC action produces OTEL events. The GM panel shows exactly what each NPC did mechanically. OTEL events: encounter.npc_beat (npc_name, beat_id, target, stat_check_result).
