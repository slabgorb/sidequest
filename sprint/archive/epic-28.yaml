  - id: 28-10
    title: "Genre pack combat/chase ConfrontationDefs — declare combat and chase as confrontation types"
    description: >-
      Genre packs need ConfrontationDef entries for combat and chase if they don't already have them. Combat: metric "hp" descending, beats for attack/defend/flee/special, stat_checks mapping to resolution functions. Chase: metric "separation" ascending, beats for accelerate/maneuver/ shortcut/ram, stat_checks mapping to chase resolution. Each genre can customize beats — neon_dystopia combat has "hack" and "netrun" beats, spaghetti_western has "draw" and "fan_the_hammer". Audit all 11 genre packs, add combat + chase ConfrontationDefs where missing. OTEL: N/A — content changes.
