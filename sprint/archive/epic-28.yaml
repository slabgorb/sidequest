  - id: 28-5
    title: "Wire apply_beat() into dispatch — beat selection drives encounter progression"
    description: >-
      The core wiring. When creature_smith (or the player via UI beat buttons) selects a beat, dispatch calls apply_beat(beat_id, &def) on the live StructuredEncounter. The beat's stat_check field names the mechanic to resolve. Dispatch maps stat_check to existing resolution functions: "attack" calls resolve_attack() on CreatureCore, "escape" calls the chase escape logic, "persuade"/"intimidate"/etc. use the confrontation metric directly (already handled by apply_beat's metric_delta). After apply_beat(), check resolution. If resolved, handle outcome (victory/ defeat/escape/etc.). If escalates_to is set and threshold crossed, start the escalation encounter. OTEL events: encounter.beat_dispatched (beat_id, stat_check, resolver), encounter.stat_check_resolved (stat_check, result). HP/damage OTEL comes from CreatureCore (story 28-2).
    points: 5
    priority: p0
    status: done
    repos: api
    workflow: tdd
    depends_on:
