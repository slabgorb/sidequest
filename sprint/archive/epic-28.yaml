  - id: 28-7
    title: "Promote StructuredEncounter onto GameSnapshot — replace combat and chase fields"
    description: >-
      GameSnapshot currently has combat: CombatState and chase: Option<ChaseState>. Replace both with encounter: Option<StructuredEncounter>. Update every reference to ctx.combat_state and ctx.chase_state in the dispatch pipeline to use ctx.encounter. HP and status effects stay on CreatureCore — the encounter tracks the dramatic arc (beats, metric, phase, resolution), not creature state. This is the point of no return. All dispatch code that reads/writes CombatState or ChaseState now reads/writes StructuredEncounter. state_mutations.rs engage/disengage logic becomes encounter start/resolve. OTEL event: encounter.started (encounter_type, actors, metric_starting), encounter.ended (encounter_type, outcome, total_beats).
