  - id: 43-5
    title: Daemon single-spawn + worker singleton — dedupe justfile recipes, delete vestigial ZImageMLXWorker.main(), enforce one-instance invariant
    description: |
      Two related daemon split-brains, folded into one cleanup pass per 2026-04-24
      audit. Both fixes land in the same PR — the justfile half is mechanical, the
      worker half encodes the invariant the justfile fix relies on.

      (1) Justfile spawn dedup. `justfile:41-49` (`daemon` recipe, foreground) and
      `justfile:74-77` (`up` recipe, background) duplicate the daemon spawn command.
      Extract a shared private recipe (e.g. `_daemon-cmd`) that both call so a flag
      change updates one place. Verify `just daemon` and `just up` still produce
      identical invocations.

      (2) Worker singleton invariant. Two model-load entry points exist in the
      daemon: (A) in-process via `WorkerPool.warm_up_image()` at
      `sidequest_daemon/media/daemon.py:102-113` (production path, called by
      `_run_daemon` and `_ensure_image()`), and (B) standalone subprocess via
      `ZImageMLXWorker.main()` at `sidequest_daemon/media/workers/zimage_mlx_worker.py:243-end`
      (vestigial — has its own JSON-line protocol loop, no callers, no
      console_script entry). Today only path A runs because nothing invokes B,
      but the second `python -m sidequest_daemon.media.workers.zimage_mlx_worker`
      from any future script/recipe/unit file would load a second ZImage on the
      same MPS device. Z-Image survives this; Flux would OOM the M3 Max instantly.

      Actions:
        - Delete `ZImageMLXWorker.main()`, the `_respond()` helper, and the
          standalone JSON-line dispatch loop (everything from line ~230 to EOF).
        - Add a constructor-level singleton guard to `ZImageMLXWorker.__init__`
          (class-level `_instance` ref, raise `RuntimeError` on second
          construction in the same process) — fail loudly per CLAUDE.md "No
          Silent Fallbacks." Document the invariant in the class docstring.
        - Collapse the redundant `_ensure_loaded()` guard inside the worker now
          that `WorkerPool` is the only caller and already guards via
          `_image_loaded`. Keep one guard, not three.
        - Wiring test (per daemon CLAUDE.md "Every Test Suite Needs a Wiring
          Test"): assert that constructing a second `ZImageMLXWorker` in the
          same process raises, and that `WorkerPool.warm_up_image()` is the
          only production caller of `load_model()` (grep-based test is fine).
    points: 2
