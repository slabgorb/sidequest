    review_findings: "3 HIGH content errors: (1) Roman Catholic minority + Marymas at St Margaret's contradicts established world canon — demographics.yaml has only Church of Scotland / Scottish Episcopal / Wee Free, and St Margaret's is Episcopal not Catholic; (2) Bank Holidays 1908 list contains historical anachronisms — Christmas + Boxing Day were not Scottish statutory bank holidays until 1974; (3) starting_date math internally inconsistent — harvest_home 14 days ago (Oct 3) is outside its own declared typical_window (10-25 Sep). Plus 2 MEDIUM (fourth-wall '(per ADR sensibility)' meta-text leak in narrator-visible Nov texture; Old Year's Day drift math frozen-not-derived) and 1 LOW (Nov 11 1908 was Wednesday not Tuesday — Martinmas 'Tuesday-evening' line). All six are textual fixes, no schema/test/code changes."
