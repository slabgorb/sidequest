id: '6'
type: epic
title: Active World & Scene Directives — Living World That Acts On Its Own
description: >-
  Port of sq-2 Epic 61 (Active World Pacing). The world should be an active
  agent — NPCs and factions pursue agendas independent of player input.
  Currently the trope engine and world state agent are reactive; this epic
  makes them proactive. Scene directives compose fired beats, narrative hints,
  and active stakes into MUST-weave narrator blocks. Faction agendas inject
  world-driven events into the narrator prompt. World materialization tracks
  campaign maturity and applies history chapters to the game snapshot.
  Key reference: sq-2/docs/architecture/active-world-pacing-design.md,
  sq-2/sprint/epic-61.yaml.
priority: p1
status: done
repos: sidequest-api
