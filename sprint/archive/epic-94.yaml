id: '94'
type: epic
title: Genre/World Boundary Correction — Genre is Rulebook, World Owns Cast/Catalog
description: "Corrects the genre/world boundary (supersedes ADR-120 'mechanics-in-genre'): the genre tier is the RULEBOOK ONLY (resolution rules, progression, tone/voice axes, narrator voice, lethality/visibility policy, theme/audio chrome). The CAST and CATALOG — archetypes, tropes, char_creation, inventory, classes, chassis_classes, seed_tropes, power_tiers, bestiary — are world-authoritative. Keith's hand-migration moved these files to worlds; the schema+loader contract was corrected (genre cast/catalog files optional + per-world resolution invariant) and content-validate-all is green for all 11 packs. Remaining: repoint runtime consumers that still read the moved files at the genre tier (ADR-120 Epic-74 74-2 consumer-repoint phase, now owed) + author a superseding ADR."
priority: p1
status: done
repos: server,content
stories:
  - id: 94-1
    title: Repoint chassis/rigs + trope-seeding consumers to the world tier
    description: |-
      Genre/world boundary consumer-repoint, part 1 of 3 (epic 94). Repoint chassis/rigs and trope-seeding consumers from the genre tier to the world tier; clear the cascading load-OTEL test.

      Surfaces:
      - chassis_classes: GenrePack.chassis_classes is None (space_opera genre file moved to coyote_star). Load at world scope, expose on World, repoint consumers world-first.
      - seed_tropes: GenrePack.seed_tropes is [] (tea_and_murder genre file moved to glenross). Load at world scope, expose on World, repoint trope-seeding world-first.
      - loader cache OTEL wiring test cascades off the above.

      Failing tests: test_genre_pack_chassis_load, tests/interior/test_loader (voidborn_freighter), test_axis_pack_chargen[space_opera], test_seed_tropes_loader x3, test_loader_cache_otel_wiring.

      Prereqs (branches, unmerged): content feat/content-flavor-world-migration, server feat/genre-world-contract. Assert world-tier behavior/OTEL, not genre-file presence.
    points: 3
    priority: p1
    status: done
    repos: server,content
    workflow: tdd
    acceptance_criteria:
      - World loads and exposes chassis_classes from the world tier (coyote_star); chassis/rig consumers read world-first
      - World loads and exposes seed_tropes from the world tier (glenross); trope-seeding reads world-first
      - test_genre_pack_chassis_load, interior/test_loader, axis_pack_chargen[space_opera], seed_tropes_loader x3, loader_cache_otel_wiring all pass
      - Assertions target world-tier behavior/OTEL, not genre-file presence
    completed: '2026-06-06'
    type: refactor
  - id: 94-2
    title: Repoint chargen + class-kit + char_creation consumers to the world tier
    description: |-
      Genre/world boundary consumer-repoint, part 2 of 3 (epic 94). Repoint character-creation, classes, and class-kit chargen consumers genre->world (world-first, genre fallback where sensible).

      Surfaces:
      - char_creation: genre char_creation moved to worlds. Chargen + reputation pass-through must read world char_creation.
      - classes / class kits: tea_and_murder classes moved to worlds (blackthorn_moor, glenross). Class-kit chargen must resolve world-tier classes.

      Failing tests: test_tea_and_murder_class_kits x2 (incl. doctor_chargen_produces_signature_items_end_to_end), test_spaghetti_western_drift_wiring x2 (char_creation reputation pass-through), test_axis_pack_chargen[heavy_metal].

      Prereqs: content feat/content-flavor-world-migration, server feat/genre-world-contract. Assert world-tier behavior/OTEL, not genre-file presence.
    points: 3
    priority: p1
    status: done
    repos: server,content
    workflow: tdd
    acceptance_criteria:
      - char_creation and classes resolve world-first; class-kit chargen reads the world tier
      - spaghetti_western char_creation reputation pass-through works from world char_creation
      - test_tea_and_murder_class_kits x2, test_spaghetti_western_drift_wiring x2, test_axis_pack_chargen[heavy_metal] all pass
      - Assertions target world-tier behavior/OTEL, not genre-file presence
    completed: '2026-06-06'
    type: refactor
  - id: 94-3
    title: Repoint WWN spell catalog + elemental_harmony load to world tier; author superseding ADR
