      Surfaces:
      - WWN spell catalog + elemental_harmony chargen/archetypes moved to worlds (burning_peace, shattered_accord). Spell-catalog load + resolution-mode resolution must read world-tier surfaces.

      Failing tests: test_wwn_spell_catalog_load x2, test_elemental_harmony_loads_wwn, test_pack_load[elemental_harmony], test_resolution_mode[elemental_harmony] x2, test_genre_flavor_world_tier ac6[elemental_harmony].

      Plus: author a superseding ADR documenting genre=rulebook / world-owns-cast-catalog and marking ADR-120's mechanics-in-genre invalidated. Final gate: full just server-test green + content-validate-all green (11 packs).

      Prereqs: content feat/content-flavor-world-migration, server feat/genre-world-contract, and 94-1/94-2 merged. Assert world-tier behavior/OTEL, not genre-file presence.
