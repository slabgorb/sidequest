      - Create sidequest-content/genre_packs/victoria/equipment_tables.yaml with per-archetype starting kits (Country Doctor → medical kit, Clergyman → ecclesiastical kit, Detective → investigation kit, etc.). Match the schema used by caverns_and_claudes/equipment_tables.yaml
      - 'Wire the_kit scene (or equivalent) in sidequest-content/genre_packs/victoria/char_creation.yaml with equipment_generation: random_table — see caverns_and_claudes/char_creation.yaml for the exact mechanical_effects shape'
      - All item_ids in equipment_tables.yaml exist in inventory.yaml item_catalog — wiring test enforces this in C&C and the same enforcement should hold for victoria
