  - id: 59-11
    title: Retire the orchestrator's redundant second dispatch-bank run (engage once, collect directives without re-engaging)
    description: "There are TWO run_dispatch_bank calls per turn. (1) The canonical pre-narrator ENGAGEMENT pass: sidequest-server/sidequest/server/intent_router_pass.py:158 (execute_intent_router_pre_narrator_pass) runs on the CANONICAL package with full context {snapshot, pack, player_name, npcs_present, additional_player_names} and engages the mechanical engines (ADR-113). (2) A SECOND, redundant re-run inside the narrator prompt assembly: sidequest-server/sidequest/agents/orchestrator.py:2538 runs run_dispatch_bank AGAIN on the REDACTED package (visible_dispatch_package) purely to collect narrator directives + feed the lethality arbiter — but with a crippled bank_context={'npc_pool': [...]} (NO snapshot/pack/player_name). Because the confrontation/magic/scenario/npc subsystems are kw-only on those, every stateful subsystem raises TypeError there (run_confrontation_dispatch() missing 3 required keyword-only arguments). Captured live in Playtest 2026-05-25 (~/.sidequest/logs/sidequest-server.log:87-88) as the second of the two confrontation-exercise errors. This is a pre-59-4 leftover: 59-4 moved engagement into intent_router_pass, but this older directive-collection re-run was never retired. It does NOT block engagement (pass 1 already engaged) and PR #448's watcher fix stopped it crashing the turn — so it is now NON-FATAL OTEL noise, not a functional bug. But it (a) pollutes the GM-panel Subsystems tab with spurious TypeError rows that look like engagement failures, and (b) is a latent DOUBLE-DISPATCH trap: if anyone 'fixes' it by handing the orchestrator full context, the stateful subsystems would RE-ENGAGE a second time (the confrontation guard 'encounter already active' saves confrontation, but magic_working/scenario_clue/npc_agency are not all idempotent) — a one-mechanism violation (feedback_one_mechanism_per_problem). DO NOT paper it with context; that is the wrong fix and explicitly banned. CORRECT FIX (design-aware): engage ONCE (pass 1), and have the orchestrator collect narrator-visible directives WITHOUT re-exercising side-effecting subsystems. Approaches to weigh during design: (A) thread pass-1's BankResult through turn_context and redact the resulting DIRECTIVES per-entry (each NarratorDirective carries a VisibilityTag.redact_from_narrator_canonical — the same flag redact_dispatch_package uses at the package level), instead of re-running the bank on the redacted package; OR (B) a directive-collection-only mode of run_dispatch_bank that does not invoke stateful subsystem side effects. SUBTLETY TO TEST CAREFULLY (perception firewall, ADR-105): the lethality arbiter (orchestrator.py:2554, LethalityArbiter.arbitrate) currently consumes the bank_result derived from the REDACTED/visible package; if you switch it to pass-1's CANONICAL bank_result, ensure no redacted/canonical-only info leaks to the narrator through the arbiter's directives. Cross-check 59-9 (cross_player redaction gap in redact_dispatch_package) — related firewall surface. OTEL: keep the dispatch_bank + subsystem_exercise spans firing exactly once per turn after the change (a clean Subsystems tab is the acceptance signal). Origin: flagged by Dev during the 2026-05-25 confrontation-engagement fix (PR #448); Keith confirmed it is engineering, not a product decision."
    points: 5
    priority: p2
    status: done
    started: '2026-05-29'
    repos: sidequest-server
    workflow: tdd
    acceptance_criteria:
      - Exactly ONE run_dispatch_bank invocation exercises side-effecting subsystems per turn (the pre-narrator engagement pass); the orchestrator no longer re-exercises them
      - Narrator-visible directives still reach the prompt, correctly redacted per ADR-105 (no redacted/canonical-only entry leaks to the narrator)
      - Lethality arbiter still receives a correct bank_result with no perception-firewall leak; cross-checked against 59-9
      - OTEL Subsystems tab shows each subsystem exercised once per turn — no spurious TypeError rows; dispatch_bank + subsystem_exercise spans fire exactly once
      - 'Regression: a confrontation turn shows zero subsystem errors in OTEL when engagement succeeds (the clean-Subsystems-tab signal)'
    completed: '2026-05-29 — already delivered by PR #508 (63f3ffe, dispatch-bank consolidation); no new work. Verified by TEA: single production call site (intent_router_pass.py), orchestrator consumes stashed bank_result with per-directive redaction, ACs pinned by tests/server/test_dispatch_bank_consolidation_G5.py.'
