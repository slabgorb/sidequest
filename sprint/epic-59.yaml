    title: Opponent-yield signal — record outcome opponent_yielded/player_victory when an opponent backs down (not abandoned)
    description: |-
      BUG (sq-playtest wry_whimsy/oz session 2026-06-02-oz-3, turn 7; ping-pong BUG-LOW 'Yielded confrontation logs outcome: abandoned_on_location_change'): the player stood their ground against the Cowardly Lion; the Lion YIELDED (backed down — his canon behavior). The confrontation resolved same-turn in prose with ZERO beats and no dial threshold met. The recorded outcome was abandoned_on_location_change — which reads as 'the player walked away from an unfinished fight' when in fact THE OPPONENT SURRENDERED AND THE PLAYER PREVAILED. The outcome LABEL is wrong.

      OPERATOR DECISION (Keith, 2026-06-02): add a narrator opponent-yield signal so a yielded opponent records outcome opponent_yielded/player_victory (NOT abandoned), and confirm whether a cowed/yielded opponent grants XP/advancement.

      RELATIONSHIP TO #576 (predecessor) — PR #576 (feat/encounter-victory-on-location-change) already fixed the HIGHER-priority sibling: a location change at/after a MET dial threshold now resolves player_victory/opponent_victory via StructuredEncounter.dial_threshold_outcome() (+ confrontation_resolved_on_location_change span). It explicitly punted (a) the no-threshold-met opponent-yield residual and (b) the XP-on-victory question to a follow-up — THIS story. #576 was a direct bug-fix PR with no sprint label, so no label collision.

      SEAM (verified against origin/develop HEAD #585):
      - WRONG-LABEL site: narration_apply.py ~2788-2860 (location-change scene-boundary handler). #576 added: won_outcome = active_encounter.dial_threshold_outcome(); if a threshold is met -> player_victory/opponent_victory; ELSE the else-branch sets active_encounter.outcome='abandoned_on_location_change'. The Lion-yield case has NO threshold met (zero beats) so it falls to the else -> abandoned. THAT is the residual.
      - EXISTING YIELD INFRA IS PLAYER-SIDE ONLY: dispatch/yield_action.py handle_yield sets enc.outcome='yielded' and emits ResolutionSignal(outcome='yielded', yielded_actors=...) when a PC yields. There is NO path for the OPPONENT to yield. ASYMMETRY THE DESIGN MUST PRESERVE: a PLAYER yield is a withdrawal/LOSS; an OPPONENT yield is a player VICTORY — so opponent-yield maps to a DISTINCT outcome (opponent_yielded -> resolves player_victory), and MUST NEVER reuse the player-side 'yielded' label.
      - ENGINE ALREADY MODELS A YIELDED OPPONENT: EncounterActor.withdrawn:bool (flips True when an actor yields; withdrawn actors are skipped by _apply_beat) and StructuredEncounter.opponents_disposition ('surrendered'|'routed', set by the B/X morale path _apply_flee_consequence in narration_apply.py ~502-540, which already sets resolved=True + outcome on surrender/rout). This is REUSE-FIRST infra: we do not invent a new actor state.

      DESIGN DIRECTION (Architect / White Queen, 2026-06-02):

      TRIGGER — narrator signal + ENGINE-CHECKED confirmation (prefer deterministic; avoid the 59-27/59-15 LLM-under-firing risk family). The narrator marks the opponent as yielded via the EXISTING write tool surface — reuse update_npc_disposition with disposition 'surrendered' OR a thin opponent-yield flag on advance_confrontation (axis='opponent' is already the opponent dial). DO NOT add a brand-new tool unless the seam review shows neither fits. The ENGINE then DETERMINISTICALLY confirms the yield at the post-turn sweep / location-change boundary: an opponent is YIELDED iff every side='opponent' actor is withdrawn (or opponents_disposition in {'surrendered','routed'}) AND no opposing actor remains active. This makes the resolution engine-checked, not pure-LLM-compliance — the narrator's signal is the trigger, the engine state is the proof (CLAUDE.md: the GM panel is the lie detector).

      OUTCOME MAPPING — add an opponent-yield resolution branch (a new helper alongside dial_threshold_outcome(), e.g. opponent_yield_outcome() -> 'player_victory' | None) that returns player_victory when all opponent-side actors are withdrawn/surrendered. The recorded enc.outcome is 'opponent_yielded' (the narrative-precise label, sibling to player-side 'yielded') which RESOLVES AS player_victory for reward/credit purposes — distinct from the player-side 'yielded' (loss) and distinct from 'abandoned_on_location_change' (genuine walk-away).

      LOCATION-CHANGE SEAM FIX — in the narration_apply.py ~2835 else-branch (the residual): BEFORE falling to abandoned_on_location_change, check opponent_yield_outcome(). If the opponent has yielded, resolve player_victory with outcome='opponent_yielded' + the confrontation_resolved_on_location_change span (reuse #576's emit) rather than abandoned. Only a genuinely-unfinished encounter (no threshold met, no opponent yield) still abandons. Also wire opponent_yield_outcome() into the post-turn _resolve_dial_threshold_and_phase sweep so a same-turn opponent yield resolves WITHOUT needing a location change (the Lion yielded same-turn in prose — the resolution must not depend on the party walking out).

      XP DECISION (operator question answered) — TODAY there is NO victory-XP bonus: award_turn_xp (dispatch/encounter_lifecycle.py:1256) gives a flat PER-TURN tick to every seated PC (25 in_combat / 10 otherwise). The '+10 on escape, none on yield' the ticket observed is the in_combat flag differing per turn, NOT a victory reward. DECISION: a yielded/cowed opponent IS a player victory and MUST grant the SAME advancement credit as any other player_victory — i.e. opponent_yielded resolving as player_victory flows through whatever victory-keyed reward path exists for player_victory (parity, not a special yield bonus). Since #576 already routes location-change wins to player_victory and no separate victory-XP bonus exists yet, the contract for THIS story is: opponent_yielded resolves player_victory and is treated IDENTICALLY to a beat/dial player_victory for any XP/advancement keyed on player_victory — no yield-specific penalty or bonus. If a victory-XP bonus is introduced later it keys on player_victory and inherits this for free.

      OTEL (CLAUDE.md OTEL principle — the resolution decision MUST be visible) — emit a watcher span, component='confrontation', on the opponent-yield resolution. Reuse the encounter_resolved_span family / the confrontation_resolved_on_location_change emit, with attrs: outcome='player_victory', resolution_label='opponent_yielded', trigger ('opponent_yield_sweep' | 'opponent_yield_on_location_change'), yielded_opponents (list of withdrawn/surrendered opponent actor names), opponents_disposition. Keith can confirm on the GM panel that the engine — not the narrator's prose — recorded the victory (dev observability only — NOT a Sebastien feature).

      DORMANT 49-5 RESOLUTION-SIGNAL THREADING — the [ENCOUNTER RESOLVED] narrator zone is dormant in production: narration_apply/yield_action set snapshot.pending_resolution_signal but _build_turn_context (session_helpers.py) never copies it into TurnContext.pending_resolution_signal, so narrator.py ~331 (which reads resolution_signal.outcome=='yielded') never fires. DECISION: this story STANDS ALONE and does NOT require reviving 49-5. The outcome-label fix, the engine-checked resolution, and the OTEL span all live on the apply/sweep path and are independently testable. We SHOULD still stamp snapshot.pending_resolution_signal on opponent-yield resolution (cheap, correct, matches the dial-threshold sweep which already calls _build_resolution_signal) so that WHEN 49-5 revives the threading, the opponent-yield close narrates correctly for free — but the narrator-zone narration is NOT an acceptance gate here. File a delivery finding cross-linking 49-5 if the signal shape needs a new field for opponent-yield.

      SCOPE — one backend repo (sidequest-server). No new ADR (this is ADR-116 'a confrontation requires an Other' + the #576 outcome-resolution seam enacted on existing actor/disposition state). Content: none required (opponent-yield is engine-inferred from withdrawn/disposition state the narrator already sets via existing tools). Design-first if the seam review finds neither update_npc_disposition nor advance_confrontation can carry the trigger cleanly — then a thin tool field is the fallback, decided in the dev's first design pass.
