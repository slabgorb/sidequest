id: '108'
type: epic
title: WN combat owns the WN round — remove native beat scaffolding under a Without Number binding (ADR-143)
description: "Source: Keith's emphatic 2026-06-14 standing ruling (gm-decisions.md; ADR-143; SOUL.md 'Bind the Ruleset, Don't Balance It'). We bind Without Number so we never have to balance combat; the native ADR-033 beat/dial engine layered under a WWN binding is the dead end we keep failing at (scope too large, endless seam-tuning). This epic REMOVES the native combat scaffolding from the WN combat path — it does NOT balance/tune/gate it. Supersedes the 'Option A full-defend' path (#839) and every convert/tune finding (#192 mitigation magnitude, #442 Counter-Stance conversion, Brace tuning); resolves what canceled story 106-3 was flailing at by removal instead of conversion. CRITICAL CONTEXT: the WN initiative-round engine (wn_round.py, story 102-4) ALREADY EXISTS and already runs WWN hp_depletion combat with persisted initiative — the per-beat auto-reprisal is already starved. This is a CLEANUP of residual native reuse, not a new engine. Two residual bleeds: (1) run_wn_round() still calls native apply_beat() (beat_kinds.py) to resolve the player's committed action, so it still grants fleeting tags ('Opening'/'Counter Stance'), advances inert dials, and offers Brace; (2) WWN combat content is still authored as resolution_mode: beat_selection with native beat lists/edge_config. Both are removed, not tuned. Invariants preserved: ADR-116 (Other required; single room-sourced seater — this subsumes the 107-2 MM-seater finding), ADR-139 (win-condition liveness, HP durability, mechanically-capable Other via authored opponent_damage), ADR-114 (ablative HP). OTEL: the lie detector must prove native is OFF (wn.native_scaffolding_suppressed). Scope: WN COMBAT only (hp_depletion); dial chase/negotiation confrontations keep the native dial engine even in WN packs and are untouched. Rollout WWN-first (beneath_sunden in play; heavy_metal/elemental_harmony/barsoom swept the same way); swn/cwn/awn same doctrine, staged. NO rebalancing of any WN number — that's the whole point. Refs: ADR-143, ADR-117 (RulesetModule), ADR-142 (WN core extraction, doc-gap), ADR-033, ADR-116, ADR-139, ADR-114; wn_round.py, beat_kinds.py, dispatch/dice.py (seam ~671-676), game/ruleset/without_number.py. Sibling: Epic 106 (the prior hybrid-hardening epic; 106-3/5/6 canceled by this shift)."
priority: p1
status: ready
repos: server,content
