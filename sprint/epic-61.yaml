  - id: 61-4
    title: Output-token-floor + input-bloat alarm in anthropic_sdk_client.py (60K-in/12-out fingerprint detector)
    description: 'Two-surface alarm against the runaway pattern we just paid $313 for. (A) Runtime alarm in sidequest-server/sidequest/agents/anthropic_sdk_client.py: fire a loud OTEL emit + log when (input_tokens > N x rolling_baseline) AND (output_tokens < M) — the 60K-in/12-out fingerprint the 2026-05-23 incident exhibited. Single-call detection, no daily-aggregate delay. (B) Token-budget guard in scripts/playtest.py and the SDK-replay workflow: print projected token cost before a scenario run starts (sum of per-action input estimates x N tool-loop iters x cache state), refuse to proceed past a configurable cap without an explicit --confirm-cost flag. Also annotate the captured /tmp/real_req_*.json dump files with their token count + projected per-replay cost in a sidecar so the operator can see at a glance what each iteration will bill. The May 23 replay loop printed money silently for hours; this story makes it impossible to do that without explicitly opting in.'
    points: 3
    priority: p0
    status: backlog
    repos: server
    workflow: tdd
    acceptance_criteria:
      - 'Runtime: a single Sonnet call with input_tokens > 2x rolling baseline AND output_tokens < 50 emits a loud watcher event (severity=warn, not info) AND logs at ERROR level. GM panel surfaces the event distinct from other events.'
      - 'Runtime: rolling baseline is per-session, computed over the last K=10 calls with reasonable defaults; fingerprint detector activates after warmup (K calls observed).'
      - 'playtest.py: before scenario execution starts, print projected per-run token cost (input × N iterations × cache state assumption) and refuse to run past --max-projected-cost-usd (default ~$1) without --confirm-cost flag. Failure mode is loud and operator-actionable.'
      - 'SDK replay workflow: any /tmp/real_req_*.json dump file gets a sibling .meta.json with input_tokens + projected_cost_per_replay_usd + per-iter projection. Operator can read at a glance before iterating against it.'
      - 'Regression test: synthesize a 60K-in/12-out call against the fake SDK and assert the runtime alarm fires (one OTEL emit, one ERROR log).'
      - 'Regression test: invoke scripts/playtest.py with cache_diag_60_3 scenario and assert the projected-cost preflight emits and that the run halts when projection > the cap.'
