  - id: 61-7
    title: 'Unify _npc_in_scene predicate with list_npcs_in_scene scene resolution'
    description: "Adversarial probe in 61-2 verify-phase (test_npc_in_scene_predicate_divergence_from_list_npcs_in_scene_tool) measured a real divergence between session_helpers.py:_npc_in_scene (uses Npc.last_seen_location only) and sidequest/agents/tools/list_npcs_in_scene.py:102 (uses Npc.current_room / Npc.location). Three NPC fields signal scene membership today; narrator prose updates last_seen_location while structured state updates may set location/current_room. Unify into a single named predicate that both call sites consume so the snapshot projection and the tool see the same scene resolution. This story is the PREREQUISITE for 61-5 — without unification, the _PHASE_C_PROJECTIONS registry would encode a known divergence. Out-of-scope cleanup folded in (per 61-2 review-fix deferrals): _npc_in_scene signature `npc: object` -> `npc: Npc`, eliminate `payload['npcs'] = []` / `payload['room_states'] = {}` noise, adversarial-probe fixture NIT."
    points: 2
