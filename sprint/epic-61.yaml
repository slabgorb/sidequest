y (all assert content of NARRATOR_OUTPUT_ONLY — after the rename these assert SDK prose, no logic change). Decision flagged for review: this story REMOVES claude -p and Ollama as narrator backends in llm_factory.py (they error loudly if SIDEQUEST_LLM_BACKEND=claude_cli or =ollama). claude -p stays available for non-narrator callers (dungeon 'curate'). ADR-101 update: add an amendment noting the legacy backends are gone for narration — non-narrator usage continues."
