    description: 'Already shipped via commit 06ad79c (2026-05-21, feat(24-10): wire world-grounding loaders + ToolContext fields at bootstrap) as a side-effect of story 24-10. The lore_store wiring at orchestrator.py:3502 was Phase E of ADR-048 — commit message and code comments make this explicit. Tests at tests/server/test_turn_context_sdk_wiring.py::test_build_turn_context_populates_world_session_store_lore + tests/agents/tools/test_query_lore.py::test_otel_attrs_on_hit cover the AC. Verified 2026-05-23 by TEA + SM: 16 passed. No new code or branch needed.'
