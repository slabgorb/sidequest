  - id: 61-4
    title: Output-token-floor + input-bloat alarm in anthropic_sdk_client.py (60K-in/12-out fingerprint detector)
    description: 'Two-surface alarm against the runaway pattern we just paid $313 for. Steady-state per-turn cost target is **~$0.03/turn** (60-4 post-fix estimate; healthy Sonnet narrator turn). The runaway pattern was ~$0.50-$1.50/turn at peak, 15-50x over target. (A) Runtime alarm in sidequest-server/sidequest/agents/anthropic_sdk_client.py: fire a loud OTEL emit + log when a single call''s cost_usd > 5x rolling baseline OR matches the 60K-in/12-out fingerprint (input_tokens > 2x baseline AND output_tokens < 50). Single-call detection, no daily-aggregate delay. (B) Token-budget guard in scripts/playtest.py and the SDK-replay workflow: print projected token cost before a scenario run starts (sum of per-action input estimates x N tool-loop iters x cache state), refuse to proceed past --max-projected-cost-usd (default $0.50, ~16x the per-turn target — generous headroom for warm-up + a 5-action scenario, tight enough to catch a runaway by the second turn) without an explicit --confirm-cost flag. Annotate captured /tmp/real_req_*.json dump files with token count + projected per-replay cost in a sidecar so the operator can see at a glance what each iteration will bill. The May 23 replay loop printed money silently for hours; this story makes it impossible to do that without explicitly opting in.'
    points: 3
    priority: p0
    status: done
    assigned_to: slabgorb
    started: '2026-05-23'
    repos: server
    workflow: tdd
    acceptance_criteria:
      - 'Steady-state target documented: healthy narrator turn cost is ~$0.03/turn (per 60-4 post-fix estimate). All defaults in this story are derived from this target, not from absolute thresholds.'
      - 'Runtime: a single Sonnet call where cost_usd > 5x rolling-baseline cost OR (input_tokens > 2x baseline AND output_tokens < 50) emits a loud watcher event (severity=warn, not info) AND logs at ERROR level. GM panel surfaces the event distinct from other events.'
      - 'Runtime: rolling baseline is per-session, computed over the last K=10 calls; fingerprint detector activates after warmup (K calls observed). First-N calls without baseline use the $0.03/turn target as the comparison floor.'
      - 'playtest.py: before scenario execution starts, print projected per-run token cost (sum of per-action input × tool-loop iters × cache assumption) and refuse to run past --max-projected-cost-usd (default $0.50) without --confirm-cost flag. Failure mode is loud and operator-actionable. $0.50 = ~16x the $0.03/turn target, catching runaway by the second turn while not false-positiving on healthy scenarios.'
      - 'SDK replay workflow: any /tmp/real_req_*.json dump file gets a sibling .meta.json with input_tokens + projected_cost_per_replay_usd + per-iter projection. Operator can read at a glance before iterating against it.'
      - 'Regression test: synthesize a 60K-in/12-out call against the fake SDK and assert the runtime alarm fires (one OTEL emit, one ERROR log).'
      - 'Regression test: invoke scripts/playtest.py with a synthesized over-cap scenario and assert the projected-cost preflight emits and that the run halts when projection > $0.50.'
    completed: '2026-05-23'
