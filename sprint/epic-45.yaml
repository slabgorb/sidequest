    review_findings: 3 HIGH (mp.round_dispatched.player_count divergence at session_handler.py:3302; missing wire-first test for chargen→barrier seam; LobbyState docstring lies about CLAIMING_SEAT observability) + 4 MEDIUM (lobby_participant_count includes ABANDONED; stale solo-room comment; is_paused docstring inaccurate; missing transition_to_playing OTEL test). Total ~5-line code fix + 3-4 test additions + 3 doc edits.
