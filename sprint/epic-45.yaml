  - id: 45-33
    title: Sealed-letter bypass test + empty-fallback intent for 45-18
    description: |-
      Two adversarial-review findings from Westley on 45-18 (PR #98 already
      merged). Both are correctness gaps in `_registry_fallback_npcs` /
      `instantiate_encounter_from_trigger` (sidequest/server/dispatch/encounter_lifecycle.py).

      **Finding 1 — Sealed-letter bypass has zero test coverage.**
      The diff guards `if not npcs_present and cdef.resolution_mode != ResolutionMode.sealed_letter_lookup:`
      to keep registry NPCs from leaking into a sealed-letter (red/blue duel)
      encounter. A regression that flips `!=` to `==` or deletes the guard
      would compile, lint, pass all 2685 tests, and silently break the
      dogfight duel by pulling bystander NPCs into the actors list.
      Add `test_sealed_letter_does_not_consume_registry_fallback`: fixture
      with sealed-letter confrontation, snapshot with NPC at player's
      location in registry, narrator emits empty `npcs_present`. Assert
      registry NPC is NOT in actors.

      **Finding 2 — Empty + empty produces original bug shape.**
      When narrator's `npcs_present == []` AND `_registry_fallback_npcs`
      returns `[]` (no NPCs at player location, or `snapshot.location is None`),
      encounter still instantiates with `actors=[player only]` — the exact
      Playtest 3 bug we just shipped a fix for. Per CLAUDE.md No Silent
      Fallbacks, decide intent:
        (a) by-design graceful degradation — drop a code comment, add an
            assertion test that `actor_count == 1` with that path, confirm
            `encounter_empty_actor_list_span` carries the lie-detector signal.
        (b) accidental hole — add a no-opponent guard in
            `instantiate_encounter_from_trigger` that raises (with OTEL span)
            when category=combat resolves to zero opponents post-fallback.

      **Out of scope (defer to a separate story if needed):**
      - Side-classification heuristic too coarse (registry NPCs default to
        `side=opponent` for combat, ignoring `entry.role` — risks
        mis-registering allies in mixed-presence combat).
      - `encounter_empty_actor_list_span` warning text reads "actors=empty"
        even when fallback will populate. Minor wording fix.
    points: 2
    priority: p2
    status: backlog
    repos: server
    workflow: tdd
    type: bug
  - id: 45-34
    title: ADR-051 amendment + architecture.md update for 45-11 lockstep collapse
    description: |-
      Westley's deeper post-merge review of 45-11 (PR #101 already merged)
      flagged a silent contradiction with ADR-051 that needs to be made
      explicit before the next architecture audit.

      **Background:** 45-11 chose Strategy A — `record_interaction()` now
      advances both `interaction` and `round` in lockstep. ADR-051
      ("Two-Tier Turn Counter") explicitly states `round` should advance
      "only on meaningful narrative beats: location changes, chapter
      markers, and trope escalations" and that the single-counter model
      was REJECTED. Reality on disk: `advance_round()` had zero production
      callers — the two-tier model was aspirational, never wired.
      Strategy A consolidates the model in practice.

      **Tasks:**
      1. Amend ADR-051 (or supersede it) to reflect the new lockstep
         semantics. Document the historical drift (advance_round() never
         called; narrative_log.round_number was always = interaction).
         Reference 45-11 PR #101 as the cutover.
      2. Update `docs/architecture.md` line 191 (cross-reference to
         ADR-051) to match the amended ADR text.
      3. (Non-blocking nice-to-have from Westley point #4) Add
         `lookup_failed=True` attribute to `turn_manager.round_invariant`
         span when `max_narrative_round()` raises, so the GM panel can
         distinguish instrument failure from divergence. Currently the
         except block falls back to 0 which produces a misleading
         "ahead by N" violation row in the dashboard. Defensible as-is
         until GM-panel UI lands; tighten when it does.

      **Out of scope:** any reconsideration of Strategy A itself
      (i.e., backing out lockstep and wiring real narrative-beat
      triggers). That's a much bigger story / probably its own epic
      and was not the choice made in 45-11.
    points: 1
    priority: p2
    status: backlog
    repos: server
    workflow: trivial
    type: chore
