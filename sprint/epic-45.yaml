    title: "Retry button aria-describedby on slug-mode metadata-error (was 37-50)"
    description: |-
      Wire aria-describedby on the Retry button at src/App.tsx:1056 to point
      to the role=alert paragraph so screen readers associate the
      failed-to-load message with the retry affordance. Minor a11y
      improvement; non-blocking for playgroup but the cost is trivial.
    points: 1
