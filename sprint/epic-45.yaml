id: '45'
type: epic
title: "Playtest 3 Closeout — MP Correctness, State Hygiene, and Post-Port Cleanup"
description: |-
  Successor epic to Epic 37, which accreted four playtests' worth of fixes
  plus port-drift residue from ADR-082 (Rust → Python). Epic 45 absorbs 37's
  open backlog, splits the 5-8pt grab-bag stories (37-38, 37-39, 37-40, 37-41)
  into tight single-AC stories, and re-scopes the sidequest-api references
  to the current Python tree per ADR-085.

  Three lanes:

    (A) Sprint-2-aligned MP correctness — sealed-letter shared-world delta,
        turn-barrier fix, momentum sync. Ships in Sprint 2 alongside the
        sealed-letter goal.

    (B) State write-back hygiene — playtest 3 (2026-04-19) revealed bookkeeping
        counters and resolution handshakes that fire but never persist. Each
        sub-item gets its own OTEL span on the write path.

    (C) UI/cleanup tax + tuning + render observability — the rest of 37's
        open work, prioritized to defer below Lane A/B. Tuning (G) and render
        observability (H) are P2/P3; they should not displace correctness work.

  Convention: every story names its source 37-N sub-item in the description
  for traceability.
priority: p1
status: backlog
repos: server,ui,content,daemon
stories:
  - id: 45-1
    title: "Sealed-letter world-state handshake — shared-world delta between turns (port-drift re-scope of 37-37)"
    description: |-
      Re-scopes 37-37 to the Python tree (ADR-085). After each player turn,
      emit a minimal shared-world delta (current location, active encounter
      id, party formation/adjacency) that seeds the next player's turn so
      narrator stops fabricating physical separations to explain party-mate
      absence. Playtest 3 (2026-04-19): Orin's save invented a 'collapsed
      corridor' separating him from Blutka because Orin's game_state had no
      ground-truth that Blutka was in the same room. Canonical: location,
      encounter presence, adjacency. Perceived (stays POV): mood, tactics,
      what the peer is feeling. OTEL span on handshake merge with
      conflict-resolution events. Blocked on no upstream — ready now.
    points: 5
    priority: p1
    status: backlog
    repos: server
    workflow: wire-first
    type: bug
  - id: 45-2
    title: "Turn barrier counts active turn-takers, not lobby connections (was 37-42)"
    description: |-
      Playtest 3 (2026-04-19) evropi session: 4 saves clustered at 16:30-16:31
      UTC; only Rux played, but the structured-mode turn barrier waited on all
      4 lobby connections. Rux hit barriers mid-solo because phantom lobby
      peers never took their turns. Fix dimensions to evaluate: drop barrier
      slots for players who haven't submitted a turn within N seconds, OR only
      count players whose characters have advanced past round 0, OR explicit
      lobby joined-vs-playing states, OR chargen-abandonment cancels the
      lobby slot. OTEL must emit lobby_participant_count vs active_turn_count
      on every barrier wait so GM panel shows which count drives the block.
    points: 3
    priority: p1
    status: backlog
    repos: server
    workflow: wire-first
    type: bug
  - id: 45-3
    title: "Momentum readout state sync — UI subscribes to BEAT_RESOLVED (was 37-32)"
    description: |-
      UI momentum value lags server BEAT_RESOLVED. Confirm snapshot field
      updates on resolution, ensure UI subscribes to the right message kind,
      and verify ConfrontationOverlay reads the live momentum off the state
      mirror. Sebastien (mechanical-first player) is the audience — a
      momentum dial that lags the actual beat is a lie-detector miss.
    points: 2
    priority: p1
    status: backlog
    repos: server,ui
    workflow: wire-first
    type: bug
  - id: 45-4
    title: "Strip {{generated at session start}} placeholder leaks from world history.yamls (split from 37-40 sub-3)"
    description: |-
      All evropi/long_foundry/flickering_reach world history.yamls carry
      world_history[0].character.name='{{generated at session start}}'
      unresolved, polluting narrator context every turn. Either resolve the
      template at session start (preferred — wire it to chargen output) or
      remove the literal placeholder so the narrator never sees the curly
      braces. Files: heavy_metal/evropi/history.yaml:182,
      heavy_metal/long_foundry/history.yaml:123,
      mutant_wasteland/flickering_reach/history.yaml:114.
    points: 1
    priority: p0
    status: backlog
    repos: content,server
    workflow: trivial
    type: bug
  - id: 45-5
    title: "Stale-slot reuse on session reinit blocks turn 1 (split from 37-40 sub-1)"
    description: |-
      Playtest 3 evropi: prot_thokk and hant saves created 2026-04-19T16:31
      UTC but narrative_log held a single entry dated 2026-04-18; session
      never fired Turn 1 (last_played == created_at, turn_manager frozen at
      round=0/interaction=2). Prior-day narrative survived session reinit
      because DB row wasn't cleared. Session lifecycle must either clear old
      rows on reinit OR refuse to write over a populated slot. Relates 37-29,
      37-1.
    points: 3
    priority: p1
    status: backlog
    repos: server
    workflow: tdd
    type: bug
  - id: 45-6
