    description: |-
      Playtest 3 evropi: pumblestone_sweedlewit had resolved_archetype=NULL,
      no hp/ac, never advanced past opening. Chargen pipeline has a success
      path that skips archetype binding. Identify the path and require
      archetype resolution before chargen can complete. Relates 37-7.
