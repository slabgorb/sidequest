    status: backlog
    repos: ui
    workflow: trivial
    type: chore
  - id: 45-25
    title: "Replace 300ms setTimeout with effect-based readyState=OPEN wait (was 37-51)"
    description: |-
      Replace MP-01 slug-connect 300ms setTimeout workaround with an
      effect-based readyState === OPEN wait. App.tsx:1260 currently spaces
      the SESSION_EVENT connect send behind an arbitrary 300ms timer to work
      around the socket not yet being OPEN after connect(). Cleaner fix: an
      effect that listens for the readyState transition to OPEN and sends
      the connect message then. Works today, not a bug, but arbitrary timers
      in WS handshake paths tend to regress under load.
    points: 2
    priority: p2
    status: backlog
    repos: ui
    workflow: tdd
    type: refactor
  - id: 45-26
    title: "Delete legacy /api/saves/* endpoints + (genre, world, player) save-path helper (was 37-52)"
    description: |-
      Clean-up after MP-03 has landed. Delete legacy /api/saves/* REST routes
      (rest.py:283/365/418, all marked deprecated) and the old (genre, world,
      player) save-path helper in sidequest-server/sidequest/game/persistence.py.
      Acceptance:
        - Legacy /api/saves/* routes removed from rest.py.
        - Old (genre, world, player)-tuple save-path helper in persistence.py
          removed.
        - No call sites remain (grep is clean).
        - All existing tests pass; legacy-helper tests deleted or retargeted.
    points: 2
    priority: p2
    status: backlog
    repos: server
    workflow: tdd
    type: chore
  - id: 45-27
    title: "Trope progression cooldown + simultaneous-active cap (was 37-43)"
    description: |-
      Playtest 3 Felix: mid-session pile-up of trope progressions caused
      narrative thread confusion (Sebastien reported it directly).
      Tuning dimensions: dial back per-tick progression rates, cap
      simultaneously-active tropes at 2-3 (queue the rest), foreground
      load-bearing tropes in narrator prompt and background the rest, stagger
      fire-readiness, add cooldown after a trope fires before a new one
      activates. OTEL must emit active_trope_count, progression_max,
      progression_avg per turn so GM panel shows tempo. Telemetry-improves
      after 45-9 (total_beats_fired) lands.
    points: 3
    priority: p2
    status: backlog
    repos: server
    workflow: wire-first
    type: chore
  - id: 45-28
    title: "Markov namegen min-pool guard + thin-corpus audit (was 37-45)"
    description: |-
      Playtest 3: 'Frandrew Andrew' generated by Markov namegen — classic
      too-small-corpus stem-repetition artifact. Fix:
        (a) audit corpus word-list sizes per culture; flag any below threshold.
        (b) min-pool guard in namegen — fail loud (warn + OTEL) when corpus
            drops below N entries rather than silently emitting stem-repeats.
        (c) expand thin culture corpora for aureate_span source cultures.
        (d) unit test that no generated name has identical prefix and suffix
            stems.
    points: 3
    priority: p2
    status: backlog
    repos: server,content
    workflow: wire-first
    type: bug
  - id: 45-29
    title: "Daemon span-context per-call art_style scoping (was 37-34)"
    description: |-
      Stale art_style from prior session leaks onto embed spans across
      sessions; scope attributes per call or clear on session boundary.
    points: 2
    priority: p3
    status: backlog
    repos: daemon
    workflow: trivial
    type: bug
  - id: 45-30
    title: "Render trigger policy contract + OTEL render.trigger reasons (was 37-46)"
    description: |-
      Playtest 3 Felix: 71-turn session produced ~6-8 renders out of 71
      scrapbook rows; selection looked arbitrary, not policy-driven. Define
      explicit trigger contract — always render on beat fire / scene change /
      named-NPC introduction / resolved-encounter; skip on banter/aside/quiet
      turns. Expose trigger reasoning in OTEL span (render.trigger
      reason=beat_fire|scene_change|npc_intro|resolved|none_policy). Optional:
      session-level density target with backpressure-aware enforcement.
      UI indicator for skipped-but-eligible vs requested-but-failed.
    points: 3
    priority: p2
    status: backlog
    repos: server
    workflow: wire-first
    type: bug
  - id: 45-31
    title: "Daemon worker heartbeat + render-unavailable degradation (was 37-47)"
    description: |-
      Playtest 3 Felix: last render landed 14:43 EDT but session played to
      14:56 EDT — last 13 minutes produced zero renders for rows that policy
      should have fired on. No way to tell from save whether render failed,
      was dropped, or was never requested. Fix scope:
        (a) daemon emits OTEL heartbeat on ready/busy/paused per queue.
        (b) enqueue path warns loud when queue depth exceeds threshold or
            returns back-pressure.
        (c) graceful degradation — daemon unresponsive → 'render unavailable'
            marker in scrapbook row, not silent miss.
        (d) post-session worker state logging for diagnosis.
    points: 5
    priority: p2
    status: backlog
    repos: server,daemon
    workflow: wire-first
    type: bug
