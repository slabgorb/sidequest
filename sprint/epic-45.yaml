  - id: 45-11
    title: "turn_manager.round invariant against narrative_log.max_round (split from 37-38 sub-4)"
    description: |-
      Playtest 3 Felix: turn_manager.round=65 but narrative_log max=72, 7-round
      gap. Round-keyed gating operates on stale round data. turn_manager.round
      must not lag narrative_log.max_round at end of turn; add invariant check
      with OTEL span every tick. Investigate the divergence root cause —
      likely a missed write-back somewhere in the resolution pipeline.
    points: 2
