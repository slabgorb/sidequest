  - id: 45-9
    title: "total_beats_fired counter increments on every beat fire + OTEL (split from 37-38 sub-1)"
    description: |-
      Playtest 3: total_beats_fired frozen at 0 across 3 saves despite real
      beat fires (Orin had 5 fired beats including a Resolved extraction_panic
      trope). Counter is defined at session.py:400 but never incremented
      anywhere — confirmed via codebase audit 2026-04-27 (zero += matches).
      Increment in _apply_encounter_beats() on every beat fire; emit OTEL
      span with current counter value. Any beat-gated unlock perpetually
      blocks today.
    points: 1
    priority: p1
    status: backlog
    repos: server
    workflow: trivial
    type: bug
  - id: 45-10
    title: "Scrapbook backfill detection on save resume (split from 37-38 sub-3)"
    description: |-
      Playtest 3: Orin scrapbook covered 10 of 29 rounds — subsystem blind to
