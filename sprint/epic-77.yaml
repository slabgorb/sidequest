      - 'ADR decides the fate of quest_anchors: promote to a first-class WorldStatePatch field with a write path, OR retire the dead read-only field (no structurally-dead fields left)'
      - 'ADR resolves the one-mechanism question: the dead legacy quest_updates lane and the deprecated apply_world_patch escape hatch are reconciled (retired/replaced), not left coexisting with a new tool'
      - ADR specifies the OTEL span(s) for quest-create + stakes-set (GM-panel lie-detector), per the OTEL Observability Principle
      - ADR enumerates the implementation stories to spawn under epic 77 (engine, and optional UI quest/objective panel) with point estimates
      - active_seeds is explicitly carved out as a SEPARATE content task (author a wry_whimsy seed_tropes deck, ADR-128; delegate to a gm agent) — referenced in the ADR, not solved here
