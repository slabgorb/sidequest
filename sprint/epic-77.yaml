id: '77'
type: epic
title: Quest & Stakes Substrate
description: 'Implementation of ADR-137 (quest & stakes substrate). Design story 77-1 is DONE — ADR-137 decides Option C (seed-at-creation + typed record_quest/set_stakes tools) as engine core with the UI panel as a committed fast-follow, promotes quest_anchors to first-class (live consumer in orbital/course.py:157), and consolidates to one mechanism (retire the legacy quest_updates lane + the apply_world_patch quest/stakes escape-hatch paths). Root cause: a lane exists to UPDATE a quest but none to CREATE/anchor one; stakes only flow from a trope handshake that never fires in prose packs. See docs/adr/137-quest-stakes-substrate.md §Implementation Stories. Reviewer (The Merovingian) carried 5 non-blocking findings into these stories.'
priority: p2
status: in_progress
repos: server,ui
