id: '7'
type: epic
title: Scenario System — Bottle Episodes, Whodunit, Belief State
description: >-
  Port the scenario/mystery system from sq-2. Scenarios are structured
  narrative arcs (whodunit, rat-hunt) with NPC belief modeling, gossip
  propagation, and accusation mechanics. This is what makes "who killed the
  merchant?" work as a game mechanic. BeliefState tracks per-NPC knowledge
  bubbles with facts, suspicions, and credibility scores. Gossip propagation
  spreads claims between turns. Clue activation evaluates semantic triggers
  against game state. The accusation system resolves evidence quality when
  a player makes an accusation. NPCs act autonomously within scenarios —
  creating alibis, confessing, fleeing, or destroying evidence.
  Key reference: sq-2/sidequest/scenario/*.py, oq-2/docs/adr/030-scenario-packs.md.
priority: p1
status: ready
repos: sidequest-api
