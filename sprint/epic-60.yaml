  - id: 60-7
    title: Diagnose + fix 60-4 cache fix that fails on live playtest (5m writes still firing per turn)
    description: '60-4 shipped with passing unit tests and a measured-in-isolation rebate, but the first live tea_and_murder/glenross session (2026-05-23, 11 turns, save ~/.sidequest/saves/games/2026-05-23-annees_folles/save.db) shows the fix is NOT holding. Per-turn evidence pulled from `turn_telemetry` prompt_assembled.cache_usage: avg $0.165/turn vs 60-4''s $0.04 target (4x over). Cold turn 1: $0.218 (3x over the predicted $0.07). Every turn after T1 fires BOTH a ~14k cache_write_5m AND a ~15k cache_write_1h — 60-4 AC-1 explicitly required `ephemeral_5m_input_tokens == 0`. Total session spend: $1.82 over 11 turns. Cached blocks ARE byte-stable across all 11 turns (stable=8e44bca5, recency=02eaadf1, tools=7f235376 — identical every turn), so the 60-3 diagnosis (prefix doesn''t drift) holds; the bug is in the 1h marker not suppressing the default 5m write. Party-mode generated three live hypotheses to test (in order of likely cost): (A) the `anthropic-beta: extended-cache-ttl-...` header is set once at the top of `complete_with_tools` but the SDK may not propagate it to every internal `messages.create` during the tool-use loop, causing the API to silently downgrade message-level 1h markers to 5m on iter 2+; (B) `cache_control` on a user-message content block has different API semantics than on system/tools (it creates a separate cached segment whose TTL may default to 5m without the beta header in scope on that exact call); (C) A+B compound. Sensitization context: Keith recently took a $300 runaway-credits hit and is acutely cost-sensitive — this story is p0 because the cost-control system shipped, claimed verified, and is silently failing. Sibling 60-5 (playtest validation) is the parent dependency — this story IS the bug-file 60-5 AC-5 said to create if the rebate did not materialize.'
    points: 5
    priority: p0
    status: backlog
    repos: server
    workflow: tdd
    depends_on: 60-5
    type: bug
    acceptance_criteria:
      - 'Diagnostic step 1 (wire-capture, do this BEFORE fixing): capture the raw kwargs of every `messages.create` call inside `complete_with_tools` for at least one tool-use turn (iter 1 + iter 2+). Dump to disk per-iteration as JSON. Diff iter 1 vs iter 2 with attention to (i) presence of the `anthropic-beta: extended-cache-ttl-...` header, (ii) presence and ttl of `cache_control` on the newest user message''s last content block. Record findings in the session file as the audit-trail for which theory (A/B/C) is correct.'
      - 'Fix is theory-driven, not speculative: do not change the marker placement until the diagnostic above names the bug. If A: pin the beta header on every internal `messages.create` call, not just the outer one. If B: move the marker placement or restructure the cached prefix to keep all cached segments under marker scopes that the API honors. If C: both.'
      - 'AC-1 of 60-4 must hold on live API responses, not unit tests: on a tool-use turn, `cache_creation.ephemeral_5m_input_tokens == 0` for ALL `messages.create` calls in the tool loop (iter 1 AND iter 2+). Verified in `narration.turn` span / `turn_telemetry.prompt_assembled.cache_usage` on a real session, not a synthetic captured-and-replayed payload.'
      - 'Steady-state per-turn cost <= $0.04 (averaged across turns 3-N after warmup) on a live >=10-turn tea_and_murder/glenross session. The cold first turn may still be ~$0.07 (1h prefix warmup write) — that is expected. Compare against the 2026-05-23 baseline session (annees_folles, $0.165/turn avg) and record the delta in the session file.'
      - 'New WARN OTEL span `narrator.cache.both_writes_fired` emitted whenever a single turn has `cache_write_5m > 0 AND cache_write_1h > 0` — this is the lie-detector signature for "the cache fix isn''t working." The GM panel turns visibly red when it fires. If the 60-7 fix ever silently regresses, this span catches the next instance without needing a $300 surprise.'
      - 'Regression test (integration, through `run_narration_turn`): a tool-use turn asserts the live SDK response on the continuation call shows `cache_creation.ephemeral_1h_input_tokens > 0` and `ephemeral_5m_input_tokens == 0`. This test MUST exercise the real SDK code path against a mock that mirrors the actual API''s cache_control + beta-header semantics — NOT a kwargs-shape-only assertion. (60-4''s test was kwargs-shape-only; that is how this bug slipped past.)'
      - 'Wiring test: the new diagnostic capture + `both_writes_fired` span emit on the live `prompt_assembled` / continuation path on a real narrator turn. Capture is on by default in dev/playtest builds; can be opt-in for prod (see runtime config).'
      - 'Document Anthropic''s cache_control semantics under the extended-TTL beta header inside a tool-use loop in `docs/adr/` or `sidequest-server/docs/` — what was observed empirically, with the captured payload diffs as evidence. Replace folklore with a referenced spec; future cache work consults this doc, not the previous fix''s commit message.'
      - 'Do NOT close as verified on unit tests alone. 60-7 closes only on a live >=10-turn session showing steady-state <=$0.04/turn AND `both_writes_fired` span never fires after turn 1. Mirror the 60-5 closure discipline.'
