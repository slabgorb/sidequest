    repos: server
    workflow: tdd
    depends_on: 60-1
    acceptance_criteria:
      - 'Prompt-tab Zone Breakdown marks the CACHE BOUNDARY: each zone/section labeled cached (rides system_blocks[0]) vs uncached (Valley/Late/Recency) vs tools-array, derived from the SAME zone→CacheableBlock mapping the SDK path uses — not a separate recomputation.'
      - Real per-turn API cache usage (cache_read, cache_write, 5m/1h split, cost_usd) from the SDK response is joined onto the turn and shown alongside the breakdown — actuals from narrator.sdk.usage, not char/4 estimates.
      - Per-cacheable-block content digest (e.g. sha256[:8]) is emitted; the display shows DRIFT — whether each cached block's digest changed vs the previous turn (a cached block that changed = a wasted write).
      - Sections whose category is 'state' (volatile) that land in a cached zone (Primacy/Early) are visibly flagged as mis-zoned — the specific lie-detector for the block-0 churn bug.
      - "Accuracy guarantee (test): the event's cached/uncached partition matches the actual system_blocks the SDK client received on the same turn; the display cannot claim 'stable' while the real prompt drifts."
      - 'Wiring test: new fields are emitted on the live prompt_assembled (or successor) path on a real narrator turn AND consumed by PromptTab.tsx — server+ui end to end.'
