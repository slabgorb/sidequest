id: '41'
type: epic
title: ADR-082 — Port sidequest-api (Rust) to sidequest-server (Python) — Phases 0-2
description: |
  Port the Rust game engine to Python per ADR-082. Phases 0 and 1 deliver the
  narration vertical slice (scaffold + protocol + genre + game + telemetry +
  narrator agent + server dispatch + integration playtest). Phase 2 ports
  character creation (builder state machine + dispatch + persistence / world
  seeding / opening-turn bootstrap). 1:1 crate-to-package composition with one
  authorized carve-out: sidequest-genre consolidates per-type genre-layered-derive
  expansions into a single LayeredMerge abstraction.

  Related:
