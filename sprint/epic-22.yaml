id: '22'
type: epic
title: Seed Tropes — Narrative Variety via Schrödinger's Gun
description: Expand the trope engine with short-arc 'seed' tropes — deliberately vague narrative events (a sealed letter, a missing item, an uneasy innkeeper) randomly dealt each session from a per-genre deck. Seeds inject as background context; the LLM narrator retroactively connects them to macro-trope escalations, creating emergent foreshadowing. Expired seeds linger as ghosts for cross-session callbacks. The player experiences a world with narrative memory and variety.
