id: '42'
type: epic
title: ADR-082 Phase 3 — Port confrontation engine (StructuredEncounter + combat dispatch) to Python
description: |
  Phase 3 of the ADR-082 Python port. Ports the unified StructuredEncounter
  model (ADR-033), resource pools, tension tracker, and combat dispatch
  from sidequest-api (Rust) to sidequest-server (Python).

  Four stories in a DAG:
    42-1 (types) → { 42-2 resource_pool, 42-3 tension_tracker } → 42-4 (dispatch + OTEL + narrator wiring)

  42-2 and 42-3 are parallelisable. 42-4 carries a human-playtest
  acceptance gate.

  Structural corrections vs the execution-strategy spec (captured in the
  decomposition plan):
    - combat_models.rs does not exist in Rust source
    - engagement.rs (18 LOC) is trope-engine, not combat
    - Combat and chase are already unified via StructuredEncounter
      (ADR-033); chase cinematography (chase_depth.rs) is Phase 4 on
      top of the already-typed encounter.

  Already ported ahead (Epic 39 Rust work): EdgePool,
  Character.is_broken, Character.edge_fraction. Phase 3 formalises the
  Combatant interface as a Python Protocol.

  Phase 1 IOU promoted in 42-1: GameSnapshot.encounter (dict | None →
  StructuredEncounter | None). Recommendation: pull
  GameSnapshot.resources forward from Phase 4 into 42-2 to avoid a
  second cleanup pass.

  Related:
    - docs/adr/082-port-api-rust-to-python.md
    - docs/superpowers/specs/2026-04-19-python-port-execution-strategy-design.md
    - docs/plans/phase-3-combat-port.md
priority: p0
status: done
completed: '2026-04-24'
reconciliation_note: |
  Reconciled 2026-05-04. The original Epic 42 ran cleanly 2026-04-21
  (PRs #17/#18/#19 for 42-1/-2/-3) and was archived 2026-04-24 via
  orchestrator commit 2ab974e ("finish 42-4 + archive Epic 42") which
  closed 42-4 via Option B (tracker-hygiene path, no sidequest-server
  PR merged — Dev/TEA/Architect/Reviewer all approved on the branch).
  The epic shard was then re-filed from scratch later that day via PR
  #136 (commit 3e19a77), which reset every story to `backlog` except
  42-3. This reconciliation restores the truth on disk: all four
  stories shipped, 42-4 helpers (strip_combat_brackets,
  find_confrontation_def, combat.* spans, in_combat) live on develop
  via the original feature branch's scaffold + a dozen subsequent
  Sprint 45/47 fix PRs that consumed them in production code paths.
  AC8 (Keith's human playtest gate) was deferred at archive time and
  has been functionally satisfied by the cumulative Sprint 45/47
  playtests. The orphan draft PR #121 was closed without merge.
