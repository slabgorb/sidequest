id: '3'
type: epic
title: Game Watcher — Semantic Telemetry
description: >-
  Build an observability layer for AI agent decisions during live play.
  Three telemetry tiers: structured tracing spans on all decision points
  (intent routing, agent dispatch, patch application, trope progression),
  async narrative validation via TurnRecord pipeline, and a watcher endpoint
  streaming enriched events to CLI/browser viewers. Designed for human
  inspection, not automated AI-on-AI judgment. See ADR-031.
priority: p1
status: ready
repos: sidequest-api,sidequest-ui
stories:
  - id: 3-1
    title: "Agent telemetry spans — #[instrument] on all decision points, JSON tracing subscriber, RUST_LOG filtering"
    description: >-
      Instrument every decision point in the turn loop with structured tracing
      spans. IntentRouter::classify, Agent::invoke, JsonExtractor::extract,
      GameSnapshot::apply_*_patch, TropeEngine::tick, ContextBuilder::compose,
      compute_delta. Each span captures semantic fields (classified_intent,
      agent_name, extraction_tier, fields_changed, beats_fired) not just
      timing. Configure tracing-subscriber with JSON output layer and
      env-filter for RUST_LOG control. Story 1-12 lays the foundation;
      this story adds game-specific semantic fields.
    points: 5
    priority: p0
    status: done
    repos: sidequest-api
    workflow: tdd
    depends_on: 2-5
    completed: '2026-03-25'
    branch: feat/3-1-agent-telemetry-spans
  - id: 3-2
    title: "TurnRecord struct + mpsc channel — async pipeline from orchestrator to validator"
    description: >-
      Define the TurnRecord struct capturing a complete turn snapshot:
      turn_id, player_input, classified_intent, agent_name, narration,
      patches_applied, snapshot_before, snapshot_after, delta, beats_fired,
      extraction_tier, token counts, duration, is_degraded. Wire a bounded
      tokio::sync::mpsc::channel(32) from the orchestrator to a background
      tokio::spawn validator task. Orchestrator sends TurnRecord after
      broadcasting to the player — never blocks the hot path. Validator
      receives and logs receipt. No validation logic yet.
    points: 5
    priority: p0
    status: backlog
    repos: sidequest-api
    workflow: tdd
    depends_on: 3-1
  - id: 3-3
    title: "Patch legality checks — deterministic validation of state mutations against game rules"
    description: >-
      First validation module in the cold-path validator. Deterministic checks
      comparing patches against game rules: HP cannot exceed max_hp, dead
      NPCs cannot act or speak, location transitions must be to discovered
      regions, combat patches require active combat state, chase patches
      require active chase state. Each violation emits a tracing::warn! event
      tagged component="watcher", check="patch_legality". Tests use crafted
      TurnRecords with known-bad patches.
    points: 3
    priority: p0
    status: backlog
    repos: sidequest-api
    workflow: tdd
    depends_on: 3-2
  - id: 3-4
    title: "Entity reference validation — narration mentions checked against GameSnapshot"
    description: >-
      Heuristic validation comparing narration text against game state.
      Extract entity references from narration (NPC names, item names,
      location names) via pattern matching against known entities in
      snapshot_after. Flag references to entities not present in npcs,
      inventory, or discovered locations. Emit tracing::warn! for unresolved
      references. Accept fuzzy matches (substring, case-insensitive) to
      reduce false positives. This is a flag for human review, not a verdict.
    points: 5
    priority: p1
    status: backlog
    repos: sidequest-api
    workflow: tdd
    depends_on: 3-2
  - id: 3-5
    title: "Subsystem exercise tracker — agent invocation histogram, coverage gap detection"
    description: >-
      Track cumulative agent invocation counts per session. After each
      TurnRecord, update a HashMap<String, usize> of agent_name → call_count.
      Emit a tracing::info! summary every N turns (configurable, default 5)
      showing the histogram. Detect coverage gaps: if an agent type has zero
      invocations after a configurable threshold (default 10 turns), emit a
      tracing::warn! tagged check="subsystem_exercise". Enables the "are all
      subsystems being used?" question at a glance.
    points: 3
    priority: p1
    status: backlog
    repos: sidequest-api
    workflow: tdd
    depends_on: 3-2
  - id: 3-6
    title: "Watcher WebSocket endpoint — /ws/watcher streaming filtered telemetry to viewers"
    description: >-
      Add /ws/watcher endpoint to the axum router. Connected clients receive
      a JSON stream of game-relevant telemetry events: agent spans, validation
      warnings, subsystem exercise summaries, TurnRecord metadata (without
      full snapshots — those are too large). Uses a broadcast::channel so
      multiple viewers can connect. Opt-in: no overhead when no viewer is
      connected. Separate from the player /ws endpoint — this carries
      diagnostic data only.
    points: 5
    priority: p1
    status: backlog
    repos: sidequest-api
    workflow: tdd
    depends_on: 3-1
  - id: 3-7
    title: "CLI watcher — just watch tail mode with colored output and subsystem heatmap"
    description: >-
      Add 'just watch' recipe that connects to /ws/watcher and renders a
      live-updating terminal view. Colored output: green for normal spans,
      yellow for validation warnings, red for legality violations. Subsystem
      heatmap as a simple bar chart of agent invocation counts. Turn
      separator between turns showing turn_id, intent, agent, duration.
      Can be a small Python or Rust CLI script consuming the WebSocket.
    points: 3
    priority: p1
    status: backlog
    repos: orc-quest
    workflow: trivial
    depends_on: 3-6
  - id: 3-8
    title: "Trope alignment check — beat thresholds vs narration content"
    description: >-
      When a trope beat fires (threshold crossed, beat_name in beats_fired),
      check whether the narration text references the trope theme or beat
      content. Uses keyword matching from the genre pack's trope definition
      (beat descriptions, trope tags). If a beat fired but the narration
      shows no thematic connection, emit a warning. This catches the case
      where the trope engine advances but the Narrator agent ignores it.
      Low priority — meaningful only after trope engine runtime (2-8) works.
    points: 3
    priority: p2
    status: backlog
    repos: sidequest-api
    workflow: tdd
    depends_on: 3-4
  - id: 3-9
    title: "GM Mode panel — React debug overlay showing telemetry alongside game UI"
    description: >-
      React component in sidequest-ui that connects to /ws/watcher and
      renders a collapsible debug panel alongside the game. Event stream
      with turn-by-turn telemetry. Game state inspector showing current
      GameSnapshot fields. Subsystem activity bars. Trope lifecycle
      visualization (horizontal progress bars per active trope). Validation
      warning highlights. Toggled via keyboard shortcut or URL param
      (?gm=true). Only imported when active — no bundle impact on player
      builds.
    points: 8
    priority: p2
    status: backlog
    repos: sidequest-ui
    workflow: tdd
    depends_on: 3-6,2-9
