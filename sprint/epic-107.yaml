id: '107'
type: epic
title: beneath_sunden dungeon scene advance and Monster Manual binding — per-room scene/render plus authored bestiary (ADR-106/059/109)
description: 'Source: 2026-06-13 combat playtest of caverns_and_claudes/beneath_sunden (sq-playtest-pingpong), OTEL + save-forensics. Distinct concern from Epic 106 (combat mechanics): this is dungeon traversal infrastructure + content, sibling to Epic 105 (procedural-deep reachability). Two interlocked findings. (1) Generated-dungeon traversal does not advance the structured location/scene: descending the procedural ADR-106 dungeon (rope -> The Dropmouth -> Wider Chamber -> combat) leaves discovered_rooms empty, scene_id null, region_transitions frozen after the scripted opening (only ropefoot->the_dropmouth turn 2 + the_dropmouth->entrance turn 4; zero after). The narration sub-titles advance but the engine treats the whole descent as ONE scene, so the render pipeline (keys off scene/room change per ADR-109/ADR-050) under-fires — fewer illustrations than rooms traversed (renders are not dead; daemon confirmed at least one fired). (2) Combat opponents are narrator-improvised (the creature of animal musk) with no stable identity or portrait, because there is no per-room content binding and no authored bestiary. Per Operator direction the monsters should be pre-rendered content entities (Monster Manual, ADR-059 pre-gen) injected into game_state as nearby creatures so the narrator draws from them instead of inventing. The two interlock: per-room content binding needs scene advance. SCOPE: the structured scene/location advance (server) + authored bestiary content + ADR-059 injection (content+server). OUT OF SCOPE: the confrontation-panel portrait/icon RENDERING (UI polish, stays in the ping-pong loop) — this epic makes the opponent a real entity with an asset; wiring the panel to show it is separate. Refs: ADR-106 (procedural dungeon edge-expansion), ADR-059 (Monster Manual game-state injection), ADR-109 (persistent location descriptions + mechanical manifest), ADR-050 (image pacing throttle); coordinate with Epic 105 (same dungeon seam neighborhood).'
priority: p1
status: ready
repos: server,content
